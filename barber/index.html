<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIBZ | Barber Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* [STYLES PRESERVED FROM YOUR SOURCE] */
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --gray: #666;
            --border: rgba(255, 107, 0, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --standard: #4CAF50;
            --premium: #2196F3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; background-color: var(--primary-light); color: var(--text); overflow-x: hidden; }
        #app-container { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { padding: calc(var(--safe-top) + 20px) 25px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; color: var(--primary); }
        .header-logo span { color: #000; }

        .content-scroll { flex: 1; overflow-y: auto; padding: 0 20px 180px; display: flex; flex-direction: column; }
        .hero-centered { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 75vh; text-align: center; }
        .hero-balanced { display: flex; flex-direction: column; align-items: center; padding-top: 40px; text-align: center; }

        .step-header h1 { font-size: 3.2rem; font-weight: 900; line-height: 0.9; letter-spacing: -3px; color: var(--primary); margin-bottom: 20px; }
        .vibz-input { width: 100%; max-width: 500px; padding: 18px; border-radius: 24px; border: 2px solid var(--border); background: #fff; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; outline: none; box-shadow: 0 20px 40px rgba(255, 107, 0, 0.1); text-align: center; }
        .vibz-btn { width: 100%; max-width: 500px; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: #fff; color: var(--text); font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; cursor: pointer; transition: 0.2s; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .vibz-btn.primary { background: var(--primary); color: #fff; border: none; box-shadow: 0 20px 40px rgba(255, 107, 0, 0.2); }
        .vibz-btn span.btn-desc { font-size: 0.85rem; font-weight: 600; color: #666; margin-top: 4px; }
        .vibz-btn.primary span.btn-desc { color: rgba(255,255,255,0.8); }
        .back-btn { background: none; border: none; color: #999; font-weight: 700; margin-top: 10px; box-shadow: none; }

        .form-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .form-screen.active { display: flex; animation: fadeInUp 0.4s ease-out; }

        .concept-preview { background: #fff; border-radius: 30px; overflow: hidden; margin-bottom: 20px; border: 2px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(255,107,0,0.1); }
        .concept-preview img { width: 100%; height: auto; display: block; }
        .concept-info { padding: 15px; text-align: left; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .app-dock { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,107,0,0.1); padding-bottom: env(safe-area-inset-bottom); }
        .dock-btn { display: flex; flex-direction: column; align-items: center; color: #A0A0A0; text-decoration: none; font-size: 0.6rem; font-weight: 800; }
        .dock-center { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; margin-top: -35px; border: 5px solid var(--primary-light); }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="header-logo">VIBZ<span>.</span></div>
    </header>

    <main class="content-scroll">
        <div id="main-content-wrapper" class="hero-centered">
            <div class="step-header">
                <h1 id="dynamic-title">Build your barber brand.</h1>
            </div>

            <form id="funnelForm" onsubmit="return false;" style="width:100%;">
                
                <div class="form-screen active" id="step-0">
                    <button type="button" class="vibz-btn primary" onclick="goToStep(1)">I'm Ready to Start</button>
                    <a href="https://www.vibz.co.uk/barber/concepts.html" class="vibz-btn">Exploring Designs First</a>
                </div>

                <div class="form-screen" id="step-1">
                    <input type="text" class="vibz-input" id="businessInput" placeholder="e.g., FreshCuts Barbers">
                    <button type="button" class="vibz-btn primary" onclick="handleStep1()">Continue <i class="fa-solid fa-arrow-right"></i></button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(0)">Go Back</button>
                </div>

                <div class="form-screen" id="step-2">
                    <button type="button" class="vibz-btn" onclick="setProjectType('New Website')">New Website</button>
                    <button type="button" class="vibz-btn" onclick="setProjectType('Redesign Existing')">Redesign Existing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1)">Go Back</button>
                </div>

                <div class="form-screen" id="step-3">
                    <button type="button" class="vibz-btn" onclick="goToStep(4)">I Have a Design Code</button>
                    <a href="https://www.vibz.co.uk/barber/concepts.html" class="vibz-btn primary">
                        Browse Concept Library
                        <span class="btn-desc">Pick a pre-made layout to start faster</span>
                    </a>
                    <button type="button" class="vibz-btn" onclick="setDesignType('Custom Design')">Request Custom Design</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(2)">Go Back</button>
                </div>

                <div class="form-screen" id="step-4">
                    <div id="code-entry-area" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                        <input type="text" class="vibz-input" id="designCode" placeholder="e.g. Barber 446">
                        <button type="button" class="vibz-btn primary" onclick="verifyDesign()">Verify Design</button>
                    </div>
                    <div id="concept-display-area" style="display:none; width:100%;">
                        </div>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(3)">Go Back</button>
                </div>

                <div class="form-screen" id="step-5">
                    <button type="button" class="vibz-btn" onclick="setPlanType('Buy Outright')">
                        <strong>Buy Outright</strong>
                        <span class="btn-desc">One-time payment. You own the files.</span>
                    </button>
                    <button type="button" class="vibz-btn" onclick="setPlanType('Monthly License')">
                        <strong>Monthly License</strong>
                        <span class="btn-desc">We manage everything. Low entry cost.</span>
                    </button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(3)">Go Back</button>
                </div>

                </form>
        </div>
    </main>

    <nav class="app-dock">
        <a href="#" class="dock-btn" onclick="goToStep(0)"><i class="fa-solid fa-house"></i><span>HOME</span></a>
        <div class="dock-center" onclick="verifyDesign()"><i class="fa-solid fa-bolt"></i></div>
        <a href="#" class="dock-btn"><i class="fa-solid fa-user"></i><span>PORTAL</span></a>
    </nav>
</div>

<script>
    let currentStep = 0;
    let selections = { businessName: '', projectType: '', designCode: '', planType: '' };

    function goToStep(s) {
        currentStep = s;
        updateUI();
    }

    function handleStep1() {
        const val = document.getElementById('businessInput').value;
        if(val) { selections.businessName = val; goToStep(2); }
    }

    function setProjectType(val) { selections.projectType = val; goToStep(3); }

    function verifyDesign() {
        const input = document.getElementById('designCode').value.trim().toLowerCase();
        const display = document.getElementById('concept-display-area');
        const entry = document.getElementById('code-entry-area');
        
        // Logic to extract number and show preview
        let num = input.match(/\d+/);
        if(num) {
            const code = "BARBER-" + num[0];
            selections.designCode = code;
            entry.style.display = 'none';
            display.style.display = 'block';
            display.innerHTML = `
                <div class="concept-preview">
                    <img src="https://www.vibz.co.uk/barber/images/barber-${num[0]}.jpg" onerror="this.src='https://via.placeholder.com/400x500?text=Design+Preview'">
                    <div class="concept-info">
                        <h3 style="color:var(--primary)">${code}</h3>
                        <p style="font-size:0.9rem; font-weight:600;">Perfect choice for ${selections.businessName || 'your shop'}.</p>
                    </div>
                </div>
                <button type="button" class="vibz-btn primary" onclick="goToStep(5)">Confirm & Continue</button>
                <button type="button" class="vibz-btn back-btn" onclick="resetCode()">Try Another Code</button>
            `;
        } else {
            alert("Please enter a valid code (e.g. Barber 446)");
        }
    }

    function resetCode() {
        document.getElementById('code-entry-area').style.display = 'block';
        document.getElementById('concept-display-area').style.display = 'none';
    }

    function setPlanType(val) {
        selections.planType = val;
        alert("You selected: " + val + ". This would now lead to the Features/Pricing screens.");
    }

    function updateUI() {
        document.querySelectorAll('.form-screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${currentStep}`).classList.add('active');
        
        const titles = {
            0: "Build your barber brand.",
            1: "What's your shop name?",
            2: "Project Status?",
            3: "Pick Your Style",
            4: "Verify Design",
            5: "Choose Your Plan"
        };
        document.getElementById('dynamic-title').textContent = titles[currentStep];
        
        const wrapper = document.getElementById('main-content-wrapper');
        wrapper.className = currentStep === 0 ? "hero-centered" : "hero-balanced";
    }
</script>
</body>
</html>
