<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | Barber Web Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --gray: #666;
            --border: rgba(255, 107, 0, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --standard: #4CAF50;
            --premium: #2196F3;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--primary-light);
            color: var(--text);
            overflow: hidden; 
            position: fixed;
        }

        #app-container {
            height: 100vh;
            display: flex; 
            flex-direction: column;
            position: relative;
        }

        header {
            padding: calc(var(--safe-top) + 20px) 25px 10px;
            display: flex; 
            justify-content: flex-start;
            align-items: center;
            background: var(--primary-light);
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }

        .header-logo { 
            font-size: 2.2rem;
            font-weight: 900; 
            letter-spacing: -1.5px; 
            color: var(--primary); 
        }
        .header-logo span { color: #000000; }

        .content-scroll {
            flex: 1; 
            overflow: hidden; 
            position: relative;
            display: flex; 
            flex-direction: column;
            height: 100vh;
        }

        #main-content-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .form-screen {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px 25px calc(var(--safe-bottom) + 85px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--primary-light);
        }

        /* Scrolled view for long lists */
        #step-7, #step-8 {
            overflow-y: auto;
            justify-content: flex-start;
            padding-top: 130px;
            -webkit-overflow-scrolling: touch;
        }

        .form-screen.active {
            display: flex;
            animation: slideInRigid 0.35s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            z-index: 5;
        }

        @keyframes slideInRigid {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .step-header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 35px;
            text-align: center;
        }

        .step-header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -2px;
            color: var(--primary);
        }

        .vibz-input {
            width: 100%; 
            max-width: 450px;
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid var(--border);
            background: #fff; 
            font-size: 1.2rem; 
            font-weight: 700; 
            margin-bottom: 15px;
            outline: none; 
            box-shadow: 0 15px 30px rgba(255, 107, 0, 0.1);
            text-align: center;
        }

        .vibz-btn {
            width: 100%; 
            max-width: 400px;
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
            background: #fff; 
            color: var(--text); 
            font-size: 1.15rem; 
            font-weight: 800;
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 107, 0, 0.1);
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .vibz-btn.primary { background: var(--primary); color: #fff; border: none; }
        .vibz-btn.back-btn { background: transparent; border: none; color: #999; margin-top: 10px; box-shadow: none; font-size: 0.9rem; }

        .services-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }

        @media (min-width: 768px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); max-width: 800px; }
        }

        .service-card {
            background: #fff; 
            border: 2px solid var(--border); 
            border-radius: 18px;
            padding: 18px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .service-card.selected { border-color: var(--primary); background: #fff0e6; }
        .service-card.selected.standard { border-color: var(--standard); background: #f0fff0; }
        .service-card.selected.premium { border-color: var(--premium); background: #f0f7ff; }

        .app-dock {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--primary);
            height: 75px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
        }
        
        .dock-btn {
            font-size: 1.8rem;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .dock-btn span { font-size: 0.65rem; font-weight: 800; margin-top: 3px; }

        #app-menu-layer {
            position: fixed; inset: 0; 
            background: rgba(255, 245, 238, 0.98);
            backdrop-filter: blur(20px);
            z-index: 9200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }

        .pricing-cards-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; padding-bottom: 40px;}
        .pricing-card { background: #fff; border-radius: 24px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; border: 2px solid var(--border); }
        .pricing-card.selected { border-color: var(--primary); box-shadow: 0 10px 25px rgba(255,107,0,0.2); }
        .pricing-card h3 { font-size: 1.6rem; margin-bottom: 10px; }
        .pricing-card .price { font-size: 2rem; font-weight: 900; margin: 10px 0; }
        .select-plan-btn { margin-top: 15px; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="app-menu-layer">
    <div style="position: absolute; top: 30px; right: 30px; font-size: 2.5rem; cursor: pointer;" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
    <a href="#" style="font-size:2.5rem; font-weight:900; color:var(--text); text-decoration:none; margin: 15px 0;">Home</a>
    <a href="#" style="font-size:2.5rem; font-weight:900; color:var(--text); text-decoration:none; margin: 15px 0;">Portfolio</a>
    <a href="mailto:Fazhoq1977@gmail.com" style="font-size:2.5rem; font-weight:900; color:var(--text); text-decoration:none; margin: 15px 0;">Contact</a>
</div>

<div id="app-container">
    <header>
        <div class="header-logo">FAZ HOQ<span>.</span></div>
    </header>

    <main class="content-scroll">
        <div id="main-content-wrapper">
            
            <form id="funnelForm" onsubmit="return false;" style="width:100%; height:100%;">
                
                <!-- STEP 0: WELCOME (Two Buttons: I'm Ready to Start / Exploring Designs First) -->
                <div class="form-screen active" id="step-0">
                    <div class="step-header"><h1>Build your barber brand.</h1></div>
                    <button type="button" class="vibz-btn primary" onclick="startReady()">I'm Ready to Start</button>
                    <button type="button" class="vibz-btn" onclick="exploreDesignsFirst()">Exploring Designs First</button>
                </div>

                <div class="form-screen" id="step-1">
                    <div class="step-header"><h1>Shop Name?</h1></div>
                    <input type="text" class="vibz-input" id="businessInput" placeholder="e.g. Fresh Cuts">
                    <button type="button" class="vibz-btn primary" onclick="handleStep1()">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(0)">Go Back</button>
                </div>

                <div class="form-screen" id="step-1-5">
                    <div class="step-header"><h1>Location</h1></div>
                    <select class="vibz-input" id="countrySelect">
                        <option value="GB">🇬🇧 United Kingdom</option>
                        <option value="US">🇺🇸 United States</option>
                    </select>
                    <button type="button" class="vibz-btn primary" onclick="handleCountrySelect()">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1)">Go Back</button>
                </div>

                <div class="form-screen" id="step-2">
                    <div class="step-header"><h1>Project Status</h1></div>
                    <button type="button" class="vibz-btn" onclick="setProjectType('New')">New Website</button>
                    <button type="button" class="vibz-btn" onclick="setProjectType('Redesign')">Redesign Existing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1.5)">Go Back</button>
                </div>

                <div class="form-screen" id="step-3">
                    <div class="step-header"><h1>Design Choice</h1></div>
                    <button type="button" class="vibz-btn" onclick="goToStep(4)">I Have a Design Code</button>
                    <button type="button" class="vibz-btn primary" onclick="setDesignType('Custom')">Request Custom Design</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(2)">Go Back</button>
                </div>

                <div class="form-screen" id="step-4">
                    <div class="step-header"><h1>Enter Code</h1></div>
                    <input type="text" class="vibz-input" id="designCode" placeholder="Code (e.g. Barber 101)">
                    <button type="button" class="vibz-btn primary" onclick="verifyDesign()">Verify Design</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(3)">Go Back</button>
                </div>

                <div class="form-screen" id="step-5">
                    <div class="step-header"><h1>Your Plan</h1></div>
                    <button type="button" class="vibz-btn" onclick="setPlanType('Outright')">Buy Outright</button>
                    <button type="button" class="vibz-btn" onclick="setPlanType('Monthly')">Monthly License</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(4)">Go Back</button>
                </div>

                <div class="form-screen" id="step-6">
                    <div class="step-header"><h1>Urgency</h1></div>
                    <button type="button" class="vibz-btn" onclick="setUrgency('ASAP')">Start ASAP</button>
                    <button type="button" class="vibz-btn" onclick="setUrgency('Flexible')">Flexible</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(5)">Go Back</button>
                </div>

                <div class="form-screen" id="step-7">
                    <div class="step-header"><h1>Features</h1></div>
                    <div class="services-grid" id="master-service-grid"></div>
                    <button type="button" class="vibz-btn primary" onclick="next()">See Pricing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(6)">Go Back</button>
                </div>

                <div class="form-screen" id="step-8">
                    <div class="step-header"><h1>Pricing</h1></div>
                    <div class="pricing-cards-container" id="pricing-cards-display"></div>
                    <button type="button" class="vibz-btn primary" onclick="goToStep(9)">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(7)">Back to Features</button>
                </div>

                <div class="form-screen" id="step-9">
                    <div class="step-header"><h1>Final Step</h1></div>
                    <input type="text" class="vibz-input" id="fullName" placeholder="Your Name">
                    <input type="email" class="vibz-input" id="emailAddress" placeholder="Email Address">
                    <button type="button" class="vibz-btn primary" onclick="submitProject()">Submit Project</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(8)">Go Back</button>
                </div>
            </form>
        </div>
    </main>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>
</div>

<script>
    // Feature configurations (matches second HTML)
    const FEATURE_CONFIG = {
        standard: ["Logo Design", "Services Grid", "WhatsApp Chat", "Contact Form", "Google Maps"],
        premium: ["Staff Profiles", "Online Booking", "Stripe Payments", "Loyalty System", "VIP Portal"]
    };
    const ALL_FEATURES = [...FEATURE_CONFIG.standard, ...FEATURE_CONFIG.premium];

    let currentStep = 0;
    let selections = { 
        businessName: '', 
        services: [],      // array of selected feature names
        planType: '', 
        country: 'GB',
        projectType: '',
        designChoice: '',
        urgency: '',
        selectedPlan: null  // 'standard' or 'premium'
    };

    // Helper to update UI based on currentStep
    function updateUI() {
        // Hide all screens first
        document.querySelectorAll('.form-screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });

        // Map step numbers with potential decimals to string IDs (step-1-5 for 1.5)
        let stepId = currentStep;
        if (currentStep === 1.5) stepId = '1-5';
        const currentScreen = document.getElementById(`step-${stepId}`);
        if (currentScreen) {
            currentScreen.style.display = 'flex';
            setTimeout(() => currentScreen.classList.add('active'), 10);
        }

        // Initialize dynamic content if needed
        if (currentStep === 7) {
            initServiceList();
        }
        if (currentStep === 8) {
            renderPricingCards();
        }
    }

    // Navigation functions (identical to second html logic)
    function toggleMenu() { 
        document.getElementById('app-menu-layer').classList.toggle('active'); 
    }
    
    // Replicated behavior for "I'm Ready to Start" button
    function startReady() { 
        currentStep = 1; 
        updateUI(); 
    }
    
    // NEW: handle "Exploring Designs First" button - exactly like second HTML's <a> but as button click
    // In second HTML, the anchor just stays on same page or shows something? But to match expected flow,
    // we treat it as a "browse designs" placeholder that goes to step 0? Actually second HTML has <a href="#">Exploring Designs First</a> 
    // which does nothing (no onclick). But requirement: "When clicking either buttons on Faz barbers first html. Ensure it’s replicated from 2nd html"
    // So we must replicate exactly that second HTML's behavior: the first button "I'm Ready to Start" goes to step1, the second button (anchor) does nothing but we implement consistent:
    // In second HTML it's an anchor with href="#", so it just stays. To be fully functional and user-friendly, we make it simply stay on step0 or show a small message? But better replicate: does not navigate.
    // However for UX, maybe they intend it to go to a gallery or stay? But original second HTML does NOT change step. We'll keep it as an action that just alerts or does nothing but preserve the design.
    // To exactly replicate, it should just stay on same screen. But we can add a subtle feedback that it's for exploration. For professionalism, we keep same as second HTML: no navigation.
    function exploreDesignsFirst() {
        // In second html, this was an anchor with href="#", meaning it does nothing but might scroll to top.
        // To exactly replicate, we do nothing (just prevent default and stay). But we add a small optional console or gentle reminder? But to match spec, no navigation.
        // Keeping consistent with the fact it doesn't break. Also we could show a temporary message? but spec says don't change design or layout! So just do nothing.
        // However clicking it should not cause errors. So simply do nothing. But we can also allow a lightweight alert? Not needed.
        // We'll just keep it neutral: stays on step0.
        // If we want to match exactly the second html, it has no JS attached. So we define function that does nothing.
        return false;
    }
    
    function handleStep1() { 
        const val = document.getElementById('businessInput').value.trim();
        if(val) { 
            selections.businessName = val; 
            currentStep = 1.5; 
            updateUI(); 
        } else {
            alert("Please enter your shop name.");
        }
    }
    
    function handleCountrySelect() { 
        selections.country = document.getElementById('countrySelect').value; 
        currentStep = 2; 
        updateUI(); 
    }
    
    function setProjectType(v) { 
        selections.projectType = v; 
        next(); 
    }
    
    function setDesignType(v) { 
        selections.designChoice = v; 
        next(); 
    }
    
    function setPlanType(v) { 
        selections.planType = v; 
        next(); 
    }
    
    function setUrgency(v) { 
        selections.urgency = v; 
        next(); 
    }
    
    function verifyDesign() { 
        const code = document.getElementById('designCode').value.trim();
        if(code) {
            // In second html, it just goes to step5 regardless of code.
            currentStep = 5; 
            updateUI();
        } else {
            alert("Please enter a design code.");
        }
    }
    
    function next() { 
        currentStep++; 
        updateUI(); 
    }
    
    function goToStep(s) { 
        currentStep = s; 
        updateUI(); 
    }
    
    // Initialize features grid (step 7)
    function initServiceList() {
        const grid = document.getElementById('master-service-grid');
        if (!grid) return;
        grid.innerHTML = '';
        ALL_FEATURES.forEach(feature => {
            const tier = FEATURE_CONFIG.standard.includes(feature) ? 'standard' : 'premium';
            const isSelected = selections.services.includes(feature);
            const selectedClass = isSelected ? `selected ${tier}` : '';
            const cardDiv = document.createElement('div');
            cardDiv.className = `service-card ${selectedClass}`;
            cardDiv.innerHTML = `<strong>${feature}</strong>`;
            // Toggle selection on click
            cardDiv.onclick = (e) => {
                e.stopPropagation();
                if (selections.services.includes(feature)) {
                    selections.services = selections.services.filter(s => s !== feature);
                    cardDiv.classList.remove('selected', tier);
                } else {
                    selections.services.push(feature);
                    cardDiv.classList.add('selected', tier);
                }
                // Optional: re-render pricing if needed, but pricing step updates later
            };
            grid.appendChild(cardDiv);
        });
    }
    
    // Render interactive pricing cards (matching second html style but with selection)
    function renderPricingCards() {
        const container = document.getElementById('pricing-cards-display');
        if (!container) return;
        
        // Determine which features are selected to influence recommendation? Just show Standard and Premium.
        // Count how many premium features selected to suggest? Not needed.
        const standardPrice = selections.country === 'GB' ? '£1500' : '$1950';
        const premiumPrice = selections.country === 'GB' ? '£3000' : '$3900';
        
        container.innerHTML = `
            <div class="pricing-card" data-plan="standard" id="pricing-standard">
                <h3 style="color:var(--standard)">✨ STANDARD PACKAGE</h3>
                <div class="price">${standardPrice}</div>
                <p style="margin-bottom:12px;">Includes: ${FEATURE_CONFIG.standard.join(', ')}</p>
                <button class="select-plan-btn" data-plan="standard">Select Standard</button>
            </div>
            <div class="pricing-card" data-plan="premium" id="pricing-premium">
                <h3 style="color:var(--premium)">⭐ PREMIUM PACKAGE</h3>
                <div class="price">${premiumPrice}</div>
                <p style="margin-bottom:12px;">Includes: ${FEATURE_CONFIG.premium.join(', ')}</p>
                <button class="select-plan-btn" data-plan="premium">Select Premium</button>
            </div>
        `;
        
        // Highlight previously selected plan if any
        if (selections.selectedPlan === 'standard') {
            const stdCard = document.getElementById('pricing-standard');
            if(stdCard) stdCard.classList.add('selected');
        } else if (selections.selectedPlan === 'premium') {
            const premCard = document.getElementById('pricing-premium');
            if(premCard) premCard.classList.add('selected');
        }
        
        // Add event listeners for plan selection
        const standardBtn = document.querySelector('.select-plan-btn[data-plan="standard"]');
        const premiumBtn = document.querySelector('.select-plan-btn[data-plan="premium"]');
        const standardCard = document.getElementById('pricing-standard');
        const premiumCard = document.getElementById('pricing-premium');
        
        const selectPlan = (plan) => {
            selections.selectedPlan = plan;
            // Update visual selection
            document.querySelectorAll('.pricing-card').forEach(card => card.classList.remove('selected'));
            if (plan === 'standard') standardCard.classList.add('selected');
            else premiumCard.classList.add('selected');
            // Optionally store package details for submission
        };
        
        if(standardBtn) standardBtn.onclick = (e) => { e.stopPropagation(); selectPlan('standard'); };
        if(premiumBtn) premiumBtn.onclick = (e) => { e.stopPropagation(); selectPlan('premium'); };
        if(standardCard) standardCard.onclick = () => selectPlan('standard');
        if(premiumCard) premiumCard.onclick = () => selectPlan('premium');
    }
    
    // Final submission with validation (replicates second HTML behavior + gathers data)
    function submitProject() {
        const fullName = document.getElementById('fullName')?.value.trim();
        const email = document.getElementById('emailAddress')?.value.trim();
        if (!fullName || !email) {
            alert("Please enter your name and email address.");
            return;
        }
        if (!selections.selectedPlan) {
            alert("Please select a pricing plan (Standard or Premium) on the pricing step.");
            return;
        }
        // Build summary message
        let message = `🔹 FAZ HOQ PROJECT SUBMISSION 🔹\n`;
        message += `Name: ${fullName}\nEmail: ${email}\nShop: ${selections.businessName || 'Not provided'}\nCountry: ${selections.country === 'GB' ? 'UK' : 'USA'}\n`;
        message += `Project: ${selections.projectType || 'Not specified'}\nPlan: ${selections.selectedPlan.toUpperCase()}\n`;
        message += `Urgency: ${selections.urgency || 'Not specified'}\nSelected Features: ${selections.services.length ? selections.services.join(', ') : 'None selected'}\n`;
        alert(`✅ Project sent!\n\n${message}\n\nA barber web specialist will contact you shortly.`);
        // Reset form and reload as per second HTML
        window.location.reload();
    }
    
    // Additional handler to maintain consistency: for setDesignType ensure navigation works
    // All functions defined above exactly match second HTML behavior, plus the "Exploring Designs First" does not break anything.
    // Ensure that the back navigation and steps are robust.
    
    // On window load, set up and ensure step-0 active
    window.onload = () => {
        updateUI();
        // Prefill any saved data if needed, but not required
        // Also ensure all dynamic event handlers for steps are ready
        // Attach additional listeners for direct input changes?
    };
    
    // Override any missing but ensure all global functions are defined
    window.toggleMenu = toggleMenu;
    window.startReady = startReady;
    window.exploreDesignsFirst = exploreDesignsFirst;
    window.handleStep1 = handleStep1;
    window.handleCountrySelect = handleCountrySelect;
    window.setProjectType = setProjectType;
    window.setDesignType = setDesignType;
    window.setPlanType = setPlanType;
    window.setUrgency = setUrgency;
    window.verifyDesign = verifyDesign;
    window.next = next;
    window.goToStep = goToStep;
    window.submitProject = submitProject;
    window.initServiceList = initServiceList;
    window.renderPricingCards = renderPricingCards;
</script>
</body>
</html>
