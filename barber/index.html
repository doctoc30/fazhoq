<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | Barber Web Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --gray: #666;
            --border: rgba(255, 107, 0, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --standard: #4CAF50;
            --premium: #2196F3;
            --help: #9C27B0;
            --help-light: #F3E5F5;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: var(--primary-light);
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
        }

        #app-container {
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            position: relative;
        }

        header {
            padding: calc(var(--safe-top) + 20px) 25px 10px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: var(--primary-light);
            position: relative;
            z-index: 10;
        }

        .header-logo { 
            font-size: 2.2rem;
            font-weight: 900; 
            letter-spacing: -1.5px; 
            color: var(--primary); 
        }
        .header-logo span { color: #000000; }

        .client-portal-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            padding: 10px 20px 10px 15px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 1rem;
            border: none;
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.15);
            transition: all 0.2s ease;
            height: 55px;
        }

        .client-portal-btn i {
            font-size: 1.3rem;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .client-portal-btn span { display: none; }
            .client-portal-btn { padding: 10px; width: 55px; justify-content: center; }
            .client-portal-btn i { font-size: 1.5rem; }
        }

        #app-menu-layer {
            position: fixed; inset: 0; background: var(--primary-light);
            z-index: 3000; display: flex; flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }

        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .menu-logo { font-size: 2.2rem; font-weight: 900; color: var(--primary); }
        .menu-logo span { color: #000000; }
        .menu-links {
            display: flex; flex-direction: column; 
            gap: 20px;
            flex: 1;
            justify-content: center;
            align-items: center;
        }
        .menu-item {
            font-size: 4.5rem; font-weight: 900; color: var(--text);
            text-decoration: none; letter-spacing: -3px;
            opacity: 0; transform: translateY(30px);
            transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active .menu-item { opacity: 1; transform: translateY(0); }
        #app-menu-layer.active .menu-item:nth-child(1) { transition-delay: 0.1s; }
        #app-menu-layer.active .menu-item:nth-child(2) { transition-delay: 0.2s; }
        #app-menu-layer.active .menu-item:nth-child(3) { transition-delay: 0.3s; }

        .content-scroll {
            flex: 1; 
            overflow-y: auto;
            padding: 0 20px 100px;
            scroll-behavior: smooth;
            display: flex; 
            flex-direction: column;
        }

        .hero-centered { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            width: 100%;
            text-align: center; 
        }

        .step-header {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px;
            text-align: center;
        }

        .step-header h1 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: -3px;
            color: var(--primary);
        }
        
        .step-header p { 
            color: var(--gray); 
            font-weight: 500; 
            font-size: 1.2rem;
        }

        .vibz-input {
            width: 100%; 
            max-width: 500px;
            margin: 0 auto 15px;
            padding: 15px; 
            border-radius: 24px; 
            border: 2px solid var(--border);
            background: #fff; 
            font-size: 1.2rem; 
            font-weight: 700; 
            outline: none; 
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.15);
            text-align: center;
            display: block;
        }

        .vibz-btn {
            width: 100%; 
            max-width: 500px;
            margin: 0 auto 12px;
            padding: 15px 18px; 
            border-radius: 18px; 
            border: 1px solid var(--border);
            background: #fff; 
            color: var(--text); 
            font-size: 1.2rem; 
            font-weight: 800;
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.15);
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .vibz-btn.primary { 
            background: var(--primary); 
            color: #fff; 
            border: none; 
        }
        
        .vibz-btn.back-btn { 
            background: transparent; 
            border: none; 
            color: #999; 
            margin-top: 10px; 
            box-shadow: none; 
        }

        .form-screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .form-screen.active { display: flex; }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .services-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%;
            max-width: 500px;
            margin: 0 auto 25px;
        }

        @media (min-width: 768px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); max-width: 800px; }
        }

        .service-card {
            background: #fff; 
            border: 2px solid var(--border); 
            border-radius: 20px;
            padding: 18px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        .service-card.selected.standard { border-color: var(--standard); background: #f0fff0; }
        .service-card.selected.premium { border-color: var(--premium); background: #f0f7ff; }

        .pricing-cards-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        @media (min-width: 768px) {
            .pricing-cards-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                max-width: 900px;
                gap: 25px;
            }
        }

        .pricing-card {
            background: #fff;
            border-radius: 30px;
            padding: 28px 24px;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
            text-align: left;
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.1);
        }
        .pricing-card.recommended { border-color: var(--primary); }
        .plan-recommended-badge {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 12px;
        }

        .price-value { font-size: 2rem; font-weight: 900; margin: 10px 0; }
        .feature-list { list-style: none; margin: 20px 0; }
        .feature-list li { margin-bottom: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .payment-button {
            width: 100%;
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            margin-top: 16px;
        }
        .payment-button.secondary { background: var(--standard); }
        .payment-button.premium { background: var(--premium); }

        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .dock-btn span { font-size: 0.7rem; font-weight: 800; margin-top: 4px; }

        .swipe-counter {
            position: fixed;
            bottom: 90px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2400;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
        }
        .counter-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
        }
        .counter-dot.active { background: var(--primary); width: 24px; border-radius: 12px; }

        .concept-preview {
            background: #fff; 
            border-radius: 30px; 
            overflow: hidden; 
            margin-bottom: 20px;
            border: 2px solid var(--border); 
            width: 100%;
            max-width: 500px;
        }
        .concept-preview img { width: 100%; height: auto; display: block; }
        .concept-info { padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="app-menu-layer">
    <div class="menu-header">
        <div class="menu-logo">FAZ HOQ<span>.</span></div>
        <div style="font-size: 2rem; cursor: pointer;" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div class="menu-links">
        <a href="#" class="menu-item" onclick="toggleMenu()">Home</a>
        <a href="#" class="menu-item" onclick="toggleMenu()">Portfolio</a>
        <a href="mailto:Fazhoq1977@gmail.com" class="menu-item" onclick="toggleMenu()">Contact</a>
    </div>
</div>

<div id="app-container">
    <header>
        <div class="header-logo">FAZ HOQ<span>.</span></div>
        <a href="#" class="client-portal-btn" onclick="alert('Portal coming soon'); return false;">
            <i class="fa-regular fa-circle-user"></i>
            <span>Client Portal</span>
        </a>
    </header>

    <main class="content-scroll">
        <div id="main-content-wrapper" class="hero-centered">
            <div class="step-header">
                <h1 id="dynamic-title">Build your barber brand.</h1>
                <p id="dynamic-subtitle"></p>
            </div>

            <div class="swipe-counter" id="swipeCounter"></div>

            <form id="funnelForm" onsubmit="return false;" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                
                <!-- STEP 0: START -->
                <div class="form-screen active" id="step-0">
                    <button type="button" class="vibz-btn primary" onclick="startReady()">I'm Ready to Start</button>
                    <a href="#" class="vibz-btn" onclick="openConceptLibrary(); return false;">Exploring Designs First</a>
                </div>

                <!-- STEP 1: BUSINESS NAME -->
                <div class="form-screen" id="step-1">
                    <input type="text" class="vibz-input" id="businessInput" placeholder="e.g., FreshCuts Barbers">
                    <button type="button" class="vibz-btn primary" onclick="handleStep1()">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(0)">Go Back</button>
                </div>

                <!-- STEP 1.5: LOCATION -->
                <div class="form-screen" id="step-1-5">
                    <select class="vibz-input" id="countrySelect">
                        <option value="GB">🇬🇧 United Kingdom (GBP £)</option>
                        <option value="US">🇺🇸 United States (USD $)</option>
                        <option value="CA">🇨🇦 Canada (CAD $)</option>
                        <option value="AU">🇦🇺 Australia (AUD $)</option>
                    </select>
                    <button type="button" class="vibz-btn primary" onclick="handleCountrySelect()">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1)">Go Back</button>
                </div>

                <!-- STEP 2: PROJECT TYPE -->
                <div class="form-screen" id="step-2">
                    <button type="button" class="vibz-btn" onclick="setProjectType('New Website')">New Website</button>
                    <button type="button" class="vibz-btn" onclick="setProjectType('Redesign Existing')">Redesign Existing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1.5)">Go Back</button>
                </div>

                <!-- STEP 3: DESIGN CHOICE -->
                <div class="form-screen" id="step-3">
                    <button type="button" class="vibz-btn" onclick="goToStep(4)">I Have a Design Code</button>
                    <button type="button" class="vibz-btn primary" onclick="openConceptLibrary()">Browse Concept Library</button>
                    <button type="button" class="vibz-btn" onclick="setDesignType('Custom')">Request Custom Design</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(2)">Go Back</button>
                </div>

                <!-- STEP 4: DESIGN CODE ENTRY -->
                <div class="form-screen" id="step-4">
                    <div id="code-entry-area" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                        <input type="text" class="vibz-input" id="designCode" placeholder="e.g., Barber 101">
                        <button type="button" class="vibz-btn primary" onclick="verifyDesign()">Verify Design</button>
                    </div>
                    <div id="concept-display-area" style="display:none; width:100%;"></div>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(3)">Go Back</button>
                </div>

                <!-- STEP 5: PLAN TYPE -->
                <div class="form-screen" id="step-5">
                    <button type="button" class="vibz-btn" onclick="setPlanType('Buy Outright')">Buy Outright</button>
                    <button type="button" class="vibz-btn" onclick="setPlanType('Monthly License')">Monthly License</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(4)">Go Back</button>
                </div>

                <!-- STEP 6: URGENCY -->
                <div class="form-screen" id="step-6">
                    <button type="button" class="vibz-btn" onclick="setUrgency('Start ASAP')">Start ASAP</button>
                    <button type="button" class="vibz-btn" onclick="setUrgency('Flexible')">I'm flexible, no rush</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(5)">Go Back</button>
                </div>

                <!-- STEP 7: FEATURES -->
                <div class="form-screen" id="step-7">
                    <div class="services-grid" id="master-service-grid"></div>
                    <button type="button" class="vibz-btn primary" onclick="next()">See Pricing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(6)">Go Back</button>
                </div>

                <!-- STEP 8: PRICING -->
                <div class="form-screen" id="step-8">
                    <div class="pricing-cards-container" id="pricing-cards-display"></div>
                    <button type="button" class="vibz-btn primary" onclick="goToStep(9)">Continue to Details</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(7)">Back to Features</button>
                </div>

                <!-- STEP 9: DETAILS -->
                <div class="form-screen" id="step-9">
                    <input type="text" class="vibz-input" id="fullName" placeholder="Full Name">
                    <input type="email" class="vibz-input" id="emailAddress" placeholder="Email Address">
                    <button type="button" class="vibz-btn primary" onclick="submitProject()">Submit Project</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(8)">Go Back</button>
                </div>

            </form>
        </div>
    </main>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>
</div>

<!-- Concept Library Modal (replicates the library experience) -->
<div id="concept-library-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto;">
    <div style="background: white; border-radius: 40px; max-width: 600px; width: 100%; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto;">
        <div style="position: sticky; top: 0; background: white; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); margin-bottom: 20px;">
            <h2 style="color: var(--primary);">Design Library</h2>
            <div style="font-size: 2rem; cursor: pointer;" onclick="closeConceptLibrary()">&times;</div>
        </div>
        <p style="margin-bottom: 20px;">Browse our barber website concepts. Click "Select" to use a design.</p>
        <div id="library-grid" style="display: flex; flex-direction: column; gap: 20px;">
            <!-- Dynamic library items will be injected -->
        </div>
    </div>
</div>

<script>
    // ========== FEATURE CONFIGURATION ==========
    const FEATURE_CONFIG = {
        standard: ["Logo Design", "Services Grid", "WhatsApp Chat", "Contact Form", "Google Maps", "Gallery Section", "Customer Reviews"],
        premium: ["Staff Profiles", "Online Booking", "Stripe Payments", "Loyalty System", "VIP Portal", "Blog Section", "Email Marketing"]
    };

    let currentStep = 0;
    let selections = { 
        businessName: '', 
        services: [], 
        planType: '', 
        country: 'GB', 
        projectType: '',
        designCode: '',
        urgency: '',
        selectedTier: 'standard',
        fullName: '',
        email: ''
    };

    // ========== NAVIGATION ==========
    function toggleMenu() { document.getElementById('app-menu-layer').classList.toggle('active'); }
    function startReady() { currentStep = 1; updateUI(); }
    function handleStep1() { 
        const val = document.getElementById('businessInput').value.trim();
        if(val) { selections.businessName = val; currentStep = 1.5; updateUI(); }
        else alert("Please enter your shop name");
    }
    function handleCountrySelect() { 
        selections.country = document.getElementById('countrySelect').value; 
        currentStep = 2; updateUI(); 
    }
    function setProjectType(v) { selections.projectType = v; next(); }
    function setDesignType(v) { selections.designType = v; next(); }
    function setPlanType(v) { selections.planType = v; next(); }
    function setUrgency(v) { selections.urgency = v; next(); }
    function next() { if(currentStep < 9) { currentStep++; updateUI(); } }
    function goToStep(s) { currentStep = s; updateUI(); }

    // ========== CONCEPT LIBRARY ==========
    // Sample library of barber concepts (10 designs)
    const conceptLibrary = [
        { code: "Barber 101", name: "Classic Cuts", img: "https://placehold.co/600x400/FF6B00/white?text=Classic+Cuts" },
        { code: "Barber 202", name: "Modern Fade", img: "https://placehold.co/600x400/2196F3/white?text=Modern+Fade" },
        { code: "Barber 303", name: "Luxury Shave", img: "https://placehold.co/600x400/4CAF50/white?text=Luxury+Shave" },
        { code: "Barber 404", name: "Urban Style", img: "https://placehold.co/600x400/FF9800/white?text=Urban+Style" },
        { code: "Barber 505", name: "Vintage Barbershop", img: "https://placehold.co/600x400/795548/white?text=Vintage" },
        { code: "Barber 606", name: "Gentleman's Club", img: "https://placehold.co/600x400/9C27B0/white?text=Gentleman" },
        { code: "Barber 707", name: "Street Barber", img: "https://placehold.co/600x400/607D8B/white?text=Street" },
        { code: "Barber 808", name: "Premium Lounge", img: "https://placehold.co/600x400/E91E63/white?text=Premium+Lounge" },
        { code: "Barber 909", name: "Express Cuts", img: "https://placehold.co/600x400/00BCD4/white?text=Express+Cuts" },
        { code: "Barber 100", name: "Signature Style", img: "https://placehold.co/600x400/FF5722/white?text=Signature" }
    ];

    function openConceptLibrary() {
        const modal = document.getElementById('concept-library-modal');
        const grid = document.getElementById('library-grid');
        grid.innerHTML = '';
        conceptLibrary.forEach(concept => {
            const card = document.createElement('div');
            card.style.cssText = 'border: 2px solid var(--border); border-radius: 20px; overflow: hidden; background: white;';
            card.innerHTML = `
                <img src="${concept.img}" style="width:100%; height:auto; display:block;" alt="${concept.name}">
                <div style="padding: 15px;">
                    <h3 style="color: var(--primary);">${concept.name}</h3>
                    <p style="color: var(--gray); font-size: 0.8rem;">Code: ${concept.code}</p>
                    <button class="vibz-btn primary" style="margin-top: 10px; padding: 10px;" onclick="selectConceptFromLibrary('${concept.code}')">Select This Design</button>
                </div>
            `;
            grid.appendChild(card);
        });
        modal.style.display = 'flex';
    }

    function closeConceptLibrary() {
        document.getElementById('concept-library-modal').style.display = 'none';
    }

    function selectConceptFromLibrary(code) {
        selections.designCode = code;
        closeConceptLibrary();
        // Store that we came from library, then go to step 5 (plan selection) or verification
        // According to the second HTML's behavior, after selecting a design, we should proceed to plan step
        currentStep = 5;
        updateUI();
        alert(`Design "${code}" selected! Continue with your project.`);
    }

    // ========== DESIGN VERIFICATION ==========
    function verifyDesign() {
        const input = document.getElementById('designCode').value.trim();
        const entryArea = document.getElementById('code-entry-area');
        const displayArea = document.getElementById('concept-display-area');
        
        if(input) {
            selections.designCode = input;
            const found = conceptLibrary.find(c => c.code.toLowerCase() === input.toLowerCase());
            const imgUrl = found ? found.img : "https://placehold.co/600x400/FF6B00/white?text=Design+Found";
            const conceptName = found ? found.name : "Custom Design";
            
            entryArea.style.display = 'none';
            displayArea.style.display = 'block';
            displayArea.innerHTML = `
                <div class="concept-preview">
                    <img src="${imgUrl}" alt="${selections.designCode}">
                    <div class="concept-info">
                        <h3>${selections.designCode}</h3>
                        <p>${conceptName} - Selected for ${selections.businessName || 'your shop'}</p>
                    </div>
                </div>
                <button class="vibz-btn primary" onclick="confirmAndContinue()">Confirm & Continue</button>
                <button class="vibz-btn back-btn" onclick="resetCodeEntry()">Enter Different Code</button>
            `;
        } else {
            alert("Please enter a design code");
        }
    }

    function confirmAndContinue() {
        currentStep = 5;
        updateUI();
    }

    function resetCodeEntry() {
        document.getElementById('code-entry-area').style.display = 'block';
        document.getElementById('concept-display-area').style.display = 'none';
        document.getElementById('designCode').value = '';
    }

    // ========== FEATURES GRID ==========
    function initServiceList() {
        const grid = document.getElementById('master-service-grid');
        if (!grid) return;
        grid.innerHTML = '';
        [...FEATURE_CONFIG.standard, ...FEATURE_CONFIG.premium].forEach(feature => {
            const tier = FEATURE_CONFIG.standard.includes(feature) ? 'standard' : 'premium';
            const isSelected = selections.services.includes(feature);
            const selectedClass = isSelected ? `selected ${tier}` : '';
            const card = document.createElement('div');
            card.className = `service-card ${selectedClass}`;
            card.innerHTML = `<strong>${feature}</strong>`;
            card.onclick = () => {
                card.classList.toggle('selected');
                card.classList.toggle(tier);
                if (selections.services.includes(feature)) {
                    selections.services = selections.services.filter(s => s !== feature);
                } else {
                    selections.services.push(feature);
                }
                // Auto-suggest tier based on premium selections
                const premiumCount = selections.services.filter(s => FEATURE_CONFIG.premium.includes(s)).length;
                if (premiumCount >= 3) selections.selectedTier = 'premium';
                else selections.selectedTier = 'standard';
            };
            grid.appendChild(card);
        });
    }

    // ========== PRICING CARDS ==========
    function renderPricingCards() {
        const container = document.getElementById('pricing-cards-display');
        if (!container) return;
        const symbol = selections.country === 'GB' ? '£' : (selections.country === 'US' ? '$' : (selections.country === 'CA' ? 'C$' : 'A$'));
        const outrightStd = selections.country === 'GB' ? 1500 : (selections.country === 'US' ? 1950 : (selections.country === 'CA' ? 2500 : 2800));
        const outrightPrem = selections.country === 'GB' ? 3000 : (selections.country === 'US' ? 3900 : (selections.country === 'CA' ? 5000 : 5600));
        
        container.innerHTML = `
            <div class="pricing-card ${selections.selectedTier === 'standard' ? 'recommended' : ''}" onclick="selectTier('standard')">
                <div class="plan-recommended-badge" style="display: ${selections.selectedTier === 'standard' ? 'block' : 'none'}">RECOMMENDED</div>
                <h3 style="color: var(--standard);">STANDARD PACKAGE</h3>
                <div class="price-value">${symbol}${outrightStd}</div>
                <p>One-time payment. Full ownership.</p>
                <ul class="feature-list">
                    <li><i class="fas fa-check-circle" style="color: var(--standard);"></i> Up to 5 pages</li>
                    <li><i class="fas fa-check-circle" style="color: var(--standard);"></i> Mobile responsive</li>
                    <li><i class="fas fa-check-circle" style="color: var(--standard);"></i> 5 standard features</li>
                </ul>
                <button class="payment-button secondary" onclick="event.stopPropagation(); selectAndContinue('standard')">Select Standard</button>
            </div>
            <div class="pricing-card ${selections.selectedTier === 'premium' ? 'recommended' : ''}" onclick="selectTier('premium')">
                <div class="plan-recommended-badge" style="display: ${selections.selectedTier === 'premium' ? 'block' : 'none'}">👍 MOST POPULAR</div>
                <h3 style="color: var(--premium);">PREMIUM PACKAGE</h3>
                <div class="price-value">${symbol}${outrightPrem}</div>
                <p>One-time payment. Full ownership + extras.</p>
                <ul class="feature-list">
                    <li><i class="fas fa-crown" style="color: var(--premium);"></i> Up to 15 pages</li>
                    <li><i class="fas fa-crown" style="color: var(--premium);"></i> Online booking + payments</li>
                    <li><i class="fas fa-crown" style="color: var(--premium);"></i> All premium features</li>
                </ul>
                <button class="payment-button premium" onclick="event.stopPropagation(); selectAndContinue('premium')">Select Premium</button>
            </div>
        `;
    }

    function selectTier(tier) {
        selections.selectedTier = tier;
        renderPricingCards();
    }

    function selectAndContinue(tier) {
        selections.selectedTier = tier;
        goToStep(9);
    }

    // ========== SUBMIT PROJECT ==========
    function submitProject() {
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('emailAddress').value.trim();
        if (!fullName || !email) {
            alert("Please enter your name and email.");
            return;
        }
        selections.fullName = fullName;
        selections.email = email;
        
        let message = `✅ Project Submitted!\n\n`;
        message += `Shop: ${selections.businessName}\n`;
        message += `Name: ${fullName}\n`;
        message += `Email: ${email}\n`;
        message += `Plan: ${selections.selectedTier.toUpperCase()}\n`;
        message += `Features selected: ${selections.services.length}\n`;
        message += `Design code: ${selections.designCode || 'Custom'}\n\n`;
        message += `A barber specialist will contact you within 24 hours.`;
        
        alert(message);
        // Reset form
        window.location.reload();
    }

    // ========== UPDATE UI ==========
    function updateUI() {
        document.querySelectorAll('.form-screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        
        let stepId = currentStep === 1.5 ? '1-5' : currentStep;
        const currentScreen = document.getElementById(`step-${stepId}`);
        if(currentScreen) {
            currentScreen.style.display = 'flex';
            setTimeout(() => currentScreen.classList.add('active'), 10);
        }
        
        const titles = { 0: "Build your barber brand.", 1: "Shop Name?", 1.5: "Where are you located?", 2: "Project Status", 3: "Design Choice", 4: "Enter Code", 5: "Choose Your Plan", 6: "When do you want to start?", 7: "Select Features", 8: "Pricing", 9: "Final Step" };
        document.getElementById('dynamic-title').textContent = titles[currentStep] || "Build your barber brand.";
        
        if(currentStep === 7) initServiceList();
        if(currentStep === 8) renderPricingCards();
        
        // Update swipe counter dots
        const counter = document.getElementById('swipeCounter');
        if(counter) {
            const totalSteps = 10;
            counter.innerHTML = '';
            for(let i = 0; i <= 9; i++) {
                const dot = document.createElement('div');
                dot.className = `counter-dot ${Math.floor(currentStep) === i ? 'active' : ''}`;
                counter.appendChild(dot);
            }
        }
    }

    // ========== INIT ==========
    window.onload = () => {
        updateUI();
        // Close modal on outside click
        window.onclick = (e) => {
            const modal = document.getElementById('concept-library-modal');
            if(e.target === modal) closeConceptLibrary();
        };
    };
</script>
</body>
</html>
