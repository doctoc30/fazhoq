<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | Barber Web Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --gray: #666;
            --border: rgba(255, 107, 0, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --standard: #4CAF50;
            --premium: #2196F3;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--primary-light);
            color: var(--text);
            overflow: hidden; 
            position: fixed;
        }

        #app-container {
            height: 100vh;
            display: flex; 
            flex-direction: column;
            position: relative;
        }

        header {
            padding: calc(var(--safe-top) + 20px) 25px 10px;
            display: flex; 
            justify-content: flex-start; /* LOGICAL LEFT ALIGNMENT RESTORED */
            align-items: center;
            background: var(--primary-light);
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }

        .header-logo { 
            font-size: 2.2rem;
            font-weight: 900; 
            letter-spacing: -1.5px; 
            color: var(--primary); 
        }
        .header-logo span { color: #000000; }

        .content-scroll {
            flex: 1; 
            overflow: hidden; 
            position: relative;
            display: flex; 
            flex-direction: column;
            height: 100vh;
        }

        #main-content-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .form-screen {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px 25px calc(var(--safe-bottom) + 85px); /* Offset for Dock */
            flex-direction: column;
            align-items: center;
            justify-content: center; /* VERTICAL CENTER FOR BUTTONS */
            position: absolute;
            top: 0;
            left: 0;
            background: var(--primary-light);
        }

        /* Scrolled view for long lists */
        #step-7, #step-8 {
            overflow-y: auto;
            justify-content: flex-start;
            padding-top: 130px;
            -webkit-overflow-scrolling: touch;
        }

        .form-screen.active {
            display: flex;
            animation: slideInRigid 0.35s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            z-index: 5;
        }

        @keyframes slideInRigid {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .step-header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 35px; /* Spacing between title and buttons */
            text-align: center;
        }

        .step-header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -2px;
            color: var(--primary);
        }

        .vibz-input {
            width: 100%; 
            max-width: 450px;
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid var(--border);
            background: #fff; 
            font-size: 1.2rem; 
            font-weight: 700; 
            margin-bottom: 15px;
            outline: none; 
            box-shadow: 0 15px 30px rgba(255, 107, 0, 0.1);
            text-align: center;
        }

        .vibz-btn {
            width: 100%; 
            max-width: 400px;
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
            background: #fff; 
            color: var(--text); 
            font-size: 1.15rem; 
            font-weight: 800;
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 107, 0, 0.1);
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .vibz-btn.primary { background: var(--primary); color: #fff; border: none; }
        .vibz-btn.back-btn { background: transparent; border: none; color: #999; margin-top: 10px; box-shadow: none; font-size: 0.9rem; }

        .services-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }

        @media (min-width: 768px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); max-width: 800px; }
        }

        .service-card {
            background: #fff; 
            border: 2px solid var(--border); 
            border-radius: 18px;
            padding: 18px; 
            cursor: pointer; 
        }

        .service-card.selected.standard { border-color: var(--standard); background: #f0fff0; }
        .service-card.selected.premium { border-color: var(--premium); background: #f0f7ff; }

        .app-dock {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--primary);
            height: 75px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
        }
        
        .dock-btn {
            font-size: 1.8rem;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }
        .dock-btn span { font-size: 0.65rem; font-weight: 800; margin-top: 3px; }

        #app-menu-layer {
            position: fixed; inset: 0; 
            background: rgba(255, 245, 238, 0.98);
            backdrop-filter: blur(20px);
            z-index: 9200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }

        .pricing-cards-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; padding-bottom: 40px;}
    </style>
</head>
<body>

<div id="app-menu-layer">
    <div style="position: absolute; top: 30px; right: 30px; font-size: 2.5rem;" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
    <a href="#" style="font-size:2.5rem; font-weight:900; color:var(--text); text-decoration:none; margin: 15px 0;">Home</a>
    <a href="#" style="font-size:2.5rem; font-weight:900; color:var(--text); text-decoration:none; margin: 15px 0;">Portfolio</a>
    <a href="mailto:Fazhoq1977@gmail.com" style="font-size:2.5rem; font-weight:900; color:var(--text); text-decoration:none; margin: 15px 0;">Contact</a>
</div>

<div id="app-container">
    <header>
        <div class="header-logo">FAZ HOQ<span>.</span></div>
    </header>

    <main class="content-scroll">
        <div id="main-content-wrapper">
            
            <form id="funnelForm" onsubmit="return false;" style="width:100%; height:100%;">
                
                <div class="form-screen active" id="step-0">
                    <div class="step-header"><h1>Build your barber brand.</h1></div>
                    <button type="button" class="vibz-btn primary" onclick="startReady()">I'm Ready to Start</button>
                    <a href="#" class="vibz-btn">Exploring Designs First</a>
                </div>

                <div class="form-screen" id="step-1">
                    <div class="step-header"><h1>Shop Name?</h1></div>
                    <input type="text" class="vibz-input" id="businessInput" placeholder="e.g. Fresh Cuts">
                    <button type="button" class="vibz-btn primary" onclick="handleStep1()">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(0)">Go Back</button>
                </div>

                <div class="form-screen" id="step-1-5">
                    <div class="step-header"><h1>Location</h1></div>
                    <select class="vibz-input" id="countrySelect">
                        <option value="GB">🇬🇧 United Kingdom</option>
                        <option value="US">🇺🇸 United States</option>
                    </select>
                    <button type="button" class="vibz-btn primary" onclick="handleCountrySelect()">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1)">Go Back</button>
                </div>

                <div class="form-screen" id="step-2">
                    <div class="step-header"><h1>Project Status</h1></div>
                    <button type="button" class="vibz-btn" onclick="setProjectType('New')">New Website</button>
                    <button type="button" class="vibz-btn" onclick="setProjectType('Redesign')">Redesign Existing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(1.5)">Go Back</button>
                </div>

                <div class="form-screen" id="step-3">
                    <div class="step-header"><h1>Design Choice</h1></div>
                    <button type="button" class="vibz-btn" onclick="goToStep(4)">I Have a Design Code</button>
                    <button type="button" class="vibz-btn primary" onclick="setDesignType('Custom')">Request Custom Design</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(2)">Go Back</button>
                </div>

                <div class="form-screen" id="step-4">
                    <div class="step-header"><h1>Enter Code</h1></div>
                    <input type="text" class="vibz-input" id="designCode" placeholder="Code (e.g. Barber 101)">
                    <button type="button" class="vibz-btn primary" onclick="verifyDesign()">Verify Design</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(3)">Go Back</button>
                </div>

                <div class="form-screen" id="step-5">
                    <div class="step-header"><h1>Your Plan</h1></div>
                    <button type="button" class="vibz-btn" onclick="setPlanType('Outright')">Buy Outright</button>
                    <button type="button" class="vibz-btn" onclick="setPlanType('Monthly')">Monthly License</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(4)">Go Back</button>
                </div>

                <div class="form-screen" id="step-6">
                    <div class="step-header"><h1>Urgency</h1></div>
                    <button type="button" class="vibz-btn" onclick="setUrgency('ASAP')">Start ASAP</button>
                    <button type="button" class="vibz-btn" onclick="setUrgency('Flexible')">Flexible</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(5)">Go Back</button>
                </div>

                <div class="form-screen" id="step-7">
                    <div class="step-header"><h1>Features</h1></div>
                    <div class="services-grid" id="master-service-grid"></div>
                    <button type="button" class="vibz-btn primary" onclick="next()">See Pricing</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(6)">Go Back</button>
                </div>

                <div class="form-screen" id="step-8">
                    <div class="step-header"><h1>Pricing</h1></div>
                    <div class="pricing-cards-container" id="pricing-cards-display"></div>
                    <button type="button" class="vibz-btn primary" onclick="goToStep(9)">Continue</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(7)">Back to Features</button>
                </div>

                <div class="form-screen" id="step-9">
                    <div class="step-header"><h1>Final Step</h1></div>
                    <input type="text" class="vibz-input" id="fullName" placeholder="Your Name">
                    <input type="email" class="vibz-input" id="emailAddress" placeholder="Email Address">
                    <button type="button" class="vibz-btn primary" onclick="submitProject()">Submit Project</button>
                    <button type="button" class="vibz-btn back-btn" onclick="goToStep(8)">Go Back</button>
                </div>
            </form>
        </div>
    </main>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>
</div>

<script>
    const FEATURE_CONFIG = {
        standard: ["Logo Design", "Services Grid", "WhatsApp Chat", "Contact Form", "Google Maps"],
        premium: ["Staff Profiles", "Online Booking", "Stripe Payments", "Loyalty System", "VIP Portal"]
    };

    let currentStep = 0;
    let selections = { businessName: '', services: [], planType: '', country: 'GB' };

    function toggleMenu() { document.getElementById('app-menu-layer').classList.toggle('active'); }
    function startReady() { currentStep = 1; updateUI(); }
    function handleStep1() { 
        const val = document.getElementById('businessInput').value;
        if(val) { selections.businessName = val; currentStep = 1.5; updateUI(); }
    }
    function handleCountrySelect() { selections.country = document.getElementById('countrySelect').value; currentStep = 2; updateUI(); }
    function setProjectType(v) { selections.projectType = v; next(); }
    function setDesignType(v) { next(); }
    function setPlanType(v) { selections.planType = v; next(); }
    function setUrgency(v) { next(); }
    function verifyDesign() { currentStep = 5; updateUI(); }
    function next() { currentStep++; updateUI(); }
    function goToStep(s) { currentStep = s; updateUI(); }

    function initServiceList() {
        const grid = document.getElementById('master-service-grid');
        grid.innerHTML = '';
        [...FEATURE_CONFIG.standard, ...FEATURE_CONFIG.premium].forEach(s => {
            const tier = FEATURE_CONFIG.standard.includes(s) ? 'standard' : 'premium';
            grid.innerHTML += `<div class="service-card" onclick="this.classList.toggle('selected'); this.classList.toggle('${tier}')"><strong>${s}</strong></div>`;
        });
    }

    function renderPricing() {
        const container = document.getElementById('pricing-cards-display');
        container.innerHTML = `
            <div class="service-card" style="text-align:center">
                <h3 style="color:var(--standard)">STANDARD</h3>
                <div style="font-size:1.8rem; font-weight:900;">£1500</div>
                <button class="vibz-btn primary" style="margin-top:10px; width:100%;">Select</button>
            </div>
            <div class="service-card" style="text-align:center">
                <h3 style="color:var(--premium)">PREMIUM</h3>
                <div style="font-size:1.8rem; font-weight:900;">£3000</div>
                <button class="vibz-btn primary" style="margin-top:10px; width:100%;">Select</button>
            </div>`;
    }

    function updateUI() {
        document.querySelectorAll('.form-screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });

        const stepId = currentStep === 1.5 ? '1-5' : currentStep;
        const currentScreen = document.getElementById(`step-${stepId}`);
        if(currentScreen) {
            currentScreen.style.display = 'flex';
            setTimeout(() => currentScreen.classList.add('active'), 10);
        }

        if(currentStep === 7) initServiceList();
        if(currentStep === 8) renderPricing();
    }

    function submitProject() { alert("Sent!"); window.location.reload(); }
    window.onload = updateUI;
</script>

</body>
</html>
