<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Exact Vibz Branding */
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%; width: 100%;
            overflow: hidden;
            /* Updated to Vibz Primary Light background */
            background-color: var(--primary-light);
            color: var(--text);
            touch-action: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: transparent; 
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        /* HEADER */
        .faz-nav {
            position: fixed; top: 0; width: 100%; z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--text);
            background: none; border: none; cursor: pointer;
        }

        /* TEXT STYLES */
        .text-wrap { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900; line-height: 0.9; letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 380px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 20px rgba(255,107,0,0.1));
        }

        /* SEARCH BAR - Matched to Vibz */
        .search-container { 
            background: #fff; 
            border-radius: 24px; 
            padding: 8px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.15); 
            width: 95%; 
            max-width: 500px; 
            margin-top: 40px; 
            border: 1px solid rgba(255, 107, 0, 0.1);
        }
        
        .search-container input { 
            flex: 1; border: none; outline: none; padding: 12px 15px; 
            font-size: 1.2rem; font-weight: 700; background: transparent;
        }
        
        .search-icon-btn { 
            width: 50px; height: 50px; background: var(--primary); 
            border-radius: 18px; display: flex; align-items: center; 
            justify-content: center; color: #fff; border: none;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        /* CATEGORIES - Matched to Vibz */
        .category-header {
            font-size: 0.85rem; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 2px; color: var(--primary); margin-bottom: 35px;
        }

        .category-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; 
            width: 100%; max-width: 600px; margin-bottom: 100px; 
        }

        .category-tile {
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 107, 0, 0.1); 
            border-radius: 30px; padding: 25px 15px; display: flex; flex-direction: column;
            align-items: center; gap: 15px; transition: all 0.2s;
        }

        .tile-icon {
            width: 55px; height: 55px; background: var(--primary);
            color: white; border-radius: 15px; display: flex;
            align-items: center; justify-content: center; font-size: 1.3rem;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        .tile-label { font-weight: 900; font-size: 1.1rem; line-height: 1.2; }

        /* DOCK */
        .app-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); height: 75px;
            display: flex; justify-content: center; gap: 3rem;
            align-items: center; z-index: 2500;
            padding-bottom: var(--safe-bottom);
            border-top: 1px solid rgba(255,107,0,0.1);
        }
        
        .dock-btn { font-size: 1.6rem; color: #A0A0A0; transition: 0.3s; }
        .dock-btn:hover { color: var(--primary); transform: translateY(-3px); }

        .nav-dots { position: fixed; right: 1.5rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 1.2rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: 0.4s; }
        .dot.active { background: var(--primary); transform: scale(2.5); }
    </style>
</head>
<body>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div class="nav-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <div class="search-container">
                    <input type="text" id="mainSearch" placeholder="Search any industry..." onkeypress="if(event.key==='Enter') triggerSearch()">
                    <button class="search-icon-btn" onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap flex-col">
                <h2 class="category-header">Or Select From Popular Categories</h2>
                <div class="category-grid">
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-heart-pulse"></i></div><span class="tile-label">Health & Wellness</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-hammer"></i></div><span class="tile-label">Home & Trades</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-briefcase"></i></div><span class="tile-label">Professional Services</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-utensils"></i></div><span class="tile-label">Food & Drink</span></div>
                    <div class="category-tile" style="grid-column: span 2; flex-direction: row; padding: 20px; justify-content: center;">
                        <div class="tile-icon"><i class="fa-solid fa-bag-shopping"></i></div>
                        <span class="tile-label" style="margin-left: 15px;">Retail & Creative Industries</span>
                    </div>
                </div>
            </div>
        </section>

        <section><div class="text-wrap"><h2 class="huge-text" style="text-transform:uppercase">STRATEGIC<br><span class="black">PARTNER.</span></h2></div></section>
        <section style="background-color: #000;"><div class="text-wrap"><h2 class="huge-text" style="font-style:italic; text-transform:uppercase">WOW<span>!</span><br><span class="black" style="color:#fff">INTERACTION.</span></h2></div></section>
        <section style="background-color: #000;"><div class="text-wrap"><h2 class="huge-text" style="text-transform:uppercase">LET'S<br><span class="black" style="color:#fff">BUILD.</span></h2></div></section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Landscapers"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 60 : 100;
            
            if (!isDeleting && charIndex === currentWord.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 500; }
            setTimeout(type, speed);
        }
        window.onload = type;

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val) window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val);
        }

        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        function goToSlide(i) { currentIdx = i; updateUI(); }
    </script>
</body>
</html>
