<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        /* Lock the viewport */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Outfit', sans-serif;
            background: var(--app-white);
            touch-action: none;
        }

        /* The Horizontal Slider */
        #viewport {
            display: flex;
            height: 100%;
            width: 400%; /* 4 sections = 400% */
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            will-change: transform;
        }

        section {
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        .huge-text {
            font-size: clamp(3.5rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.07em;
            text-transform: uppercase;
            text-align: center;
        }

        /* App-Style Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        
        nav * { pointer-events: auto; }

        /* Floating App Dock */
        .app-dock {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 3rem;
            padding: 0.8rem 1.8rem;
            display: flex;
            gap: 2.5rem;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        /* Horizontal Progress Indicator */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 6px;
            background: var(--brand-orange);
            width: 25%;
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 101;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #000; color: #fff; }

        /* Next/Prev Buttons for Desktop */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 100;
            border: none;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: var(--brand-orange); color: white; }
        #prevBtn { left: 2rem; display: none; }
        #nextBtn { right: 2rem; }

    </style>
</head>
<body>

    <div class="progress-bar" id="pBar"></div>

    <nav>
        <div class="text-3xl font-black tracking-tighter">FAZ<span class="accent">.</span></div>
        <div class="flex gap-4">
            <a href="mailto:Fazhoq1977@gmail.com" class="bg-black text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Hire Me</a>
        </div>
    </nav>

    <button class="nav-btn" id="prevBtn" onclick="moveSlide(-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="nav-btn" id="nextBtn" onclick="moveSlide(1)"><i class="fa-solid fa-chevron-right"></i></button>

    <div id="viewport">
        <section>
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">01 / CONCEPT</span>
            <h1 class="huge-text">DIGITAL<br>ARCHITECT<span class="accent">.</span></h1>
            <p class="mt-8 text-gray-300 font-black uppercase text-[10px] tracking-widest">Swipe Side to Explore</p>
        </section>

        <section style="background: #F8F8F8;">
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">02 / PARTNER</span>
            <h2 class="huge-text">I AM<br><span class="accent italic">FAZ HOQ.</span></h2>
            <div class="mt-12 text-center max-w-sm">
                <p class="text-xl font-medium text-gray-500 mb-8">I build platforms that turn local retailers into digital leaders.</p>
                <a href="about-me.html" class="inline-block border-b-4 border-black pb-1 font-black uppercase text-xs">Full Portfolio</a>
            </div>
        </section>

        <section>
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">03 / SOLUTIONS</span>
            <h2 class="huge-text">PREMIUM<br>UI & SEO</h2>
            <div class="mt-12 flex gap-10">
                <div class="text-center">
                    <p class="text-4xl font-black">100%</p>
                    <p class="text-[10px] font-black opacity-40 uppercase">Ownership</p>
                </div>
                <div class="text-center">
                    <p class="text-4xl font-black">72H</p>
                    <p class="text-[10px] font-black opacity-40 uppercase">Support</p>
                </div>
            </div>
        </section>

        <section class="bg-dark">
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">04 / CONNECT</span>
            <h2 class="huge-text">LET'S<br>BUILD<span class="accent">.</span></h2>
            <div class="mt-12">
                <a href="mailto:Fazhoq1977@gmail.com" class="text-2xl md:text-5xl font-black hover:text-[#FF6B2C] transition-colors">
                    Fazhoq1977@gmail.com
                </a>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="text-xl hover:scale-125 transition-transform"><i class="fa-solid fa-comment-dots"></i></a>
        
        <a href="https://wa.me/447706345874" class="relative group">
            <div class="w-14 h-14 bg-[#25D366] rounded-2xl flex items-center justify-center shadow-lg shadow-[#25D366]/20 group-hover:scale-110 transition-all">
                <i class="fa-brands fa-whatsapp text-3xl text-white"></i>
            </div>
        </a>

        <a href="mailto:Fazhoq1977@gmail.com" class="text-xl hover:scale-125 transition-transform"><i class="fa-solid fa-envelope"></i></a>
    </div>

    <script>
        let currentSlide = 0;
        const totalSlides = 4;
        const viewport = document.getElementById('viewport');
        const pBar = document.getElementById('pBar');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        let isMoving = false;

        function moveSlide(direction) {
            if (isMoving) return;
            const target = currentSlide + direction;
            
            if (target >= 0 && target < totalSlides) {
                isMoving = true;
                currentSlide = target;
                
                // Animate Viewport
                viewport.style.transform = `translateX(-${currentSlide * 100}vw)`;
                
                // Animate Progress Bar
                pBar.style.transform = `translateX(${currentSlide * 100}%)`;
                
                // Toggle Desktop Buttons
                prevBtn.style.display = currentSlide === 0 ? 'none' : 'flex';
                nextBtn.style.display = currentSlide === (totalSlides - 1) ? 'none' : 'flex';

                setTimeout(() => { isMoving = false; }, 700);
            }
        }

        // Swipe Detection (Mobile)
        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        window.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) moveSlide(1);  // Swipe Left -> Next
                else moveSlide(-1);         // Swipe Right -> Prev
            }
        });

        // Mouse Wheel (PC - optional but handy)
        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 20) {
                if (e.deltaY > 0) moveSlide(1);
                else moveSlide(-1);
            }
        }, { passive: true });
    </script>
</body>
</html>
