<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FAZ HOQ | SOLO DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
        }

        /* MAIN SLIDE NAVIGATION */
        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: var(--primary-light);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
            overflow-y: auto;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }
        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        /* HEADER */
        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        #menu-btn:hover {
            transform: scale(1.05);
        }

        /* TEXT STYLES */
        .text-wrap {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 320px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            transform: translateY(-20px);
        }

        /* CONCEPT CARDS - TOUCH FRIENDLY */
        .concepts-wrapper {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .cards-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            gap: 20px;
            padding: 40px 20px;
            cursor: grab;
        }

        .cards-container:active {
            cursor: grabbing;
        }

        .cards-container::-webkit-scrollbar {
            display: none;
        }

        .concept-card {
            flex: 0 0 280px;
            height: 380px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.1);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            scroll-snap-align: center;
        }

        .concept-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(255, 107, 0, 0.2);
        }

        .concept-img {
            width: 100%;
            height: 70%;
            background-size: cover;
            background-position: center;
        }

        .concept-info {
            padding: 20px;
            text-align: left;
        }

        .concept-info h4 { 
            font-weight: 900; 
            color: var(--primary); 
            font-size: 1.2rem; 
        }
        .concept-info p { 
            font-size: 0.85rem; 
            font-weight: 700; 
            opacity: 0.5; 
            text-transform: uppercase; 
        }

        /* CARD CONTROLS */
        .card-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .card-nav {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 1px solid rgba(255, 107, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--primary);
        }

        .card-nav:hover {
            background: var(--primary);
            color: white;
        }

        .card-counter {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            background: rgba(255,107,0,0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .card-dots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 300px;
        }

        .card-dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }

        /* BOTTOM DOCK */
        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .dock-btn span {
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 4px;
        }
        
        .dock-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        /* SLIDE INDICATOR DOTS */
        .slide-indicators {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2400;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
        }
        
        .slide-dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            transition: 0.4s;
            cursor: pointer;
        }
        
        .slide-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }

        /* MENU */
        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .close-menu-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            cursor: pointer;
        }

        .nav-hint {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-top: 15px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="close-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
        <div class="flex flex-col items-center justify-center flex-1 gap-10">
            <a href="#" class="huge-text" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="huge-text" onclick="goToSlide(1); toggleMenu()">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="huge-text">HIRE ME</a>
        </div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <div class="slide-indicators">
        <div class="slide-dot active" onclick="goToSlide(0)"></div>
        <div class="slide-dot" onclick="goToSlide(1)"></div>
        <div class="slide-dot" onclick="goToSlide(2)"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <!-- SLIDE 0: HOME -->
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <p class="mt-8 font-black uppercase tracking-[4px] text-xs opacity-40">Independent Web Developer</p>
            </div>
        </section>

        <!-- SLIDE 1: CONCEPTS with HORIZONTAL CARDS -->
        <section>
            <div class="text-wrap">
                <h2 class="huge-text mb-4">VISUAL<br><span class="black">CONCEPTS.</span></h2>
                
                <div class="concepts-wrapper">
                    <div class="cards-container" id="cards-container">
                        <!-- Cards injected by JS -->
                    </div>
                    
                    <div class="card-controls">
                        <div class="card-nav" id="prevCardBtn">
                            <i class="fa-solid fa-chevron-left"></i>
                        </div>
                        <div class="card-counter" id="cardCounter">1 / 0</div>
                        <div class="card-nav" id="nextCardBtn">
                            <i class="fa-solid fa-chevron-right"></i>
                        </div>
                    </div>
                    <div class="card-dots" id="cardDots"></div>
                </div>
                
                <div class="nav-hint">
                    <span><i class="fa-solid fa-arrow-left"></i> <i class="fa-solid fa-arrow-right"></i> Swipe cards horizontally</span>
                    <span><i class="fa-solid fa-arrow-up"></i> <i class="fa-solid fa-arrow-down"></i> Swipe up/down for slides</span>
                </div>
            </div>
        </section>

        <!-- SLIDE 2: COLLABORATE -->
        <section>
            <div class="text-wrap">
                <h2 class="huge-text">READY TO<br><span class="black">COLLABORATE?</span></h2>
                <div class="mt-10 p-6 bg-white rounded-[30px] border border-orange-100 shadow-xl inline-block">
                    <p class="font-bold text-orange-600">Now taking bookings for 2026</p>
                </div>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
    </div>

    <script>
        // Typewriter animation
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Landscapers"];
        let wordIdx = 0;
        let charIdx = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function typeEffect() {
            const currentWord = nicheWords[wordIdx];
            charIdx += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIdx) || "&nbsp;";
            let speed = isDeleting ? 60 : 120;
            if (!isDeleting && charIdx === currentWord.length) {
                speed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                wordIdx = (wordIdx + 1) % nicheWords.length;
                speed = 500;
            }
            setTimeout(typeEffect, speed);
        }

        // Generate concept cards (20 cards for demo)
        const concepts = [
            { title: "Modern Barber", sub: "Branding & Identity", url: "https://doctoc30.github.io/fazhoq/concepts/barber", img: "https://doctoc30.github.io/fazhoq/images/IMG_3070.jpeg" },
            { title: "Legal Suite", sub: "Interface Design", url: "https://doctoc30.github.io/fazhoq/concepts/legal", img: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&w=400" },
            { title: "Fitness Pro", sub: "User Flow", url: "https://doctoc30.github.io/fazhoq/concepts/fitness", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=400" },
            { title: "Trade Flow", sub: "Concept Engineering", url: "https://doctoc30.github.io/fazhoq/concepts/trade", img: "https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=400" },
            { title: "Eco Beauty", sub: "Sustainable Design", url: "#", img: "https://images.unsplash.com/photo-1596462502278-27bfdc1f5295?auto=format&fit=crop&w=400" },
            { title: "Tech Startup", sub: "Digital Identity", url: "#", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=400" },
            { title: "Luxury Hotel", sub: "Hospitality", url: "#", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=400" },
            { title: "Coffee Brand", sub: "Packaging", url: "#", img: "https://images.unsplash.com/photo-1442512595331-e89e73853f31?auto=format&fit=crop&w=400" },
            { title: "Art Gallery", sub: "Exhibition", url: "#", img: "https://images.unsplash.com/photo-1531243269054-5ebf6f34081e?auto=format&fit=crop&w=400" },
            { title: "Med Spa", sub: "Wellness", url: "#", img: "https://images.unsplash.com/photo-1540555700478-4be289fbecef?auto=format&fit=crop&w=400" }
        ];

        let currentCardIndex = 0;
        let cardsContainer = null;
        let isScrolling = false;

        // Initialize cards
        function initCards() {
            cardsContainer = document.getElementById('cards-container');
            if (!cardsContainer) return;
            
            // Build cards
            cardsContainer.innerHTML = concepts.map((c, i) => `
                <div class="concept-card" data-url="${c.url}" data-index="${i}">
                    <div class="concept-img" style="background-image: url('${c.img}')"></div>
                    <div class="concept-info">
                        <h4>${c.title}</h4>
                        <p>${c.sub}</p>
                    </div>
                </div>
            `).join('');
            
            // Add click handlers
            document.querySelectorAll('.concept-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const url = card.getAttribute('data-url');
                    if (url && url !== '#') {
                        window.open(url, '_blank');
                    }
                });
            });
            
            // Add scroll listener
            cardsContainer.addEventListener('scroll', () => {
                if (!isScrolling) {
                    updateActiveCardFromScroll();
                }
            });
            
            updateCardUI();
        }
        
        function updateActiveCardFromScroll() {
            if (!cardsContainer) return;
            
            const cards = document.querySelectorAll('.concept-card');
            const containerCenter = cardsContainer.scrollLeft + cardsContainer.clientWidth / 2;
            
            let closestIndex = 0;
            let closestDist = Infinity;
            
            cards.forEach((card, i) => {
                const cardCenter = card.offsetLeft + card.clientWidth / 2;
                const dist = Math.abs(containerCenter - cardCenter);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestIndex = i;
                }
            });
            
            if (closestIndex !== currentCardIndex) {
                currentCardIndex = closestIndex;
                updateCardUI();
            }
        }
        
        function scrollToCard(index) {
            if (!cardsContainer) return;
            
            const cards = document.querySelectorAll('.concept-card');
            if (!cards[index]) return;
            
            isScrolling = true;
            currentCardIndex = index;
            
            const scrollPos = cards[index].offsetLeft - (cardsContainer.clientWidth / 2) + (cards[index].clientWidth / 2);
            
            cardsContainer.scrollTo({
                left: Math.max(0, scrollPos),
                behavior: 'smooth'
            });
            
            setTimeout(() => {
                isScrolling = false;
                updateCardUI();
            }, 400);
        }
        
        function nextCard() {
            if (currentCardIndex + 1 < concepts.length) {
                scrollToCard(currentCardIndex + 1);
            }
        }
        
        function prevCard() {
            if (currentCardIndex - 1 >= 0) {
                scrollToCard(currentCardIndex - 1);
            }
        }
        
        function updateCardUI() {
            // Update counter
            const counter = document.getElementById('cardCounter');
            if (counter) {
                counter.textContent = `${currentCardIndex + 1} / ${concepts.length}`;
            }
            
            // Update dots
            const dotsContainer = document.getElementById('cardDots');
            if (dotsContainer) {
                let dotsHtml = '';
                for (let i = 0; i < concepts.length; i++) {
                    const isActive = i === currentCardIndex;
                    dotsHtml += `<div class="card-dot ${isActive ? 'active' : ''}" data-dot-index="${i}"></div>`;
                }
                dotsContainer.innerHTML = dotsHtml;
                
                // Add click handlers to dots
                document.querySelectorAll('.card-dot').forEach(dot => {
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(dot.getAttribute('data-dot-index'));
                        if (!isNaN(idx)) {
                            scrollToCard(idx);
                        }
                    });
                });
            }
        }

        // Main slide navigation (VERTICAL)
        let currentSlide = 0;
        const sections = document.querySelectorAll('section');
        const slideDots = document.querySelectorAll('.slide-dot');
        let isSlideMoving = false;
        let touchStartY = 0;
        let touchStartX = 0;

        function updateSlides() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentSlide) {
                    sec.classList.add('active');
                } else if (i < currentSlide) {
                    sec.classList.add('prev');
                }
            });
            slideDots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function navigateSlides(direction) {
            if (isSlideMoving) return;
            const target = currentSlide + direction;
            if (target >= 0 && target < sections.length) {
                isSlideMoving = true;
                currentSlide = target;
                updateSlides();
                setTimeout(() => { isSlideMoving = false; }, 600);
            }
        }

        function goToSlide(index) {
            if (index >= 0 && index < sections.length && !isSlideMoving) {
                currentSlide = index;
                updateSlides();
            }
        }
        
        function toggleMenu() {
            document.getElementById('app-menu-layer').classList.toggle('active');
        }

        // TOUCH HANDLING - Clear separation between horizontal and vertical
        let touchStart = null;
        
        document.addEventListener('touchstart', (e) => {
            touchStart = {
                x: e.touches[0].clientX,
                y: e.touches[0].clientY,
                time: Date.now()
            };
        }, { passive: true });
        
        document.addEventListener('touchend', (e) => {
            if (!touchStart) return;
            
            const deltaX = Math.abs(e.changedTouches[0].clientX - touchStart.x);
            const deltaY = Math.abs(e.changedTouches[0].clientY - touchStart.y);
            const isHorizontalSwipe = deltaX > deltaY && deltaX > 30;
            const isVerticalSwipe = deltaY > deltaX && deltaY > 30;
            
            // Check if swipe started on cards container
            const target = e.changedTouches[0].target;
            const isOnCards = target.closest('.cards-container');
            
            if (isHorizontalSwipe && isOnCards) {
                // Let the native horizontal scroll handle it
                // Just prevent vertical navigation
                e.preventDefault();
            } 
            else if (isVerticalSwipe && !isOnCards) {
                // Vertical navigation for main slides
                const direction = e.changedTouches[0].clientY - touchStart.y;
                if (direction < 0) {
                    navigateSlides(1); // Swipe up = next slide
                } else if (direction > 0) {
                    navigateSlides(-1); // Swipe down = previous slide
                }
            }
            
            touchStart = null;
        });
        
        // Mouse wheel for desktop
        window.addEventListener('wheel', (e) => {
            const isOnCards = e.target.closest('.cards-container');
            if (!isOnCards && Math.abs(e.deltaY) > 30) {
                navigateSlides(e.deltaY > 0 ? 1 : -1);
                e.preventDefault();
            }
        }, { passive: false });
        
        // Keyboard navigation
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                navigateSlides(1);
                e.preventDefault();
            } else if (e.key === 'ArrowUp') {
                navigateSlides(-1);
                e.preventDefault();
            }
        });
        
        // Button handlers
        document.getElementById('prevCardBtn')?.addEventListener('click', prevCard);
        document.getElementById('nextCardBtn')?.addEventListener('click', nextCard);
        
        // Logo click
        document.querySelector('.faz-logo')?.addEventListener('click', () => goToSlide(0));
        
        // Slide dot clicks
        slideDots.forEach((dot, i) => {
            dot.addEventListener('click', () => goToSlide(i));
        });

        // Initialize
        window.onload = () => {
            typeEffect();
            initCards();
            updateSlides();
        };
    </script>
</body>
</html>
