<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
            touch-action: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: transparent; 
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        /* HEADER */
        .faz-nav {
            position: fixed; top: 0; width: 100%; z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--text);
            background: none; border: none; cursor: pointer;
        }

        /* TEXT STYLES */
        .text-wrap { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900; line-height: 0.9; letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 380px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 20px rgba(255,107,0,0.1));
        }

        /* SEARCH BAR */
        .search-container { 
            background: #fff; 
            border-radius: 24px; 
            padding: 8px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.15); 
            width: 95%; 
            max-width: 500px; 
            margin-top: 40px; 
            border: 1px solid rgba(255, 107, 0, 0.1);
        }
        
        .search-container input { 
            flex: 1; border: none; outline: none; padding: 12px 15px; 
            font-size: 1.2rem; font-weight: 700; background: transparent;
        }
        
        .search-icon-btn { 
            width: 50px; height: 50px; background: var(--primary); 
            border-radius: 18px; display: flex; align-items: center; 
            justify-content: center; color: #fff; border: none;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        /* CATEGORIES - TASK 3: Lowering categories to avoid logo overlap */
        .category-header {
            font-size: 0.85rem; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 2px; color: var(--primary); margin-bottom: 25px;
            margin-top: 40px; /* Pushes content down on mobile */
        }

        .category-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 100%; max-width: 600px; margin-bottom: 100px; 
        }

        .category-tile {
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 107, 0, 0.1); 
            border-radius: 30px; padding: 25px 10px; display: flex; flex-direction: column;
            align-items: center; gap: 10px; transition: all 0.2s; cursor: pointer;
        }

        .category-tile:active { transform: scale(0.95); }

        .tile-icon {
            width: 50px; height: 50px; background: var(--primary);
            color: white; border-radius: 15px; display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        .tile-label { font-weight: 900; font-size: 0.95rem; line-height: 1.2; text-align: center; }

        /* DOCK - TASK 1: Fully Branded Orange & Larger Icons */
        .app-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--primary); 
            height: 80px;
            display: flex; justify-content: space-around;
            align-items: center; z-index: 2500;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
        }
        
        .dock-btn { 
            font-size: 2rem; /* Larger CTA icons */
            color: #FFFFFF; 
            transition: 0.3s; 
            display: flex; flex-direction: column; align-items: center;
        }
        .dock-btn span { font-size: 0.7rem; font-weight: 800; margin-top: 4px; }

        /* HAMBURGER MENU - TASK 2: Slide from bottom */
        #app-menu-layer {
            position: fixed; inset: 0; background: var(--primary-light);
            z-index: 9500; display: flex; flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .menu-links { display: flex; flex-direction: column; gap: 20px; flex: 1; justify-content: center; align-items: center; text-align: center; }
        .menu-item { font-size: 3.5rem; font-weight: 900; color: var(--text); text-decoration: none; letter-spacing: -3px; line-height: 1; }
        .close-menu-btn { width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }

        /* NICHE OVERLAY - TASK 4: Duplicated from Vibz */
        #category-layer {
            position: fixed; inset: 0; background: rgba(255, 245, 238, 0.98);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 9600; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 15px;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            padding: 20px;
        }
        #category-layer.active { transform: translateY(0); }
        #cat-title { color: var(--primary); margin-bottom: 20px; font-weight: 900; font-size: 2.2rem; text-align: center; }
        #cat-list { width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; max-height: 60vh; gap: 10px; padding: 10px; }
        .cat-item { font-size: 1.4rem; font-weight: 800; color: var(--text); width: 100%; max-width: 400px; text-align: center; padding: 16px; background: white; border-radius: 60px; border: 1px solid rgba(255, 107, 0, 0.1); cursor: pointer; }

        .nav-dots { position: fixed; right: 1.5rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 1.2rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: 0.4s; }
        .dot.active { background: var(--primary); transform: scale(2.5); }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="menu-header">
            <div class="faz-logo">FAZ HOQ<span>.</span></div>
            <div class="close-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <div class="menu-links">
            <a href="#" class="menu-item" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="menu-item" onclick="goToSlide(1); toggleMenu()">CATEGORIES</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="menu-item">CONTACT</a>
        </div>
    </div>

    <div id="category-layer">
        <h2 id="cat-title">Niche Selection</h2>
        <div id="cat-list"></div>
        <div class="close-menu-btn" onclick="toggleCategories()"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div class="nav-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <div class="search-container">
                    <input type="text" id="mainSearch" placeholder="Search any industry..." onkeypress="if(event.key==='Enter') triggerSearch()">
                    <button class="search-icon-btn" onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap flex-col">
                <h2 class="category-header">Or Select From Popular Categories</h2>
                <div class="category-grid">
                    <div class="category-tile" onclick="openNiche('Health & Wellness')"><div class="tile-icon"><i class="fa-solid fa-heart-pulse"></i></div><span class="tile-label">Health & Wellness</span></div>
                    <div class="category-tile" onclick="openNiche('Home & Trades')"><div class="tile-icon"><i class="fa-solid fa-hammer"></i></div><span class="tile-label">Home & Trades</span></div>
                    <div class="category-tile" onclick="openNiche('Professional')"><div class="tile-icon"><i class="fa-solid fa-briefcase"></i></div><span class="tile-label">Professional Services</span></div>
                    <div class="category-tile" onclick="openNiche('Food & Drink')"><div class="tile-icon"><i class="fa-solid fa-utensils"></i></div><span class="tile-label">Food & Drink</span></div>
                    <div class="category-tile" onclick="openNiche('Retail & Creative')" style="grid-column: span 2; flex-direction: row; padding: 20px; justify-content: center;">
                        <div class="tile-icon"><i class="fa-solid fa-bag-shopping"></i></div>
                        <span class="tile-label" style="margin-left: 15px;">Retail & Creative Industries</span>
                    </div>
                </div>
            </div>
        </section>

        <section><div class="text-wrap"><h2 class="huge-text" style="text-transform:uppercase">STRATEGIC<br><span class="black">PARTNER.</span></h2></div></section>
        <section style="background-color: #000;"><div class="text-wrap"><h2 class="huge-text" style="font-style:italic; text-transform:uppercase">WOW<span>!</span><br><span class="black" style="color:#fff">INTERACTION.</span></h2></div></section>
        <section style="background-color: #000;"><div class="text-wrap"><h2 class="huge-text" style="text-transform:uppercase">LET'S<br><span class="black" style="color:#fff">BUILD.</span></h2></div></section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>

    <script>
        // Task 4: Niche Data Duplication
        const nicheData = {
            "Health & Wellness": ["Barbers", "Dentists", "Gyms & Studios", "Spas & Beauty", "Physiotherapists", "Yoga Instructors", "Therapists"],
            "Home & Trades": ["Plumbers", "Electricians", "Landscapers", "Cleaners", "Roofers", "Carpenters", "Locksmiths"],
            "Professional": ["Lawyers", "Accountants", "Real Estate", "Tutors", "Marketing Agencies", "Consultants"],
            "Food & Drink": ["Restaurants", "Cafes & Coffee", "Bakeries", "Bars & Clubs", "Catering", "Takeaways"],
            "Retail & Creative": ["Boutiques", "E-commerce Stores", "Photographers", "Artists", "Florists", "Pet Shops"]
        };

        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Landscapers"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 60 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 500; }
            setTimeout(type, speed);
        }
        window.onload = type;

        function toggleMenu() { document.getElementById('app-menu-layer').classList.toggle('active'); }
        function toggleCategories() { document.getElementById('category-layer').classList.toggle('active'); }

        function openNiche(sector) {
            const list = document.getElementById('cat-list');
            const title = document.getElementById('cat-title');
            title.textContent = sector;
            list.innerHTML = "";
            nicheData[sector].forEach(niche => {
                const div = document.createElement('div');
                div.className = "cat-item";
                div.textContent = niche;
                div.onclick = () => {
                    document.getElementById('mainSearch').value = niche;
                    toggleCategories();
                    triggerSearch();
                };
                list.appendChild(div);
            });
            toggleCategories();
        }

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val) window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val);
        }

        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        function goToSlide(i) { currentIdx = i; updateUI(); }
    </script>
</body>
</html>
