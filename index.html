<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            font-family: 'Outfit', sans-serif;
            background: #000; /* Background for the "slide behind" effect */
            touch-action: none;
        }

        /* The Container */
        .slide-wrapper {
            position: relative;
            height: 100vh;
            width: 100vw;
            perspective: 1000px;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            z-index: 1;
        }

        /* Section States */
        .slide-next {
            transform: translateX(100%);
            z-index: 2;
        }

        .slide-active {
            transform: translateX(0);
            z-index: 3;
        }

        .slide-prev {
            transform: translateX(-100%);
            z-index: 1;
            opacity: 0;
        }

        .huge-text {
            font-size: clamp(3.5rem, 16vw, 13rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.07em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Nav & Dock */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        nav * { pointer-events: auto; }

        .app-dock {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 3rem;
            padding: 0.8rem 1.8rem;
            display: flex;
            gap: 2.5rem;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #000; color: #fff; }

        /* Progress Line */
        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--brand-orange);
            z-index: 1100;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>

    <div class="progress-line" id="progress"></div>

    <nav>
        <div class="text-2xl font-black tracking-tighter uppercase">FAZ<span class="accent">.</span></div>
        <div class="text-[9px] font-black uppercase tracking-[0.3em] opacity-40">Digital Architect</div>
    </nav>

    <div class="slide-wrapper">
        <section id="s0" class="slide-active">
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">EST. 2026</span>
            <h1 class="huge-text">PREMIUM<br>STORES<span class="accent">.</span></h1>
            <p class="mt-12 text-[10px] font-black uppercase tracking-widest opacity-20">Scroll or Swipe Side</p>
        </section>

        <section id="s1" class="slide-next">
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">THE PARTNER</span>
            <h2 class="huge-text italic">I AM<br>FAZ HOQ.</h2>
            <div class="mt-12 text-center max-w-sm">
                <p class="text-lg font-medium opacity-50 mb-8 leading-tight">Elevating small business to enterprise standards.</p>
                <a href="https://doctoc30.github.io/fazhoq/about-me.html" class="inline-block bg-black text-white px-8 py-3 rounded-full font-black uppercase text-[10px] tracking-widest">About Me</a>
            </div>
        </section>

        <section id="s2" class="slide-next">
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">VALUES</span>
            <h2 class="huge-text">OWN THE<br><span class="accent">CODE.</span></h2>
            <div class="mt-10 flex gap-12">
                <div class="text-center">
                    <p class="text-4xl font-black">FAST</p>
                    <p class="text-[9px] font-black opacity-30 uppercase tracking-widest">Build</p>
                </div>
                <div class="text-center">
                    <p class="text-4xl font-black">CLEAN</p>
                    <p class="text-[9px] font-black opacity-30 uppercase tracking-widest">UX/UI</p>
                </div>
            </div>
        </section>

        <section id="s3" class="slide-next bg-dark">
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">CONTACT</span>
            <h2 class="huge-text">LET'S<br>BUILD<span class="accent">.</span></h2>
            <div class="mt-12">
                <a href="mailto:Fazhoq1977@gmail.com" class="text-2xl md:text-5xl font-black underline decoration-[#FF6B2C] underline-offset-8">
                    Email Me
                </a>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="text-xl hover:scale-125 transition-transform"><i class="fa-solid fa-comment-dots"></i></a>
        
        <a href="https://wa.me/447706345874" class="relative group">
            <div class="w-14 h-14 bg-[#25D366] rounded-2xl flex items-center justify-center shadow-lg shadow-[#25D366]/20 group-hover:scale-110 transition-all">
                <i class="fa-brands fa-whatsapp text-3xl text-white"></i>
            </div>
        </a>

        <a href="mailto:Fazhoq1977@gmail.com" class="text-xl hover:scale-125 transition-transform"><i class="fa-solid fa-envelope"></i></a>
    </div>

    <script>
        let current = 0;
        const total = 4;
        let isMoving = false;
        const progressBar = document.getElementById('progress');

        function updateProgress() {
            progressBar.style.width = ((current + 1) / total) * 100 + "%";
        }

        function navigate(dir) {
            if (isMoving) return;
            let next = current + dir;

            if (next >= 0 && next < total) {
                isMoving = true;
                
                const currentEl = document.getElementById(`s${current}`);
                const nextEl = document.getElementById(`s${next}`);

                if (dir > 0) {
                    // Moving Forward
                    currentEl.className = "slide-prev";
                    nextEl.className = "slide-active";
                } else {
                    // Moving Backward
                    currentEl.className = "slide-next";
                    nextEl.className = "slide-active";
                }

                current = next;
                updateProgress();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        // --- Event Listeners ---

        // Scroll Wheel (Interprets vertical as page swap)
        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 20) {
                navigate(e.deltaY > 0 ? 1 : -1);
            }
        }, { passive: true });

        // Touch Swiping
        let startX = 0;
        let startY = 0;
        window.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            let endX = e.changedTouches[0].clientX;
            let endY = e.changedTouches[0].clientY;
            
            let diffX = startX - endX;
            let diffY = startY - endY;

            // Trigger on either vertical or horizontal swipe
            if (Math.abs(diffX) > 50 || Math.abs(diffY) > 50) {
                if (diffX > 0 || diffY > 0) navigate(1);
                else navigate(-1);
            }
        }, { passive: true });

        updateProgress();
    </script>
</body>
</html>
