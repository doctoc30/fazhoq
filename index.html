        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        * {

            padding: 0;

            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { 
            width: 100%; 
            max-width: 1400px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;

            cursor: pointer;
        }
        .menu-btn {

        .accent { color: var(--brand-orange); }

        /* ========== MASSIVE TEXT SIZE ========== */
        .hero-heading {

            line-height: 1.1;
            letter-spacing: -0.03em;

        }
        
        #typewriter {

        .typewriter-container {

        /* Content group with generous spacing */

        .search-icon-btn {

            width: 42px;
            height: 42px;
        }
        .category-tile[style*="grid-column: span 2"] .tile-label {
            font-size: 0.85rem;
        }

        /* VIBZ ANIMATIONS */
        .fa-heart-pulse { animation: heartbeat 1.5s ease-in-out infinite; }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
        .fa-hammer {
            animation: hammerHit 1.2s ease-in-out infinite;
            transform-origin: bottom center;
        }
        @keyframes hammerHit {
            0% { transform: rotate(0deg) translateY(0); }
            10% { transform: rotate(30deg) translateY(-3px); }
            20% { transform: rotate(-20deg) translateY(0); }
            30% { transform: rotate(0deg) translateY(0); }
            40% { transform: rotate(0deg) translateY(0); }
            100% { transform: rotate(0deg) translateY(0); }
        }
        .fa-briefcase { animation: bounce 2s ease infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .fa-utensils {
            animation: utensilsMove 2.5s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes utensilsMove {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.1); }
            50% { transform: rotate(15deg) scale(0.9); }
            75% { transform: rotate(-5deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .fa-bag-shopping {
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
        }
        @keyframes swing {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        /* SWIPE COUNTER */
        .swipe-counter {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 2000;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: #D1D1D1;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dot.active {
            background: var(--brand-orange);
            height: 28px;
            border-radius: 12px;
        }

        /* CATEGORY LAYER */
        #category-layer {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        #category-layer.active { display: flex; }
        .cat-item { 
            font-size: 1.8rem; font-weight: 900; color: #000; padding: 18px 45px; 
            background: #fff; border: 3px solid #000; border-radius: 60px; 
            margin: 10px; width: 100%; max-width: 450px; text-align: center;

        .close-layer { margin-top: 35px; width: 70px; height: 70px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; }

        /* DOCK */
        .app-dock {
            position: fixed; bottom: max(1.5rem, env(safe-area-inset-bottom) + 0.5rem);
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 5rem;
            padding: 0.9rem 2.5rem; display: flex; gap: 2.8rem; align-items: center; z-index: 2500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
        }
        .dock-btn { font-size: 2rem; color: var(--brand-orange); }

        /* LANDSCAPE ADJUSTMENTS */
        @media (orientation: landscape) {
            .text-wrap { 
                flex-direction: row; 
                text-align: left; 
                justify-content: center; 
                gap: 3rem;

                text-align: left;
            }
            .category-grid { grid-template-columns: repeat(3, 1fr); max-width: 850px; margin-bottom: 40px;}
            .avatar-section { 
                margin-top: 0;
                margin-bottom: 0;
            }
            .waving-hand { 
                height: 65vh; 
                width: auto; 
                max-width: 40vw;
            }
            .search-container { 
                margin-top: 20px; 
                width: 100%; 
                max-width: 580px;
            }
            nav { padding: 1rem 2rem; }
            .hero-heading { font-size: clamp(2.8rem, 9vmin, 5rem); }
            #typewriter { font-size: clamp(2.8rem, 9vmin, 5rem); }
        }
        
        /* Adjust for shorter screens */
        @media (max-height: 700px) {
            .avatar-section {
                margin-top: -1rem;
            }
            .waving-hand {
                width: clamp(320px, 55vw, 450px);
            }
            .hero-heading {
                font-size: clamp(2.5rem, 8vmin, 4.5rem);
            }
            #typewriter {
                font-size: clamp(2.5rem, 8vmin, 4.5rem);
            }
            .search-container {
                margin-top: 16px;
                max-width: 550px;
            }

                padding: 12px 16px;

            }

            }
        }
        
        /* For tall screens, make everything even larger */
        @media (min-height: 800px) {
            .avatar-section {
                margin-top: -2.5rem;
            }
            .waving-hand {
                width: clamp(420px, 70vw, 580px);
            }
            .hero-heading {
                font-size: clamp(3.5rem, 13vmin, 7rem);
            }
            #typewriter {

            }

            }

        /* Extra large desktop */

            }
        }
    </style>
</head>

    <script>
        const nicheData = {
            "Health & Wellness": ["Barbers", "Dentists", "Gyms", "Spas", "Physios"],
            "Home & Trades": ["Plumbers", "Electricians", "Landscapers", "Cleaners"],
            "Professional": ["Lawyers", "Accountants", "Real Estate", "Tutors"],
            "Food & Drink": ["Restaurants", "Cafes", "Bakeries", "Bars"],
            "Retail & Creative": ["Boutiques", "Photographers", "Artists", "Florists"]
        };

        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Artists", "Cafes"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 1800; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 400; }
            setTimeout(type, speed);
        }
        
        // Start typewriter after load
        window.addEventListener('load', () => {
            type();
        });

        function toggleCategories() { 
            document.getElementById('category-layer').classList.toggle('active'); 
        }

        function openNiche(sector) {
            const list = document.getElementById('cat-list');
            document.getElementById('cat-title').textContent = sector;
            list.innerHTML = "";
            nicheData[sector].forEach(niche => {
                const div = document.createElement('div');
                div.className = "cat-item";
                div.textContent = niche;
                div.onclick = () => {
                    document.getElementById('mainSearch').value = niche;
                    toggleCategories();
                    triggerSearch();
                };
                list.appendChild(div);
            });
            toggleCategories();
        }

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val && val.trim() !== "") {
                window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val.trim());
            } else {
                document.getElementById('mainSearch').focus();
            }
        }

        // Swipe navigation
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; 
                currentIdx = target; 
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            if(!e.changedTouches[0]) return;
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        
        function goToSlide(i) { 
            if(i >= 0 && i < sections.length && !isMoving) {
                currentIdx = i; 
                updateUI();
            }
        }
        
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        if(hamburgerBtn) {
            hamburgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleCategories();
            });
        }
        
        // Ensure all category tiles have absolutely no shadow
        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.style.boxShadow = 'none';
        });
        
        updateUI();
    </script>
</body>
</html>
