<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | VIBZ • DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,900&display=swap');
        
        :root {
            /* VIBZ EXACT WARM PALETTE */
            --bg: #fffcf9; /* Warm off-white background */
            --accent: #FF6B00;
            --dark: #121212;
            --text-gray: #4a4a4a;
            --border: #eeeeee;
            /* Vibz Signature Warm Gradient */
            --warm-gradient: radial-gradient(circle at top right, #fff5ee, #ffffff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg) !important; /* Force warm background */
            color: var(--dark);
            touch-action: none;
        }

        .slide-container { 
            position: relative; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: var(--bg) !important;
        }

        section {
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            padding: 2rem;
            /* Warm background for all slides */
            background-color: var(--bg) !important;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        /* Applied to Slide 0 and Slide 4 for the Vibz "glow" effect */
        section.warm-bg {
            background: var(--warm-gradient) !important;
        }

        section.active { 
            transform: translate3d(0, 0, 0); 
            visibility: visible; 
            z-index: 10; 
        }
        
        section.prev { 
            transform: translate3d(-100%, 0, 0); 
            visibility: visible; 
            z-index: 5; 
        }

        .text-wrap { 
            width: 100%; 
            max-width: 1200px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
        }

        .huge-text {
            font-size: clamp(2.2rem, 9vmin, 4.8rem);
            font-weight: 900; 
            line-height: 1.1; 
            letter-spacing: -0.03em;
            color: var(--dark);
        }

        .accent { color: var(--accent); }

        .waving-hand {
            width: clamp(250px, 70vw, 420px);
            height: auto;
            margin-top: -40px;
            margin-bottom: 10px;
            filter: drop-shadow(0 12px 18px rgba(0,0,0,0.05));
            animation: wave 2.5s infinite ease-in-out;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* SEARCH BAR */
        .search-container { 
            background: #fff; 
            border-radius: 100px; 
            padding: 4px;
            display: flex; 
            align-items: center; 
            box-shadow: 0 20px 35px -12px rgba(255, 107, 0, 0.2); 
            width: 95%; 
            max-width: 540px; 
            margin-top: 30px; 
            border: 2px solid var(--accent);
            overflow: hidden;
        }
        .search-container input { 
            flex: 1; 
            border: none; 
            outline: none; 
            padding: 14px 22px; 
            font-size: 1rem; 
            font-weight: 600; 
            background: transparent;
            color: var(--dark);
        }
        
        .search-icon-btn { 
            width: 52px; height: 52px; 
            background: var(--accent); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; justify-content: center; 
            color: white; border: none;
            margin-right: 4px;
        }

        /* CATEGORY SECTION */
        .category-header {
            color: var(--accent);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            margin-top: 70px;
            margin-bottom: 1.8rem;
        }

        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1.2rem; 
            width: 100%; 
            max-width: 560px;
        }

        .category-tile {
            background: #ffffff; 
            border: 2px solid var(--border); 
            border-radius: 28px;
            padding: 1.8rem 1rem; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 1rem; 
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .category-tile:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 22px 35px rgba(255,107,0,0.12);
        }
        .tile-icon {
            width: 64px; height: 64px; 
            background: var(--accent);
            color: white; border-radius: 22px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem;
        }
        .tile-label { font-weight: 900; font-size: 0.95rem; color: var(--dark); }

        /* NAVIGATION DOTS */
        .nav-dots { 
            position: fixed; 
            right: 1.5rem; 
            top: 50%; 
            transform: translateY(-50%); 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            gap: 1.2rem; 
        }
        .dot { 
            width: 8px; height: 8px; 
            border-radius: 50%; 
            background: rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
        }
        .dot.active { 
            background: var(--accent); 
            transform: scale(2.5); 
        }

        /* APP DOCK */
        .app-dock {
            position: fixed; 
            bottom: 2rem;
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px); 
            border-radius: 5rem;
            padding: 0.8rem 2.2rem; 
            display: flex; 
            gap: 2rem;
            z-index: 2500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,107,0,0.15);
        }
        .dock-btn { font-size: 1.7rem; color: var(--accent); }
    </style>
</head>
<body>

                        <div class="tile-icon"><i class="fa-solid fa-utensils"></i></div>

                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">

                    <span class="cursor-pointer px-8 py-4 rounded-2xl font-bold text-lg border-2" style="border-color: var(--accent); color: var(--accent);" onclick="window.location.href='mailto:Fazhoq1977@gmail.com'">Email Faz</span>

    </div>

    <div class="app-dock">

    </div>

    <script>
        // Typewriter Logic
        const nicheWords = ["Plumbers.", "Barbers.", "Lawyers.", "Dentists.", "Gyms."];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            if (!isDeleting) {
                charIndex++;
                typewriterEl.innerHTML = currentWord.substring(0, charIndex);
            } else {
                charIndex--;
                typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            }
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 400; }
            setTimeout(type, speed);
        }
        window.onload = type;

        // Navigation Logic
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        window.addEventListener('wheel', e => navigate(e.deltaY > 0 ? 1 : -1));
        
        let touchStartY = 0;
        window.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
        window.addEventListener('touchend', e => {
            const diffY = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(diffY) > 50) navigate(diffY > 0 ? 1 : -1);
        });

        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.addEventListener('click', () => {
                let niche = tile.getAttribute('data-niche');
                window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(niche);
            });
        });
    </script>
