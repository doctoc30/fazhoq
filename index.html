<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #F2F2F7;
        }

        /* Prevent all native scrolling */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Outfit', sans-serif;
            background: var(--app-white);
            touch-action: none; /* Disables native mobile bounce */
        }

        /* Container that holds all slides */
        #main-slider {
            height: 100%;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        .huge-text {
            font-size: clamp(3.5rem, 18vw, 14rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.06em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Minimal Header */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        
        nav * { pointer-events: auto; }

        /* App Dock - Fixed to bottom */
        .app-dock {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 2.5rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* Progress Dots */
        .dots {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 100;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #000;
            opacity: 0.15;
            transition: all 0.4s ease;
        }

        .dot.active {
            opacity: 1;
            transform: scale(1.5);
            background: var(--brand-orange);
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #000; color: #fff; }

    </style>
</head>
<body>

    <nav>
        <div class="text-2xl font-black tracking-tighter">FAZ<span class="accent">.</span></div>
        <div class="hidden md:flex gap-10 text-[10px] font-black uppercase tracking-widest opacity-40">
            <a href="about-me.html" class="hover:text-orange-500">About</a>
            <a href="pricing.html" class="hover:text-orange-500">Pricing</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="hover:text-orange-500">Hire</a>
        </div>
    </nav>

    <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="main-slider">
        <section>
            <span class="text-[10px] font-black tracking-[0.5em] accent mb-6">READY TO SCALE</span>
            <h1 class="huge-text">PREMIUM<br>STORES<span class="accent">.</span></h1>
            <p class="mt-8 text-gray-400 font-medium tracking-tight">Swipe up to begin.</p>
        </section>

        <section>
            <h2 class="huge-text italic">FAZ<br>HOQ.</h2>
            <div class="mt-10 text-center max-w-sm">
                <p class="text-lg font-medium opacity-60 mb-8 leading-tight">I bridge the gap between local retail and high-end digital architecture.</p>
                <a href="about-me.html" class="bg-black text-white px-10 py-4 rounded-full font-black uppercase text-[10px] tracking-widest hover:bg-[#FF6B2C] transition-all">
                    The About Page
                </a>
            </div>
        </section>

        <section>
            <h2 class="huge-text">ELITE<br><span class="accent">UI/UX</span></h2>
            <div class="mt-8 grid grid-cols-2 gap-4 w-full max-w-lg">
                <div class="p-6 bg-white rounded-[2rem] shadow-sm text-center">
                    <i class="fa-solid fa-bolt accent text-2xl mb-2"></i>
                    <p class="text-[10px] font-black uppercase">Rapid Dev</p>
                </div>
                <div class="p-6 bg-white rounded-[2rem] shadow-sm text-center">
                    <i class="fa-solid fa-gem accent text-2xl mb-2"></i>
                    <p class="text-[10px] font-black uppercase">Modern Style</p>
                </div>
            </div>
        </section>

        <section class="bg-dark">
            <h2 class="huge-text">LET'S<br>START.</h2>
            <a href="mailto:Fazhoq1977@gmail.com" class="mt-10 text-xl md:text-3xl font-black border-b-4 border-[#FF6B2C] pb-2">
                Fazhoq1977@gmail.com
            </a>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="text-xl hover:scale-125 transition-transform"><i class="fa-solid fa-comment-dots"></i></a>
        
        <a href="https://wa.me/447706345874" class="relative group">
            <div class="w-14 h-14 bg-[#25D366] rounded-2xl flex items-center justify-center shadow-lg shadow-[#25D366]/30 group-hover:scale-110 transition-all">
                <i class="fa-brands fa-whatsapp text-3xl text-white"></i>
            </div>
        </a>

        <a href="mailto:Fazhoq1977@gmail.com" class="text-xl hover:scale-125 transition-transform"><i class="fa-solid fa-envelope"></i></a>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        const slider = document.getElementById('main-slider');
        let isTransitioning = false;

        function goToSlide(index) {
            if (index < 0 || index >= slides.length || isTransitioning) return;
            
            isTransitioning = true;
            currentSlide = index;
            
            // Move the container
            slider.style.transform = `translateY(-${currentSlide * 100}%)`;
            
            // Update dots
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });

            setTimeout(() => { isTransitioning = false; }, 800);
        }

        // Handle Wheel (PC)
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) goToSlide(currentSlide + 1);
            else goToSlide(currentSlide - 1);
        });

        // Handle Touch (Mobile)
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            if (touchStartY - touchEndY > 50) goToSlide(currentSlide + 1); // Swipe Up
            if (touchStartY - touchEndY < -50) goToSlide(currentSlide - 1); // Swipe Down
        });
    </script>
</body>
</html>
