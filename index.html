        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none; /* Prevents browser bounce */
            -webkit-user-select: none;
        }

        .slide-container { 
            position: relative; height: 100%; width: 100%; 
            overflow: hidden; touch-action: none; 
        }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 1.5rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            visibility: hidden;
            will-change: transform;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 1200px; text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; }

        .huge-text {
            font-size: clamp(2rem, 8vmin, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* BRANDED TILES - REDUCED SIZE */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            width: 100%;
            max-width: 400px;
            margin-top: 1.5rem;
        }

        .category-tile {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 1.2rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            text-decoration: none;
            color: #000;
        }

        .tile-icon {
            width: 45px;
            height: 45px;
            background: var(--brand-orange);
            color: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .tile-label { font-weight: 900; font-size: 0.85rem; line-height: 1.2; }

        .full-tile {
            grid-column: span 2;
            flex-direction: row;
            padding: 1rem 1.5rem;
            justify-content: center;
            gap: 1rem;
        }

        /* SEARCH & HERO */
        .waving-hand {
            width: clamp(240px, 60vw, 380px);
            height: auto;
            margin-top: -60px;
            mix-blend-mode: multiply; 
        }

        .search-container { 
            background: #fff; border-radius: 100px; padding: 6px; display: flex; align-items: center; 
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15); width: 90%; max-width: 450px; 
            margin: 25px auto 0; border: 2.5px solid #000;
        }

        .search-container input { flex: 1; border: none; outline: none; padding: 10px 15px; font-size: 1rem; font-weight: 800; }
        .search-icon-btn { width: 42px; height: 42px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; }

        /* DOTS & DOCK */
        .nav-dots { position: fixed; right: 1rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 0.8rem; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.15); transition: 0.3s; }
        .dot.active { background: var(--brand-orange); transform: scale(2.2); }

        .app-dock {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            border-radius: 5rem; padding: 0.6rem 2rem; display: flex; gap: 2rem; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .dock-btn { font-size: 1.5rem; color: var(--brand-orange); }
    </style>
</head>

    <script>
        // TYPEWRITER
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');
        function type() {
            const currentWord = nicheWords[wordIndex];
            if (isDeleting) charIndex--; else charIndex++;
            const str = currentWord.substring(0, charIndex);
            typewriterEl.innerHTML = str === "" ? "&nbsp;" : str;
            let typeSpeed = isDeleting ? 40 : 80;
            if (!isDeleting && charIndex === currentWord.length) { typeSpeed = 1800; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; typeSpeed = 400; }
            setTimeout(type, typeSpeed);
        }
        window.onload = type;

        // SNAPPY NAVIGATION
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
            document.body.style.backgroundColor = sections[currentIdx].classList.contains('bg-dark') ? "#050505" : "#fff";
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 600);
            }
        }

        // REWRITTEN TOUCH HANDLER FOR SWIPE
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        window.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let diffX = touchStartX - touchEndX;
            let diffY = touchStartY - touchEndY;

            // Priority horizontal swipe
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 40) navigate(diffX > 0 ? 1 : -1);
            } else {
                if (Math.abs(diffY) > 40) navigate(diffY > 0 ? 1 : -1);
            }
        }, {passive: true});

        window.addEventListener('wheel', e => { if (Math.abs(e.deltaY) > 5) navigate(e.deltaY > 0 ? 1 : -1); });
        function goToSlide(index) { currentIdx = index; updateUI(); }
    </script>
