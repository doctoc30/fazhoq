<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 1200px; text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; }

        /* Unified Font Size for Hero and Typewriter */
        .hero-title {
            font-size: clamp(2.5rem, 10vmin, 5.5rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
            text-transform: none; /* Allows manual sentence case */
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* AVATAR POSITIONING */
        .waving-hand {
            width: clamp(250px, 45vh, 420px);
            height: auto;
            transform-origin: bottom center;
            animation: wave 2.5s infinite ease-in-out;
            display: block;
            pointer-events: none;
            mix-blend-mode: multiply; 
            margin-top: -60px; /* Pulls avatar up in portrait */
            margin-bottom: 10px;
        }

        /* LANDSCAPE SPECIFIC: Center Avatar */
        @media (orientation: landscape) {
            .waving-hand { 
                width: clamp(150px, 25vh, 280px); 
                margin-top: 0; /* Centered vertically in the flex container */
                margin-bottom: 15px;
            }
            .hero-title { font-size: clamp(2rem, 8vh, 4rem); }
        }

        /* SEARCH BAR */
        .search-container { 
            background: #fff; 
            border-radius: 100px; 
            padding: 5px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            width: 90%;
            max-width: 400px; 
            margin: 30px auto 0;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .search-container input { 
            flex: 1; border: none; outline: none; 
            padding: 10px 15px; font-size: 1rem; 
            font-weight: 600; background: transparent; color: #000;
        }

        .search-icon-btn { 
            width: 40px; height: 40px; 
            background: var(--brand-orange); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            color: #fff; cursor: pointer; border: none; 
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg) scale(1); }
            10% { transform: rotate(6deg) scale(1.02); }
            20% { transform: rotate(-4deg) scale(1.02); }
            50% { transform: rotate(4deg) scale(1); }
        }

        /* DOCK */
        .app-dock {
            position: fixed; bottom: max(2rem, env(safe-area-inset-bottom) + 1rem);
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px); border-radius: 5rem;
            padding: 0.8rem 2.2rem; display: flex; gap: 2.5rem;
            align-items: center; z-index: 1000;
            box-shadow: 0 15px 45px rgba(0,0,0,0.12);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .dock-btn { font-size: 1.6rem; color: var(--brand-orange); }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.1); }
        .dot.active { background: var(--brand-orange); transform: scale(2.5); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1500] p-8 md:p-12 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter uppercase cursor-pointer" onclick="goToSlide(0)">FAZ HOQ<span class="accent">.</span></div>
        <button class="md:hidden text-2xl" id="menu-btn"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div class="nav-dots fixed right-5 top-1/2 -translate-y-1/2 z-[1000] flex flex-col gap-4">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz Hoq" class="waving-hand">
                <h1 class="hero-title">I build websites for:</h1>
                <div class="hero-title accent" id="typewriter"></div>
                
                <div class="search-container">
                    <input type="text" id="mainSearch" placeholder="Search industry..." onkeypress="if(event.key==='Enter') triggerSearch()">
                    <button class="search-icon-btn" onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </section>

        <section><div class="text-wrap"><h2 class="hero-title">Strategic<br><span class="accent">Partner.</span></h2></div></section>
        <section class="bg-dark"><div class="text-wrap"><h2 class="hero-title italic">Wow<span class="accent">!</span><br>Interaction.</h2></div></section>
        <section><div class="text-wrap"><h2 class="hero-title">Clean<br><span class="accent">Code.</span></h2></div></section>
        <section class="bg-dark"><div class="text-wrap"><h2 class="hero-title">Let's<br><span class="accent">Build.</span></h2><div class="mt-8"><a href="mailto:Fazhoq1977@gmail.com" class="text-2xl font-black border-b-2 border-[#FF6B2C] pb-2">Contact Me</a></div></div></section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const nicheWords = [
            "Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Restaurants", "Architects", 
            "Physios", "Roofers", "Cafes", "Bakeries", "Accountants", "Personal Trainers", "Painters", 
            "Locksmiths", "Florists", "Pet Shops", "Boutiques", "E-commerce", "Photographers", "Artists",
            "Tutors", "Marketing Agencies", "Consultants", "Real Estate", "Mechanics", "Yoga Studios",
            "Spas", "Beauticians", "Landscapers", "Cleaners", "Carpenters", "Handymen", "Chauffeurs",
            "IT Support", "Solar Installers", "Glaziers", "Scaffolders", "Interior Designers", "Event Planners",
            "DJs", "Caterers", "Opticians", "Vets", "Dog Walkers", "Daycares", "Driving Schools", "Recruitment",
            "Tattoo Artists", "Jewellers", "Tailors", "Music Schools", "Dance Studios", "Coaches", "Therapists",
            "Chiropractors", "Plasterers", "Paving Experts", "Pool Builders", "Garden Centers", "Wine Bars",
            "Steakhouses", "Sushi Bars", "Pizza Shops", "Aestheticians", "Barber Shops", "Hair Salons",
            "Nail Bars", "Bridal Shops", "Tech Startups", "SaaS Companies", "Crypto Projects", "Estate Agents",
            "Charities", "Churches", "Private Chefs", "Language Schools", "Travel Agents", "Car Rentals",
            "Moving Companies", "Self Storage", "Pest Control", "Ironing Services", "Window Cleaners",
            "Gutter Cleaners", "Ironmongers", "Cycle Shops", "Vape Shops", "Gift Shops", "Antique Dealers",
            "Home Cinemas", "Smart Home Pros", "Air Conditioning", "Surgeons", "Dog Groomers", "Podiatrists"
        ];

        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            if (isDeleting) {
                typewriterEl.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterEl.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 40 : 80;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 1800;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % nicheWords.length;
                typeSpeed = 400;
            }
            setTimeout(type, typeSpeed);
        }

        window.onload = () => { type(); };

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value.trim();
            if(val) window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val);
        }

        // SLIDE ENGINE
        const wrapper = document.getElementById('master-wrapper');
        const sections = wrapper.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0; let isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
            const isDark = sections[currentIdx].classList.contains('bg-dark');
            document.body.style.backgroundColor = isDark ? "#050505" : "#fff";
            document.body.style.color = isDark ? "#fff" : "#000";
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        function goToSlide(index) { currentIdx = index; updateUI(); }

        let startX = 0, startY = 0;
        window.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: false });
        window.addEventListener('touchend', e => {
            const dX = startX - e.changedTouches[0].clientX;
            const dY = startY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 40 || Math.abs(dY) > 40) {
                if (Math.abs(dX) > Math.abs(dY)) navigate(dX > 0 ? 1 : -1);
                else navigate(dY > 0 ? 1 : -1);
            }
        }, { passive: false });
        window.addEventListener('wheel', e => { if (Math.abs(e.deltaY) > 10) navigate(e.deltaY > 0 ? 1 : -1); }, { passive: true });
    </script>
</body>
</html>
