<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | SOLO WEB ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --card-bg: rgba(255, 255, 255, 0.9);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
        }

        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: transparent;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }
        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        /* HEADER */
        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--text);
            background: none;
            border: none;
            cursor: pointer;
        }

        /* TEXT STYLES */
        .text-wrap {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 320px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
        }

        /* CONSTANT SLIDER */
        .slider-viewport {
            width: 100vw;
            overflow: hidden;
            padding: 40px 0;
            position: relative;
        }

        .slider-track {
            display: flex;
            width: fit-content;
            animation: scroll 30s linear infinite;
        }

        .concept-card {
            width: 280px;
            height: 380px;
            background: white;
            margin: 0 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 0, 0.1);
            flex-shrink: 0;
        }

        .concept-img {
            width: 100%;
            height: 70%;
            background: #f0f0f0;
            background-size: cover;
            background-position: center;
        }

        .concept-info {
            padding: 20px;
            text-align: left;
        }

        .concept-info h4 { font-weight: 900; color: var(--primary); font-size: 1.2rem; margin-bottom: 4px; }
        .concept-info p { font-size: 0.85rem; font-weight: 700; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* DOCK (EXACT RETAINED) */
        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .dock-btn span {
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 4px;
        }

        /* SWIPE DOTS */
        .swipe-counter {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2400;
            background: rgba(255,255,255,0.8);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.15);
            border-radius: 50%;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }

        /* MENU LAYER */
        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .close-menu-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="close-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
        <div class="flex flex-col items-center justify-center flex-1 gap-10">
            <a href="#" class="huge-text" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="huge-text" onclick="goToSlide(1); toggleMenu()">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="huge-text">HIRE ME</a>
        </div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div class="swipe-counter">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I architect custom:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <p class="mt-8 font-black uppercase tracking-[4px] text-xs opacity-40">Independent Digital Developer</p>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text mb-6">FRESH<br><span class="black">CONCEPTS.</span></h2>
                <div class="slider-viewport">
                    <div class="slider-track" id="slider-track">
                        </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text">LET'S BUILD<br><span class="black">SOMETHING.</span></h2>
                <div class="mt-10 p-6 bg-white rounded-[30px] border border-orange-100 shadow-xl inline-block">
                    <p class="font-bold text-orange-600">Available for new projects</p>
                </div>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>

    <script>
        // --- TYPEWRITER CONFIG ---
        const words = ["Web Apps", "Portfolios", "E-commerce", "SaaS Tools", "Dashboards", "UX Systems"];
        let wordIdx = 0;
        let charIdx = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function typeEffect() {
            const currentWord = words[wordIdx];
            if (isDeleting) {
                charIdx--;
            } else {
                charIdx++;
            }

            typewriterEl.innerHTML = currentWord.substring(0, charIdx) || "&nbsp;";

            let speed = isDeleting ? 60 : 120;

            if (!isDeleting && charIdx === currentWord.length) {
                speed = 2000; // Pause at end
                isDeleting = true;
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                wordIdx = (wordIdx + 1) % words.length;
                speed = 500; // Pause before next word
            }

            setTimeout(typeEffect, speed);
        }

        // --- SLIDER CONTENT ---
        const concepts = [
            { title: "Dark UI Kit", sub: "Web Concept", img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=400" },
            { title: "Luxury Retail", sub: "E-Commerce", img: "https://images.unsplash.com/photo-1522542550221-31fd19575a2d?auto=format&fit=crop&w=400" },
            { title: "Finance App", sub: "Digital Product", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=400" },
            { title: "Artist Space", sub: "Portfolio", img: "https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=400" }
        ];

        function initSlider() {
            const track = document.getElementById('slider-track');
            const items = [...concepts, ...concepts]; // Double for seamless loop
            track.innerHTML = items.map(c => `
                <div class="concept-card">
                    <div class="concept-img" style="background-image: url('${c.img}')"></div>
                    <div class="concept-info"><h4>${c.title}</h4><p>${c.sub}</p></div>
                </div>
            `).join('');
        }

        // --- NAVIGATION LOGIC ---
        let currentIdx = 0;
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        function goToSlide(i) {
            currentIdx = i;
            updateUI();
        }

        function toggleMenu() {
            document.getElementById('app-menu-layer').classList.toggle('active');
        }

        // --- EVENT LISTENERS ---
        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX;
            let dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) {
                if (Math.abs(dY) > Math.abs(dX)) navigate(dY > 0 ? 1 : -1);
            }
        });

        window.addEventListener('wheel', e => {
            if (Math.abs(e.deltaY) > 50) navigate(e.deltaY > 0 ? 1 : -1);
        });

        window.onload = () => {
            typeEffect();
            initSlider();
        };
    </script>
</body>
</html>
