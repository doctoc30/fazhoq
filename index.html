<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* HEADER - TASK 2: Bigger Logo and Menu */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1500;
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent;
        }
        .nav-logo { font-size: 2rem; font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; }
        .nav-menu-btn { font-size: 2.2rem; }

        .huge-text {
            font-size: clamp(2.2rem, 9vmin, 4.8rem);
            font-weight: 900; line-height: 1.1; letter-spacing: -0.05em;
        }

        .accent { color: var(--brand-orange); }

        /* SEARCH BAR - TASK 1: Centered and Pushed Up */
        .content-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-container { 
            background: #fff; 
            border-radius: 100px; 
            padding: 6px;
            display: flex; 
            align-items: center; 
            width: 95%; 
            max-width: 500px; 
            margin-top: -10px; /* Pushed up */
            border: 3px solid #000; 
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        .search-container input { 
            flex: 1; 
            border: none; 
            outline: none; 
            padding: 12px 15px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            background: transparent;
            min-width: 0;
            text-align: center; /* Center placeholder/text */
        }
        .search-icon-btn { 
            flex-shrink: 0; 
            width: 48px; 
            height: 48px; 
            background: #000; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            border: none; 
            cursor: pointer;
        }

        /* CATEGORY TILES - TASK 3 & 4: Smaller and Flat Outline */
        .category-header {
            color: var(--brand-orange); font-weight: 900; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 0.05em; margin-top: 80px; margin-bottom: 1.2rem;
        }

        .category-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; 
            width: 100%; max-width: 450px; margin-bottom: 100px; 
        }

        .category-tile {
            background: #fff; 
            border: 2px solid #000; /* Thin border outline */
            border-radius: 15px;
            padding: 1.2rem 0.8rem; /* Smaller padding */
            display: flex; flex-direction: column;
            align-items: center; gap: 0.6rem; 
            box-shadow: none; /* Removed shades */
            transition: transform 0.2s;
            cursor: pointer;
        }
        .category-tile:active { transform: scale(0.95); background: #f9f9f9; }
        .tile-icon { width: 45px; height: 45px; background: var(--brand-orange); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .tile-label { font-weight: 900; font-size: 0.85rem; line-height: 1.2; color: #000; }

        /* SWIPE COUNTER */
        .swipe-counter {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 2000;
        }
        .dot { width: 8px; height: 8px; background: #D1D1D1; border-radius: 50%; transition: all 0.4s; }
        .dot.active { background: var(--brand-orange); height: 24px; border-radius: 10px; }

        /* LAYER */
        #category-layer {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        #category-layer.active { display: flex; }
        .cat-item { 
            font-size: 1.5rem; font-weight: 900; color: #000; padding: 15px 40px; 
            background: #fff; border: 3px solid #000; border-radius: 50px; 
            margin: 8px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 0 #000; transition: 0.1s;
        }
        .cat-item:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }

        /* AVATAR */
        .waving-hand { width: clamp(220px, 60vw, 350px); height: auto; mix-blend-mode: multiply; margin-bottom: 10px; }

        /* DOCK */
        .app-dock {
            position: fixed; bottom: max(1.5rem, env(safe-area-inset-bottom) + 0.5rem);
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 5rem;
            padding: 0.8rem 2.2rem; display: flex; gap: 2.5rem; align-items: center; z-index: 2500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
        }
        .dock-btn { font-size: 1.7rem; color: var(--brand-orange); }

        /* LANDSCAPE FIXES */
        @media (orientation: landscape) {
            .text-wrap { flex-direction: row; text-align: left; justify-content: center; gap: 2rem; }
            .category-grid { grid-template-columns: repeat(3, 1fr); max-width: 650px; }
            .waving-hand { height: 50vh; width: auto; }
            .search-container { margin-top: 5px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo" onclick="goToSlide(0)">FAZ HOQ<span class="accent">.</span></div>
        <button class="nav-menu-btn"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div class="swipe-counter">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="category-layer">
        <h2 id="cat-title" class="huge-text accent mb-6">Niche</h2>
        <div id="cat-list" class="flex flex-col items-center w-full"></div>
        <div class="mt-8 text-3xl" onclick="toggleCategories()"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz Hoq" class="waving-hand">
                
                <div class="content-group">
                    <h1 class="huge-text">I build websites for:</h1>
                    <div class="huge-text accent" id="typewriter">&nbsp;</div>
                    <div class="search-container">
                        <input type="text" id="mainSearch" placeholder="Search industry..." onkeypress="if(event.key==='Enter') triggerSearch()">
                        <button class="search-icon-btn" onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <div class="flex flex-col items-center w-full">
                    <h2 class="category-header">OR SELECT FROM POPULAR CATEGORIES</h2>
                    <div class="category-grid">
                        <div class="category-tile" onclick="openNiche('Health & Wellness')">
                            <div class="tile-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                            <span class="tile-label">Health & Wellness</span>
                        </div>
                        <div class="category-tile" onclick="openNiche('Home & Trades')">
                            <div class="tile-icon"><i class="fa-solid fa-hammer"></i></div>
                            <span class="tile-label">Home & Trades</span>
                        </div>
                        <div class="category-tile" onclick="openNiche('Professional')">
                            <div class="tile-icon"><i class="fa-solid fa-briefcase"></i></div>
                            <span class="tile-label">Professional</span>
                        </div>
                        <div class="category-tile" onclick="openNiche('Food & Drink')">
                            <div class="tile-icon"><i class="fa-solid fa-utensils"></i></div>
                            <span class="tile-label">Food & Drink</span>
                        </div>
                        <div class="category-tile" style="grid-column: span 2; flex-direction: row; justify-content: center;" onclick="openNiche('Retail & Creative')">
                            <div class="tile-icon"><i class="fa-solid fa-bag-shopping"></i></div>
                            <span class="tile-label ml-4">Retail & Creative</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-dark text-white">
            <div class="text-wrap">
                <h2 class="huge-text uppercase">LET'S<br><span class="accent">BUILD.</span></h2>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const nicheData = {
            "Health & Wellness": ["Barbers", "Dentists", "Gyms", "Spas", "Physios"],
            "Home & Trades": ["Plumbers", "Electricians", "Landscapers", "Cleaners"],
            "Professional": ["Lawyers", "Accountants", "Real Estate", "Tutors"],
            "Food & Drink": ["Restaurants", "Cafes", "Bakeries", "Bars"],
            "Retail & Creative": ["Boutiques", "Photographers", "Artists", "Florists"]
        };

        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 1800; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 400; }
            setTimeout(type, speed);
        }
        window.onload = type;

        function toggleCategories() { document.getElementById('category-layer').classList.toggle('active'); }

        function openNiche(sector) {
            const list = document.getElementById('cat-list');
            document.getElementById('cat-title').textContent = sector;
            list.innerHTML = "";
            nicheData[sector].forEach(niche => {
                const div = document.createElement('div');
                div.className = "cat-item";
                div.textContent = niche;
                div.onclick = () => {
                    document.getElementById('mainSearch').value = niche;
                    toggleCategories();
                    triggerSearch();
                };
                list.appendChild(div);
            });
            toggleCategories();
        }

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val) window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val);
        }

        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        function goToSlide(i) { currentIdx = i; updateUI(); }
    </script>
</body>
</html>
