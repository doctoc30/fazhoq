<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DRIVING SCHOOL DIGITAL STRATEGIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --card-bg: rgba(255, 255, 255, 0.9);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
        }

        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: transparent;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
            overflow-y: auto;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }
        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        /* HEADER */
        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--text);
            background: none;
            border: none;
            cursor: pointer;
        }

        /* TEXT STYLES */
        .text-wrap {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 380px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 20px rgba(255,107,0,0.1));
        }

        /* ANIMATIONS */
        .fa-car { animation: drive 2s ease-in-out infinite; }
        @keyframes drive {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        
        .fa-bolt { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* LAYOUTS */
        .mobile-only-layout { display: flex; flex-direction: column; align-items: center; }
        .desktop-only-layout { display: none; }

        @media (min-width: 769px) and (orientation: landscape) {
            .mobile-only-layout { display: none !important; }
            .desktop-only-layout { display: flex !important; flex-direction: column; align-items: center; }
            .desktop-hero-row { display: flex; align-items: center; gap: 2rem; }
        }

        /* CATEGORIES */
        .category-header {
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 100px;
        }

        .category-tile {
            background: var(--card-bg);
            border: 1px solid rgba(255, 107, 0, 0.1);
            border-radius: 30px;
            padding: 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .category-tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,107,0,0.1);
            border-color: var(--primary);
        }

        .tile-icon {
            width: 55px;
            height: 55px;
            background: var(--primary);
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .tile-label { font-weight: 900; font-size: 0.95rem; text-align: center; }

        /* DOCK */
        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }
        .dock-btn span { font-size: 0.7rem; font-weight: 800; margin-top: 4px; }

        .swipe-counter {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2400;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
        }
        
        .counter-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.2); }
        .counter-dot.active { background: var(--primary); width: 24px; border-radius: 12px; }

        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="flex justify-between items-center mb-10">
            <div class="faz-logo">FAZ HOQ<span>.</span></div>
            <button onclick="toggleMenu()" class="text-3xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex flex-col gap-8 items-center text-center">
            <a href="#" class="text-5xl font-black" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="text-5xl font-black" onclick="goToSlide(1); toggleMenu()">SERVICES</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="text-5xl font-black">CONTACT</a>
        </div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div class="swipe-counter" id="swipeCounter"></div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap mobile-only-layout">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter-mobile">&nbsp;</div>
            </div>
            
            <div class="text-wrap desktop-only-layout">
                <div class="desktop-hero-row">
                    <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                    <div class="text-left">
                        <h1 class="huge-text">I build websites for:</h1>
                        <div class="huge-text black" id="typewriter-desktop">&nbsp;</div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="category-header">Specialist Instructor Solutions</h2>
                <div class="category-grid">
                    <div class="category-tile">
                        <div class="tile-icon"><i class="fa-solid fa-car"></i></div>
                        <span class="tile-label">Solo Instructors</span>
                    </div>
                    <div class="category-tile">
                        <div class="tile-icon"><i class="fa-solid fa-users"></i></div>
                        <span class="tile-label">Driving Schools</span>
                    </div>
                    <div class="category-tile">
                        <div class="tile-icon"><i class="fa-solid fa-bolt"></i></div>
                        <span class="tile-label">Intensive Courses</span>
                    </div>
                    <div class="category-tile">
                        <div class="tile-icon"><i class="fa-solid fa-calendar-check"></i></div>

                    </div>
                    <div class="category-tile" style="grid-column: span 2;">
                        <span class="tile-label">Helping you get more pupils on the road.</span>
                    </div>
                </div>
            </div>
        </section>

        <section style="background-color: #000;"><div class="text-wrap"><h2 class="huge-text" style="text-transform:uppercase">DRIVE<br><span class="black" style="color:#fff">RESULTS.</span></h2></div></section>
        <section style="background-color: #000;"><div class="text-wrap"><h2 class="huge-text" style="text-transform:uppercase">LET'S<br><span class="black" style="color:#fff">BUILD.</span></h2></div></section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>

    <script>
        const nicheWords = ["Driving Schools", "Solo Instructors", "ADI / PDI's", "Automatic Lessons", "Manual Lessons"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;

        function type(elId) {
            const el = document.getElementById(elId);
            if (!el) return;
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            el.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 500; }
            setTimeout(() => type(elId), speed);
        }

        const sections = document.querySelectorAll('section');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            updateDots();
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        function createDots() {
            const container = document.getElementById('swipeCounter');
            sections.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'counter-dot' + (i === 0 ? ' active' : '');
                container.appendChild(dot);
            });
        }

        function updateDots() {
            document.querySelectorAll('.counter-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function toggleMenu() { document.getElementById('app-menu-layer').classList.toggle('active'); }
        function goToSlide(i) { currentIdx = i; updateUI(); }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });

        window.onload = () => {
            type('typewriter-mobile');
            type('typewriter-desktop');
            createDots();
        };
    </script>
</body>
</html>
