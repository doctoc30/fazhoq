    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        /* HERO LAYOUT */
        .text-wrap { 
            width: 100%; max-width: 1200px; 
            display: flex; flex-direction: column; 
            align-items: center; text-align: center; 
        }

        .huge-text {
            font-size: clamp(2.4rem, 10vmin, 5rem);
            font-weight: 900; line-height: 1.1; letter-spacing: -0.05em;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* AVATAR SIZING */
        .waving-hand {
            width: clamp(300px, 75vw, 480px);
            height: auto;
            margin-top: -40px;
            margin-bottom: 10px;
            mix-blend-mode: multiply;
            transition: all 0.5s ease;
        }

        /* SEARCH BAR */
        .search-container { 
            background: #fff; border-radius: 100px; padding: 10px; display: flex; align-items: center; 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15); width: 95%; max-width: 550px; 
            margin-top: 30px; border: 3px solid #000;
        }
        .search-container input { flex: 1; border: none; outline: none; padding: 12px 20px; font-size: 1.2rem; font-weight: 800; }
        .search-icon-btn { width: 55px; height: 55px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; }

        /* TILES RE-SIZED */
        .category-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem; width: 100%; max-width: 500px; margin-top: 2rem;
        }
        .category-tile {
            background: #fff; border: 2px solid #f2f2f2; border-radius: 25px;
            padding: 1.8rem 1rem; display: flex; flex-direction: column;
            align-items: center; gap: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-decoration: none; color: #000;
        }
        .tile-icon {
            width: 55px; height: 55px; background: var(--brand-orange);
            color: white; border-radius: 18px; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .tile-label { font-weight: 900; font-size: 1rem; line-height: 1.2; }
        .full-tile { grid-column: span 2; flex-direction: row; padding: 1.2rem 2rem; justify-content: flex-start; }

        /* LANDSCAPE OPTIMIZATION */
        @media (orientation: landscape) {
            section { padding: 1rem 4rem; }
            .text-wrap { flex-direction: row; justify-content: center; gap: 4rem; text-align: left; }
            .waving-hand { width: 25vh; margin: 0; }
            .hero-content-side { display: flex; flex-direction: column; align-items: flex-start; }
            .category-grid { grid-template-columns: repeat(3, 1fr); max-width: 800px; }
            .full-tile { grid-column: span 1; flex-direction: column; justify-content: center; }
            .search-container { margin-top: 15px; width: 400px; }
        }

        /* DOTS & DOCK */
        .nav-dots { position: fixed; right: 1.2rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 1rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); }
        .dot.active { background: var(--brand-orange); transform: scale(2.5); }
        .app-dock {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); border-radius: 5rem; padding: 0.8rem 2.5rem;
            display: flex; gap: 2.5rem; z-index: 1000; box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="nav-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz Hoq" class="waving-hand">
                <div class="hero-content-side">

                    <div class="huge-text accent" id="typewriter">&nbsp;</div>

    <script>
        // TYPEWRITER
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');
        function type() {
            const currentWord = nicheWords[wordIndex];
            if (isDeleting) charIndex--; else charIndex++;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 40 : 80;
            if (!isDeleting && charIndex === currentWord.length) { speed = 1500; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 400; }
            setTimeout(type, speed);
        }
        window.onload = type;

        // NAVIGATION
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 600);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX;
            let dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 30 || Math.abs(dY) > 30) {
                navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
            }
        });
        window.addEventListener('wheel', e => { if(Math.abs(e.deltaY) > 10) navigate(e.deltaY > 0 ? 1 : -1); });
        function goToSlide(i) { currentIdx = i; updateUI(); }
    </script>
