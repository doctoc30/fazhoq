<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
            --border-thin: 2px solid #000;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 1200px; text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; }

        .huge-text {
            font-size: clamp(2.2rem, 9vmin, 4.8rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* LANDSCAPE AVATAR FIX */
        .waving-hand {
            width: clamp(280px, 70vw, 450px);
            height: auto;
            margin-top: -60px;
            margin-bottom: 5px;
            animation: wave 2.5s infinite ease-in-out;
            mix-blend-mode: multiply; 
        }

        @media (orientation: landscape) {
            .waving-hand { 
                width: clamp(120px, 20vh, 200px); /* Scaled down significantly */
                margin-top: 40px; /* Pushed down from header */
                margin-bottom: 10px;
            }
            .huge-text { font-size: clamp(1.5rem, 7vh, 2.8rem); }
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(4deg); }
        }

        /* CATEGORY TILES (Grid) */
        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            width: 100%;
            max-width: 450px;
            margin-top: 2rem;
        }

        .tile {
            background: #fff;
            border: var(--border-thin);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .tile i { font-size: 2rem; color: var(--brand-orange); }
        .tile span { font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }

        /* LIST VIEW (Health & Wellness) */
        .list-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .list-item {
            background: #fff;
            border: var(--border-thin); /* Outline only, no thick black */
            border-radius: 50px;
            padding: 14px;
            text-align: center;
            font-weight: 900;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* SEARCH BAR */
        .search-container { 
            background: #fff; border-radius: 100px; 
            padding: 6px; display: flex; align-items: center; 
            width: 95%; max-width: 500px; margin-top: 25px;
            border: 3px solid #000; 
        }

        .search-container input { flex: 1; border: none; outline: none; padding: 10px 15px; font-weight: 800; }
        .search-icon-btn { width: 45px; height: 45px; background: #000; border-radius: 50%; color: #fff; }

        /* DOCK & DOTS */
        .app-dock {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 5rem; padding: 0.8rem 2rem; display: flex; gap: 2rem; z-index: 1000;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .nav-dots { position: fixed; right: 1.2rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 1rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: 0.3s; }
        .dot.active { background: var(--brand-orange); transform: scale(2.2); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1500] p-6 flex justify-between items-center">
        <div class="text-xl font-black uppercase" onclick="goToSlide(0)">FAZ HOQ<span class="accent">.</span></div>
        <button class="text-2xl" id="menu-btn"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div class="nav-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text accent" id="typewriter">&nbsp;</div>
                <div class="search-container">
                    <input type="text" placeholder="Search industry...">
                    <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="text-orange-600 font-black uppercase tracking-widest text-sm mb-4">Popular Categories</h2>
                <div class="tiles-grid">
                    <div class="tile" onclick="navigate(1)">
                        <i class="fa-solid fa-heart-pulse"></i>
                        <span>Health</span>
                    </div>
                    <div class="tile">
                        <i class="fa-solid fa-hammer"></i>
                        <span>Trades</span>
                    </div>
                    <div class="tile">
                        <i class="fa-solid fa-briefcase"></i>
                        <span>Pro Services</span>
                    </div>
                    <div class="tile">
                        <i class="fa-solid fa-utensils"></i>
                        <span>Food</span>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text accent mb-6">Health & Wellness</h2>
                <div class="list-container">
                    <div class="list-item">Barbers</div>
                    <div class="list-item">Dentists</div>
                    <div class="list-item">Gyms & Studios</div>
                    <div class="list-item">Spas & Beauty</div>
                    <div class="list-item">Physiotherapists</div>
                </div>
            </div>
        </section>

        <section><div class="text-wrap"><h2 class="huge-text uppercase">STRATEGIC<br><span class="accent">PARTNER.</span></h2></div></section>
        <section class="bg-dark"><div class="text-wrap"><h2 class="huge-text uppercase">CLEAN<br><span class="accent">CODE.</span></h2></div></section>
    </div>

    <div class="app-dock">
        <a href="#" class="text-2xl text-orange-600"><i class="fa-solid fa-comment"></i></a>
        <a href="#" class="text-2xl text-orange-600"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" class="text-2xl text-orange-600"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        // Typewriter Logic
        const words = ["Barbers", "Gyms", "Physios", "Dentists"];
        let wIdx = 0, cIdx = 0, isDel = false;
        function type() {
            const cur = words[wIdx];
            cIdx = isDel ? cIdx - 1 : cIdx + 1;
            document.getElementById('typewriter').innerHTML = cur.substring(0, cIdx) || "&nbsp;";
            let speed = isDel ? 50 : 100;
            if(!isDel && cIdx === cur.length) { speed = 2000; isDel = true; }
            else if(isDel && cIdx === 0) { isDel = false; wIdx = (wIdx + 1) % words.length; speed = 500; }
            setTimeout(type, speed);
        }
        window.onload = type;

        // Navigation Logic
        const wrapper = document.getElementById('master-wrapper');
        const sections = wrapper.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        window.addEventListener('wheel', e => { if (Math.abs(e.deltaY) > 10) navigate(e.deltaY > 0 ? 1 : -1); });
        
        let startY = 0;
        window.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            const dY = startY - e.changedTouches[0].clientY;
            if (Math.abs(dY) > 50) navigate(dY > 0 ? 1 : -1);
        });
    </script>
</body>
</html>
