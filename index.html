<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAZHOQ | Categories</title>
    <style>
        :root {
            --orange: #FF6B00;
            --bg-light: #FFF8F3;
            --text-dark: #000000;
            --border-width: 2px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header Navigation */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 40px 0;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--orange);
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-icon span {
            display: block;
            width: 25px;
            height: 3px;
            background: black;
            border-radius: 2px;
        }

        /* Progress Dots (Restored) */
        .progress-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #E0E0E0;
            border-radius: 50%;
        }

        .dot.active {
            background: var(--orange);
            transform: scale(1.2);
        }

        /* Title Area */
        .category-title {
            color: var(--orange);
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
        }

        /* List Container */
        .list-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Refined List Item (Outlines Only) */
        .list-item {
            background: white;
            border: var(--border-width) solid var(--text-dark); /* Outline only, no thick black shadow */
            border-radius: 50px;
            padding: 18px;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* Subtle soft shadow for depth */
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .list-item:active {
            transform: scale(0.98);
            background-color: #FAFAFA;
        }

        /* Close Button */
        .close-btn {
            margin-top: 40px;
            width: 60px;
            height: 60px;
            background: black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .close-btn::before, .close-btn::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after { transform: rotate(-45deg); }

    </style>
</head>
<body>

    <header>
        <div class="logo">FAZHOQ<span>.</span></div>
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="progress-dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <h1 class="category-title">Health & Wellness</h1>

    <div class="list-container">
        <div class="list-item">Barbers</div>
        <div class="list-item">Dentists</div>
        <div class="list-item">Gyms</div>
        <div class="list-item">Spas</div>
        <div class="list-item">Physios</div>
    </div>

    <div class="close-btn"></div>

</body>
</html>
