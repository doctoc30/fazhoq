<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #000; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container {
            position: relative; height: 100%; width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 1.5rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        /* ULTRA MASSIVE TYPOGRAPHY */
        .huge-text {
            /* Increased clamp values for much larger impact */
            font-size: clamp(4rem, 18vw, 16rem);
            font-weight: 900;
            line-height: 0.78;
            letter-spacing: -0.08em;
            text-transform: uppercase;
            text-align: center;
            word-break: break-word;
            width: 100%;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* UI Elements */
        .app-dock {
            position: fixed; bottom: max(2rem, env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px); border-radius: 3rem;
            padding: 0.7rem 1.5rem; display: flex; gap: 2rem;
            align-items: center; z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .nav-dots {
            position: fixed; right: 1.5rem; top: 50%;
            transform: translateY(-50%); z-index: 1000;
            display: flex; flex-direction: column; gap: 1.2rem;
        }

        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(0,0,0,0.15); transition: all 0.4s ease;
        }

        .dot.active { background: var(--brand-orange); transform: scale(2); }
        .bg-dark .dot { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1000] p-6 md:p-10 pointer-events-none flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter uppercase pointer-events-auto">FAZ HOQ<span class="accent">.</span></div>
    </nav>

    <div class="nav-dots" id="dotContainer">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        
        <section class="active">
            <h1 class="huge-text">I BUILD<br>FOR<br><span class="accent text-black">VISION</span><span class="accent">.</span></h1>
            <p class="mt-8 text-[10px] font-black uppercase tracking-[0.4em] opacity-20">Scroll to Explore</p>
        </section>

        <section>
            <span class="accent font-black text-[10px] tracking-widest mb-4">01. QUALITY</span>
            <h2 class="huge-text">CLEAN<br><span class="accent">CODE.</span></h2>
            <p class="mt-8 text-lg font-medium opacity-40">Speed meets precision.</p>
        </section>

        <section class="bg-dark">
            <span class="accent font-black text-[10px] tracking-widest mb-4">02. MAGIC</span>
            <h2 class="huge-text italic">WOW<span class="accent">!</span><br>DESIGN.</h2>
            <p class="mt-8 text-lg font-medium opacity-40">Hooking every user.</p>
        </section>

        <section>
            <span class="accent font-black text-[10px] tracking-widest mb-4">03. REVENUE</span>
            <h2 class="huge-text">STRATEGY<br><span class="accent">PARTNER.</span></h2>
        </section>

        <section class="bg-dark">
            <h2 class="huge-text">HIRE<br>ME<span class="accent">.</span></h2>
            <div class="mt-12">
                <a href="mailto:Fazhoq1977@gmail.com" class="text-2xl md:text-4xl font-black underline decoration-[#FF6B2C] underline-offset-8">
                    Fazhoq1977@gmail.com
                </a>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="text-xl p-2"><i class="fa-solid fa-comment"></i></a>
        <a href="https://wa.me/447706345874">
            <div class="w-14 h-14 bg-[#25D366] rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-brands fa-whatsapp text-3xl text-white"></i>
            </div>
        </a>
        <a href="mailto:Fazhoq1977@gmail.com" class="text-xl p-2"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const wrapper = document.getElementById('master-wrapper');
        const sections = wrapper.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0;
        let isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
            document.body.classList.toggle('bg-dark', sections[currentIdx].classList.contains('bg-dark'));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 700);
            }
        }

        // Improved Touch System
        let startX = 0, startY = 0;
        window.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchend', e => {
            const diffX = startX - e.changedTouches[0].clientX;
            const diffY = startY - e.changedTouches[0].clientY;
            if (Math.abs(diffX) > 40 || Math.abs(diffY) > 40) {
                if (Math.abs(diffX) > Math.abs(diffY)) navigate(diffX > 0 ? 1 : -1);
                else navigate(diffY > 0 ? 1 : -1);
            }
        }, { passive: false });

        window.addEventListener('wheel', e => {
            if (Math.abs(e.deltaY) > 10) navigate(e.deltaY > 0 ? 1 : -1);
        }, { passive: true });

        window.addEventListener('keydown', e => {
            if (["ArrowRight", "ArrowDown", " "].includes(e.key)) navigate(1);
            if (["ArrowLeft", "ArrowUp"].includes(e.key)) navigate(-1);
        });

        updateUI();
    </script>
</body>
</html>
