<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        /* HERO LAYOUT */
        .text-wrap { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .huge-text { font-size: clamp(2.8rem, 12vmin, 5.5rem); font-weight: 900; line-height: 1.1; letter-spacing: -0.05em; }
        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* AVATAR & SEARCH */
        .waving-hand { width: clamp(320px, 80vw, 550px); height: auto; margin-top: -30px; margin-bottom: 20px; mix-blend-mode: multiply; }
        .search-container { 
            background: #fff; border-radius: 100px; padding: 12px; display: flex; align-items: center; 
            box-shadow: 0 30px 60px -12px rgba(255, 107, 44, 0.2); width: 98%; max-width: 600px; 
            margin-top: 35px; border: 4px solid #000;
        }
        .search-container input { flex: 1; border: none; outline: none; padding: 12px 24px; font-size: 1.4rem; font-weight: 800; }
        .search-icon-btn { width: 60px; height: 60px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; }

        /* VIBZ STYLE ANIMATED TILES */
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; width: 100%; max-width: 550px; margin-top: 2rem; }
        .category-tile {
            background: #fff; border: 2.5px solid #f2f2f2; border-radius: 30px;
            padding: 2.2rem 1rem; display: flex; flex-direction: column;
            align-items: center; gap: 1.2rem; box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            text-decoration: none; color: #000; transition: transform 0.2s;
        }
        .category-tile:active { transform: scale(0.95); }
        .tile-icon {
            width: 70px; height: 70px; background: var(--brand-orange);
            color: white; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 2rem;
            box-shadow: 0 10px 20px rgba(255, 107, 44, 0.3);
        }
        .tile-label { font-weight: 900; font-size: 1.1rem; line-height: 1.2; }
        .full-tile { grid-column: span 2; flex-direction: row; padding: 1.5rem 2.5rem; justify-content: flex-start; }

        /* ICON ANIMATIONS */
        .fa-heart-pulse { animation: heartbeat 1.5s ease-in-out infinite; }
        @keyframes heartbeat { 0%, 28%, 70% { transform: scale(1); } 14%, 42% { transform: scale(1.3); } }
        
        .fa-hammer { animation: hammerHit 1.2s ease-in-out infinite; transform-origin: bottom center; }
        @keyframes hammerHit { 0%, 30%, 100% { transform: rotate(0deg); } 10% { transform: rotate(30deg); } 20% { transform: rotate(-20deg); } }
        
        .fa-briefcase { animation: bounce 2s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .fa-utensils { animation: utensilsMove 2.5s ease-in-out infinite; }
        @keyframes utensilsMove { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
        
        .fa-bag-shopping { animation: swing 3s ease-in-out infinite; transform-origin: top center; }
        @keyframes swing { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(15deg); } 75% { transform: rotate(-15deg); } }

        /* BRAND ORANGE DOCK (VIBZ STYLE) */
        .app-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--brand-orange); height: 80px;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); z-index: 2000;
            box-shadow: 0 -10px 30px rgba(255, 107, 44, 0.3);
        }
        .dock-btn { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; gap: 4px; }
        .dock-btn.active { color: #fff; }
        .dock-btn i { font-size: 1.5rem; }
        .dock-btn span { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        
        .dock-center {
            width: 65px; height: 65px; background: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.8rem; margin-top: -45px;
            border: 5px solid var(--brand-orange); box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* LANDSCAPE OPTIMIZATION */
        @media (orientation: landscape) {
            section { padding: 0 5rem; }
            .text-wrap { flex-direction: row; justify-content: center; gap: 5vw; text-align: left; }
            .waving-hand { width: auto; height: 55vh; margin: 0; }
            .hero-content-side { flex: 1; }
            .category-grid { grid-template-columns: repeat(3, 1fr); max-width: 900px; }
            .full-tile { grid-column: span 1; flex-direction: column; }
            .search-container { margin-top: 20px; max-width: 450px; transform: scale(0.9); transform-origin: left; }
        }

        .nav-dots { position: fixed; right: 1.2rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 1rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); }
        .dot.active { background: var(--brand-orange); transform: scale(2.5); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1500] p-8 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter uppercase cursor-pointer" onclick="goToSlide(0)">FAZ HOQ<span class="accent">.</span></div>
        <button class="text-2xl" id="menu-btn"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div class="nav-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz Hoq" class="waving-hand">
                <div class="hero-content-side">
                    <h1 class="huge-text">I build websites for:</h1>
                    <div class="huge-text accent" id="typewriter">&nbsp;</div>
                    <div class="search-container">
                        <input type="text" id="mainSearch" placeholder="Search industry...">
                        <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap flex-col">
                <h2 class="text-orange-600 font-black tracking-widest text-sm mb-6 uppercase">Popular Categories</h2>
                <div class="category-grid">
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-heart-pulse"></i></div><span class="tile-label">Health & Wellness</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-hammer"></i></div><span class="tile-label">Home & Trades</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-briefcase"></i></div><span class="tile-label">Professional</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-utensils"></i></div><span class="tile-label">Food & Drink</span></div>
                    <div class="category-tile full-tile"><div class="tile-icon"><i class="fa-solid fa-bag-shopping"></i></div><span class="tile-label ml-4">Creative & Retail Industries</span></div>
                </div>
            </div>
        </section>

        <section><div class="text-wrap flex-col"><h2 class="huge-text uppercase">STRATEGIC<br><span class="accent">PARTNER.</span></h2></div></section>
        <section class="bg-dark"><div class="text-wrap flex-col"><h2 class="huge-text italic uppercase">WOW<span class="accent">!</span><br>INTERACTION.</h2></div></section>
        <section><div class="text-wrap flex-col"><h2 class="huge-text uppercase">CLEAN<br><span class="accent">CODE.</span></h2></div></section>
        <section class="bg-dark"><div class="text-wrap flex-col"><h2 class="huge-text uppercase">LET'S<br><span class="accent">BUILD.</span></h2></div></section>
    </div>

    <nav class="app-dock">
        <a href="#" class="dock-btn active" onclick="goToSlide(0)"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="#" class="dock-btn" onclick="goToSlide(1)"><i class="fa-solid fa-layer-group"></i><span>Work</span></a>
        <div class="dock-center" onclick="alert('Starting Project Flow...')"><i class="fa-solid fa-bolt"></i></div>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>Chat</span></a>
        <a href="#" class="dock-btn"><i class="fa-solid fa-user-tie"></i><span>Portal</span></a>
    </nav>

    <script>
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms"];
        let wordIdx = 0, charIdx = 0, isDel = false;
        const tw = document.getElementById('typewriter');
        function type() {
            const word = nicheWords[wordIdx];
            charIdx += isDel ? -1 : 1;
            tw.innerHTML = word.substring(0, charIdx) || "&nbsp;";
            let speed = isDel ? 50 : 100;
            if (!isDel && charIdx === word.length) { speed = 2000; isDel = true; }
            else if (isDel && charIdx === 0) { isDel = false; wordIdx = (wordIdx + 1) % nicheWords.length; speed = 500; }
            setTimeout(type, speed);
        }
        window.onload = type;

        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 600);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 40 || Math.abs(dY) > 40) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        window.addEventListener('wheel', e => { if(Math.abs(e.deltaY) > 10) navigate(e.deltaY > 0 ? 1 : -1); });
        function goToSlide(i) { currentIdx = i; updateUI(); }
    </script>
</body>
</html>
