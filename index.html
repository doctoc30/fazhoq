<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        /* Essential for App-Feel: Disable all native scrolling/overscroll */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            font-family: 'Outfit', sans-serif;
            background: #000;
            touch-action: none; /* Prevents browser handling of gestures */
            -webkit-user-select: none; /* Prevents accidental text highlights during swipe */
        }

        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: var(--app-white);
            /* Using hardware acceleration for smoother swipes */
            transform: translate3d(100%, 0, 0);
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            visibility: hidden;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }

        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        /* Responsive Typography */
        .huge-text {
            font-size: clamp(3rem, 14vw, 11rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.06em;
            text-transform: uppercase;
            text-align: center;
            word-break: break-word;
        }

        /* App Dock Fix for Mobile Safe Areas */
        .app-dock {
            position: fixed;
            bottom: max(2rem, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 3rem;
            padding: 0.7rem 1.5rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            width: fit-content;
            min-width: 280px;
            justify-content: space-around;
        }

        /* Hide Scrollbar indicators */
        ::-webkit-scrollbar { display: none; }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* Progress Indicator */
        .nav-dots {
            position: fixed;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--brand-orange);
            transform: scale(1.5);
        }

        .bg-dark .dot { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1000] p-6 md:p-10 pointer-events-none flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter uppercase pointer-events-auto">FAZ<span class="accent">.</span></div>
        <div class="text-[9px] font-black uppercase tracking-[0.3em] opacity-40 hidden md:block">Digital Store Architect</div>
    </nav>

    <div class="nav-dots" id="dotContainer">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        
        <section class="active">
            <span class="text-[10px] font-black tracking-[0.4em] accent mb-4">CONCEPT</span>
            <h1 class="huge-text">DIGITAL<br>STORES<span class="accent">.</span></h1>
            <p class="mt-8 text-xs font-bold uppercase opacity-30 tracking-widest animate-pulse">Swipe to navigate</p>
        </section>

        <section>
            <span class="text-[10px] font-black tracking-[0.4em] accent mb-4">PARTNER</span>
            <h2 class="huge-text italic">FAZ<br>HOQ.</h2>
            <p class="mt-6 text-lg md:text-xl text-gray-500 max-w-xs text-center font-medium leading-tight">
                Modern solutions for the next generation of retailers.
            </p>
        </section>

        <section>
            <span class="text-[10px] font-black tracking-[0.4em] accent mb-4">VALUES</span>
            <h2 class="huge-text">ELITE<br><span class="accent">UX/UI.</span></h2>
            <div class="mt-10 flex gap-8 md:gap-16">
                <div class="text-center">
                    <div class="text-3xl md:text-5xl font-black">100%</div>
                    <div class="text-[9px] font-black opacity-40 uppercase tracking-widest">Ownership</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl md:text-5xl font-black">FAST</div>
                    <div class="text-[9px] font-black opacity-40 uppercase tracking-widest">Launch</div>
                </div>
            </div>
        </section>

        <section class="bg-dark">
            <span class="text-[10px] font-black tracking-[0.4em] accent mb-4">CONNECT</span>
            <h2 class="huge-text">HIRE<br>ME<span class="accent">.</span></h2>
            <div class="mt-8">
                <a href="mailto:Fazhoq1977@gmail.com" class="text-xl md:text-4xl font-black underline decoration-[#FF6B2C] underline-offset-8 transition-colors hover:text-[#FF6B2C]">
                    Email Now
                </a>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="text-xl p-2"><i class="fa-solid fa-message"></i></a>
        <a href="https://wa.me/447706345874">
            <div class="w-14 h-14 bg-[#25D366] rounded-2xl flex items-center justify-center shadow-lg shadow-[#25D366]/20">
                <i class="fa-brands fa-whatsapp text-3xl text-white"></i>
            </div>
        </a>
        <a href="mailto:Fazhoq1977@gmail.com" class="text-xl p-2"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const wrapper = document.getElementById('master-wrapper');
        const sections = wrapper.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0;
        let isMoving = false;

        // Configuration
        const threshold = 40; // Minimum px to trigger swipe

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });

            // Toggle dark mode dots for the last slide
            if(sections[currentIdx].classList.contains('bg-dark')) {
                document.body.classList.add('bg-dark');
            } else {
                document.body.classList.remove('bg-dark');
            }
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 600);
            }
        }

        // --- GESTURE ENGINE ---

        // Touch handling
        let startX = 0;
        let startY = 0;

        window.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            // Check if horizontal OR vertical swipe is stronger
            if (Math.abs(diffX) > threshold || Math.abs(diffY) > threshold) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    navigate(diffX > 0 ? 1 : -1);
                } else {
                    navigate(diffY > 0 ? 1 : -1);
                }
            }
        }, { passive: false });

        // Wheel handling (Desktop)
        window.addEventListener('wheel', e => {
            if (Math.abs(e.deltaY) > 10) {
                navigate(e.deltaY > 0 ? 1 : -1);
            }
        }, { passive: true });

        // Keyboard handling
        window.addEventListener('keydown', e => {
            if (e.key === "ArrowRight" || e.key === "ArrowDown") navigate(1);
            if (e.key === "ArrowLeft" || e.key === "ArrowUp") navigate(-1);
        });

        // Initialize
        updateUI();
    </script>
</body>
</html>
