<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* GLASS HEADER FIX */
        nav {
            position: fixed; top: 0; w-full; z-index: 1500;
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent; /* No background */
            border: none; /* No physical border */
        }

        .huge-text {
            font-size: clamp(2.2rem, 9vmin, 4.8rem);
            font-weight: 900; line-height: 1.1; letter-spacing: -0.05em;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        .waving-hand {
            width: clamp(250px, 70vw, 420px);
            height: auto;
            margin-top: 20px;
            margin-bottom: 10px;
            mix-blend-mode: multiply;
            animation: wave 2.5s infinite ease-in-out;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* SEARCH BAR FIX */
        .search-container { 
            background: #fff; border-radius: 100px; padding: 4px; 
            display: flex; align-items: center; 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15); 
            width: 95%; max-width: 500px; margin-top: 30px; 
            border: 3px solid #000; overflow: hidden;
        }
        .search-container input { flex: 1; border: none; outline: none; padding: 12px 20px; font-size: 1.1rem; font-weight: 800; background: transparent; }
        .search-icon-btn { flex-shrink: 0; width: 48px; height: 48px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; margin-right: 4px; }

        /* TILES SPACING - PREVENT HEADER TOUCHING */
        .category-header {
            color: var(--brand-orange); font-weight: 900; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 0.05em;
            margin-top: 120px; /* Stronger top clearance for portrait */
            margin-bottom: 1.5rem;
        }

        .category-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; 
            width: 100%; max-width: 550px;
            margin-bottom: 140px; 
        }

        .category-tile {
            background: #fff; border: 2px solid #f0f0f0; border-radius: 25px;
            padding: 1.5rem 1rem; display: flex; flex-direction: column;
            align-items: center; gap: 0.8rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .tile-icon { width: 55px; height: 55px; background: var(--brand-orange); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .tile-label { font-weight: 900; font-size: 0.9rem; line-height: 1.2; }

        /* ICON ANIMATIONS */
        .fa-heart-pulse { animation: heartbeat 1.5s infinite; }
        .fa-hammer { animation: hammerHit 1.2s infinite; transform-origin: bottom center; }
        .fa-briefcase { animation: bounce 2s infinite; }
        .fa-utensils { animation: wobble 2s infinite; }
        .fa-bag-shopping { animation: swing 3s infinite; transform-origin: top center; }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes hammerHit { 0%, 100% { transform: rotate(0deg); } 20% { transform: rotate(25deg); } 40% { transform: rotate(-10deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes wobble { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
        @keyframes swing { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(8deg); } 75% { transform: rotate(-8deg); } }

        @media (orientation: landscape) {
            .category-header { margin-top: 100px; } /* Clearance for landscape */
            .category-grid { grid-template-columns: repeat(3, 1fr); max-width: 750px; margin-bottom: 70px; }
            .waving-hand { height: 45vh; width: auto; margin-top: 60px; }
            .huge-text { font-size: clamp(1.5rem, 6vh, 2.8rem); }
        }

        .app-dock {
            position: fixed; bottom: max(1.5rem, env(safe-area-inset-bottom) + 0.5rem);
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px); border-radius: 5rem;
            padding: 0.8rem 2.2rem; display: flex; gap: 2.5rem;
            align-items: center; z-index: 2500;
            box-shadow: 0 15px 45px rgba(0,0,0,0.12);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .dock-btn { font-size: 1.7rem; color: var(--brand-orange); }

        .nav-dots { position: fixed; right: 1rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 1rem; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.1); }
        .dot.active { background: var(--brand-orange); transform: scale(2.5); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1500] p-6 flex justify-between items-center">
        <div class="text-xl font-black tracking-tighter uppercase cursor-pointer" onclick="goToSlide(0)">FAZ HOQ<span class="accent">.</span></div>
        <button class="text-xl" id="menu-btn"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div class="nav-dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz Hoq" class="waving-hand">
                <div class="hero-content-side">
                    <h1 class="huge-text">I build websites for:</h1>
                    <div class="huge-text accent" id="typewriter">&nbsp;</div>
                    <div class="search-container">
                        <input type="text" id="mainSearch" placeholder="Search industry..." onkeypress="if(event.key==='Enter') triggerSearch()">
                        <button class="search-icon-btn" onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap flex-col">
                <h2 class="category-header">OR SELECT FROM POPULAR CATEGORIES</h2>
                <div class="category-grid">
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-heart-pulse"></i></div><span class="tile-label">Health &<br>Wellness</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-hammer"></i></div><span class="tile-label">Home &<br>Trades</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-briefcase"></i></div><span class="tile-label">Professional<br>Services</span></div>
                    <div class="category-tile"><div class="tile-icon"><i class="fa-solid fa-utensils"></i></div><span class="tile-label">Food &<br>Drink</span></div>
                    <div class="category-tile" style="grid-column: span 2; flex-direction: row; padding: 1.2rem; justify-content: center;">
                        <div class="tile-icon"><i class="fa-solid fa-bag-shopping"></i></div>
                        <span class="tile-label ml-4">Retail & Creative Industries</span>
                    </div>
                </div>
            </div>
        </section>

        <section><div class="text-wrap"><h2 class="huge-text uppercase">STRATEGIC<br><span class="accent">PARTNER.</span></h2></div></section>
        <section class="bg-dark"><div class="text-wrap"><h2 class="huge-text italic uppercase">WOW<span class="accent">!</span><br>INTERACTION.</h2></div></section>
        <section class="bg-dark"><div class="text-wrap"><h2 class="huge-text uppercase">LET'S<br><span class="accent">BUILD.</span></h2></div></section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 500; }
            setTimeout(type, speed);
        }
        window.onload = type;

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val) window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val);
        }

        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        function goToSlide(i) { currentIdx = i; updateUI(); }
    </script>
</body>
</html>
