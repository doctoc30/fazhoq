<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | SOLO DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
        }

        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: transparent;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
            overflow-y: auto;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }
        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        #menu-btn:hover {
            transform: scale(1.05);
        }

        .text-wrap {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 320px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            transform: translateY(-20px);
        }

        /* HORIZONTAL SCROLL SLIDER - FULLY FUNCTIONAL */
        .slider-viewport {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 40px 0;
            position: relative;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            cursor: grab;
        }
        
        .slider-viewport:active {
            cursor: grabbing;
        }
        
        /* Hide scrollbar */
        .slider-viewport {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .slider-viewport::-webkit-scrollbar {
            display: none;
        }

        .slider-track {
            display: flex;
            width: max-content;
            gap: 0;
            padding-left: calc(50vw - 155px);
            padding-right: calc(50vw - 155px);
        }

        .concept-card {
            width: 280px;
            height: 380px;
            background: white;
            margin: 0 15px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 0, 0.05);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            scroll-snap-align: center;
        }

        .concept-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(255, 107, 0, 0.2);
        }

        .concept-img {
            width: 100%;
            height: 70%;
            background: #eee;
            background-size: cover;
            background-position: center;
        }

        .concept-info {
            padding: 20px;
            text-align: left;
        }

        .concept-info h4 { font-weight: 900; color: var(--primary); font-size: 1.2rem; }
        .concept-info p { font-size: 0.85rem; font-weight: 700; opacity: 0.5; text-transform: uppercase; }

        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
            pointer-events: auto;
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .dock-btn span {
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 4px;
        }
        
        .dock-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .swipe-counter {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2400;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        .dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }

        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: auto;
        }
        #app-menu-layer.active { transform: translateY(0); }
        .close-menu-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .close-menu-btn:hover {
            transform: scale(1.05);
        }
        
        /* Navigation hint */
        .nav-hint {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            opacity: 0.4;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2399;
        }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="close-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
        <div class="flex flex-col items-center justify-center flex-1 gap-10">
            <a href="#" class="huge-text" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="huge-text" onclick="goToSlide(1); toggleMenu()">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="huge-text">HIRE ME</a>
        </div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <div class="swipe-counter">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>
    <div class="nav-hint">↑ SWIPE UP/DOWN TO NAVIGATE SLIDES ↑</div>

    <div class="slide-container" id="master-wrapper">
        <!-- SLIDE 0: HOME -->
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <p class="mt-8 font-black uppercase tracking-[4px] text-xs opacity-40">Independent Web Developer</p>
            </div>
        </section>

        <!-- SLIDE 1: CONCEPTS with HORIZONTAL SCROLLING CARDS -->
        <section>
            <div class="text-wrap">
                <h2 class="huge-text mb-6">VISUAL<br><span class="black">CONCEPTS.</span></h2>
                <div class="slider-viewport" id="slider-viewport">
                    <div class="slider-track" id="slider-track"></div>
                </div>
                <p class="text-xs opacity-40 mt-4">← SWIPE CARDS HORIZONTALLY →</p>
            </div>
        </section>

        <!-- SLIDE 2: COLLABORATE -->
        <section>
            <div class="text-wrap">
                <h2 class="huge-text">READY TO<br><span class="black">COLLABORATE?</span></h2>
                <div class="mt-10 p-6 bg-white rounded-[30px] border border-orange-100 shadow-xl inline-block">
                    <p class="font-bold text-orange-600">Now taking bookings for 2026</p>
                </div>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
    </div>

    <script>
        // Typewriter animation
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Landscapers"];
        let wordIdx = 0;
        let charIdx = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function typeEffect() {
            const currentWord = nicheWords[wordIdx];
            charIdx += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIdx) || "&nbsp;";
            let speed = isDeleting ? 60 : 120;
            if (!isDeleting && charIdx === currentWord.length) {
                speed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                wordIdx = (wordIdx + 1) % nicheWords.length;
                speed = 500;
            }
            setTimeout(typeEffect, speed);
        }

        // Generate 20 concept cards to demonstrate scrolling (you can change to 100)
        function generateConcepts() {
            const baseConcepts = [
                { title: "Modern Barber", sub: "Branding & Identity", url: "https://doctoc30.github.io/fazhoq/concepts/barber" },
                { title: "Legal Suite", sub: "Interface Design", url: "https://doctoc30.github.io/fazhoq/concepts/legal" },
                { title: "Fitness Pro", sub: "User Flow", url: "https://doctoc30.github.io/fazhoq/concepts/fitness" },
                { title: "Trade Flow", sub: "Concept Engineering", url: "https://doctoc30.github.io/fazhoq/concepts/trade" },
                { title: "Eco Beauty", sub: "Sustainable Design", url: "https://doctoc30.github.io/fazhoq/concepts/eco" },
                { title: "Tech Startup", sub: "Digital Identity", url: "https://doctoc30.github.io/fazhoq/concepts/tech" },
                { title: "Luxury Hotel", sub: "Hospitality Suite", url: "https://doctoc30.github.io/fazhoq/concepts/hotel" },
                { title: "Coffee Brand", sub: "Packaging Design", url: "https://doctoc30.github.io/fazhoq/concepts/coffee" }
            ];
            
            // Repeat to make 20+ cards for demonstration
            let allConcepts = [];
            for (let i = 0; i < 3; i++) {
                allConcepts = [...allConcepts, ...baseConcepts.map(c => ({
                    ...c,
                    title: i === 0 ? c.title : `${c.title} ${i + 1}`,
                    img: `https://picsum.photos/id/${(i * 10 + baseConcepts.indexOf(c) + 20)}/400/300`
                }))];
            }
            return allConcepts;
        }
        
        const concepts = generateConcepts();

        // Initialize slider with proper scrolling and click handlers
        function initSlider() {
            const track = document.getElementById('slider-track');
            if (!track) return;
            
            // Build cards
            track.innerHTML = concepts.map((c, index) => {
                const imgUrl = c.img || "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=400";
                return `
                    <div class="concept-card" data-url="${c.url}" data-index="${index}">
                        <div class="concept-img" style="background-image: url('${imgUrl}')"></div>
                        <div class="concept-info">
                            <h4>${c.title}</h4>
                            <p>${c.sub}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Add click handlers to all cards
            const cards = document.querySelectorAll('.concept-card');
            cards.forEach(card => {
                const url = card.getAttribute('data-url');
                if (url) {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        window.open(url, '_blank', 'noopener,noreferrer');
                    });
                }
            });
        }

        // Main slide navigation (VERTICAL SWIPE for Home/Concepts/Collaborate)
        let currentIdx = 0;
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        function goToSlide(i) { 
            if (i >= 0 && i < sections.length && !isMoving) {
                currentIdx = i; 
                updateUI(); 
            }
        }
        
        function toggleMenu() { 
            document.getElementById('app-menu-layer').classList.toggle('active'); 
        }

        // VERTICAL SWIPE for main slide navigation
        let touchStartY = null;
        
        window.addEventListener('touchstart', e => { 
            touchStartY = e.touches[0].clientY; 
        }, { passive: true });
        
        window.addEventListener('touchend', e => {
            if (touchStartY === null) return;
            
            const deltaY = touchStartY - e.changedTouches[0].clientY;
            const absDeltaY = Math.abs(deltaY);
            
            // Only navigate main slides if vertical swipe is significant
            // and not interacting with the horizontal slider
            if (absDeltaY > 50) {
                navigate(deltaY > 0 ? 1 : -1);
            }
            
            touchStartY = null;
        });
        
        // Mouse wheel support for main slides
        window.addEventListener('wheel', e => { 
            const isOverSlider = e.target.closest('.slider-viewport');
            if (!isOverSlider && Math.abs(e.deltaY) > 30) {
                navigate(e.deltaY > 0 ? 1 : -1);
                e.preventDefault();
            }
        }, { passive: false });
        
        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                navigate(1);
                e.preventDefault();
            } else if (e.key === 'ArrowUp') {
                navigate(-1);
                e.preventDefault();
            }
        });
        
        // Logo click
        const logo = document.querySelector('.faz-logo');
        if (logo) {
            logo.addEventListener('click', (e) => {
                e.stopPropagation();
                goToSlide(0);
            });
        }
        
        // Dot clicks
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => goToSlide(i));
        });

        // Initialize everything
        window.onload = () => {
            typeEffect();
            initSlider();
            updateUI();
        };
    </script>
</body>
</html>
