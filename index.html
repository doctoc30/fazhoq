    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
        }

        /* Lock Viewport & Disable Vertical Scroll */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            font-family: 'Outfit', sans-serif;
            background: var(--app-white);
            touch-action: none; /* Crucial for app-like feel on mobile */
        }

        /* The Horizontal Slider Container */
        #viewport {
            display: flex;
            height: 100%;
            width: 400vw; /* 4 sections */
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        section {
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        .huge-text {
            font-size: clamp(3.5rem, 16vw, 13rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.07em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Floating App Dock */
        .app-dock {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 3rem;
            padding: 0.8rem 1.8rem;
            display: flex;
            gap: 2.5rem;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        /* Top Progress Bar (Visual feedback for swiping) */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.03);
            z-index: 101;
        }

        #pBar {
            height: 100%;
            width: 25%; /* 1/4 slides */
            background: var(--brand-orange);
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: left;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #000; color: #fff; }

        /* Navigation Header */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        
        nav * { pointer-events: auto; }

        .slide-hint {
            position: absolute;
            bottom: 8rem;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.2;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <script>
        let currentSlide = 0;
        const totalSlides = 4;
        const viewport = document.getElementById('viewport');
        const pBar = document.getElementById('pBar');
        let isMoving = false;

        function moveSlide(direction) {
            if (isMoving) return;
            const target = currentSlide + direction;
            
            if (target >= 0 && target < totalSlides) {
                isMoving = true;
                currentSlide = target;
                
                // Animate Slider
                viewport.style.transform = `translateX(-${currentSlide * 100}vw)`;
                
                // Animate Progress Bar
                pBar.style.transform = `translateX(${currentSlide * 100}%)`;

                setTimeout(() => { isMoving = false; }, 850);
            }
        }

        // --- INTERACTION LOGIC ---

        // 1. Mouse Wheel (PC) - Interprets vertical scroll as horizontal swipe
        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 10) {
                if (e.deltaY > 0) moveSlide(1);  // Scroll Down -> Move Right
                else moveSlide(-1);              // Scroll Up -> Move Left
            }
        }, { passive: true });

        // 2. Touch Swipe (Mobile)
        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => { 
            touchStartX = e.touches[0].clientX; 
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 40) { // Threshold for swipe
                if (diff > 0) moveSlide(1);  // Swipe Left -> Next
                else moveSlide(-1);          // Swipe Right -> Prev
            }
        }, { passive: true });

        // 3. Arrow Keys (Keyboard)
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === "ArrowDown") moveSlide(1);
            if (e.key === "ArrowLeft" || e.key === "ArrowUp") moveSlide(-1);
        });
    </script>
