<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | SOLO DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
        }

        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: transparent;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }
        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--primary);
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        #menu-btn:hover {
            transform: scale(1.05);
        }

        .text-wrap {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 320px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            transform: translateY(-20px);
        }

        /* HORIZONTAL SCROLL SLIDER WITH PAGINATION */
        .slider-container {
            width: 100%;
            position: relative;
        }

        .slider-viewport {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 40px 0;
            position: relative;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            cursor: grab;
            scroll-behavior: smooth;
        }
        
        .slider-viewport:active {
            cursor: grabbing;
        }
        
        /* Hide scrollbar */
        .slider-viewport {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .slider-viewport::-webkit-scrollbar {
            display: none;
        }

        .slider-track {
            display: flex;
            width: max-content;
            gap: 0;
            padding-left: calc(50vw - 155px);
            padding-right: calc(50vw - 155px);
        }

        .concept-card {
            width: 280px;
            height: 380px;
            background: white;
            margin: 0 15px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 0, 0.05);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            scroll-snap-align: center;
        }

        .concept-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(255, 107, 0, 0.2);
        }

        .concept-img {
            width: 100%;
            height: 70%;
            background: #eee;
            background-size: cover;
            background-position: center;
        }

        .concept-info {
            padding: 20px;
            text-align: left;
        }

        .concept-info h4 { font-weight: 900; color: var(--primary); font-size: 1.2rem; }
        .concept-info p { font-size: 0.85rem; font-weight: 700; opacity: 0.5; text-transform: uppercase; }

        /* PAGINATION CONTROLS */
        .slider-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        
        .nav-arrow {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 1px solid rgba(255, 107, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        .nav-arrow:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        
        .pagination-dots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 300px;
        }
        
        .page-dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .page-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }
        
        .page-dot:hover {
            background: var(--primary);
            transform: scale(1.2);
        }
        
        .card-counter {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            background: rgba(255,107,0,0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .dock-btn span {
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 4px;
        }
        
        .dock-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .swipe-counter {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2400;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        .dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }

        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .close-menu-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .close-menu-btn:hover {
            transform: scale(1.05);
        }
        
        .nav-hint {
            font-size: 0.65rem;
            opacity: 0.4;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="close-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
        <div class="flex flex-col items-center justify-center flex-1 gap-10">
            <a href="#" class="huge-text" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="huge-text" onclick="goToSlide(1); toggleMenu()">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="huge-text">HIRE ME</a>
        </div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <div class="swipe-counter">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <p class="mt-8 font-black uppercase tracking-[4px] text-xs opacity-40">Independent Web Developer</p>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text mb-6">VISUAL<br><span class="black">CONCEPTS.</span></h2>
                
                <div class="slider-container">
                    <div class="slider-viewport" id="slider-viewport">
                        <div class="slider-track" id="slider-track"></div>
                    </div>
                    
                    <!-- Pagination Controls -->
                    <div class="slider-controls">
                        <div class="nav-arrow" id="prev-card">
                            <i class="fa-solid fa-chevron-left"></i>
                        </div>
                        <div class="pagination-dots" id="pagination-dots"></div>
                        <div class="nav-arrow" id="next-card">
                            <i class="fa-solid fa-chevron-right"></i>
                        </div>
                    </div>
                    <div class="card-counter" id="card-counter">1 / 0</div>
                </div>
                <div class="nav-hint">← SWIPE CARDS OR USE ARROWS →</div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text">READY TO<br><span class="black">COLLABORATE?</span></h2>
                <div class="mt-10 p-6 bg-white rounded-[30px] border border-orange-100 shadow-xl inline-block">
                    <p class="font-bold text-orange-600">Now taking bookings for 2026</p>
                </div>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
    </div>

    <script>
        // Typewriter animation
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Landscapers"];
        let wordIdx = 0;
        let charIdx = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function typeEffect() {
            const currentWord = nicheWords[wordIdx];
            charIdx += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIdx) || "&nbsp;";
            let speed = isDeleting ? 60 : 120;
            if (!isDeleting && charIdx === currentWord.length) {
                speed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                wordIdx = (wordIdx + 1) % nicheWords.length;
                speed = 500;
            }
            setTimeout(typeEffect, speed);
        }

        // Generate 25 concept cards (you can change to 100)
        function generateConcepts() {
            const baseConcepts = [
                { title: "Modern Barber", sub: "Branding & Identity", url: "https://doctoc30.github.io/fazhoq/concepts/barber" },
                { title: "Legal Suite", sub: "Interface Design", url: "https://doctoc30.github.io/fazhoq/concepts/legal" },
                { title: "Fitness Pro", sub: "User Flow", url: "https://doctoc30.github.io/fazhoq/concepts/fitness" },
                { title: "Trade Flow", sub: "Concept Engineering", url: "https://doctoc30.github.io/fazhoq/concepts/trade" },
                { title: "Eco Beauty", sub: "Sustainable Design", url: "https://doctoc30.github.io/fazhoq/concepts/eco" },
                { title: "Tech Startup", sub: "Digital Identity", url: "https://doctoc30.github.io/fazhoq/concepts/tech" }
            ];
            
            // Generate 25 cards for demo (change to 100 by changing the loop count)
            let allConcepts = [];
            for (let i = 0; i < 25; i++) {
                const base = baseConcepts[i % baseConcepts.length];
                allConcepts.push({
                    ...base,
                    title: i < baseConcepts.length ? base.title : `${base.title} ${Math.floor(i / baseConcepts.length) + 1}`,
                    img: `https://picsum.photos/id/${(i * 7 + 20)}/400/300`
                });
            }
            return allConcepts;
        }
        
        const concepts = generateConcepts();
        let currentCardIndex = 0;
        let isScrollingProgrammatically = false;

        // Initialize slider with cards and pagination
        function initSlider() {
            const track = document.getElementById('slider-track');
            if (!track) return;
            
            // Build cards
            track.innerHTML = concepts.map((c, index) => {
                const imgUrl = c.img || "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=400";
                return `
                    <div class="concept-card" data-url="${c.url}" data-index="${index}">
                        <div class="concept-img" style="background-image: url('${imgUrl}')"></div>
                        <div class="concept-info">
                            <h4>${c.title}</h4>
                            <p>${c.sub}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Add click handlers to all cards
            const cards = document.querySelectorAll('.concept-card');
            cards.forEach(card => {
                const url = card.getAttribute('data-url');
                if (url) {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        window.open(url, '_blank', 'noopener,noreferrer');
                    });
                }
            });
            
            // Build pagination dots
            updatePagination();
            updateCardCounter();
            
            // Set up scroll listener to sync pagination
            const viewport = document.getElementById('slider-viewport');
            if (viewport) {
                viewport.addEventListener('scroll', () => {
                    if (!isScrollingProgrammatically) {
                        updateActiveCardFromScroll();
                    }
                });
            }
        }
        
        function updatePagination() {
            const container = document.getElementById('pagination-dots');
            if (!container) return;
            
            // Show limited dots if too many (e.g., show every 5th dot for 100 cards)
            const totalCards = concepts.length;
            let dotsToShow = [];
            
            if (totalCards <= 20) {
                // Show all dots
                dotsToShow = Array.from({ length: totalCards }, (_, i) => i);
            } else {
                // Show first, last, and every ~5th dot in between
                dotsToShow.push(0);
                for (let i = 5; i < totalCards - 5; i += 5) {
                    dotsToShow.push(i);
                }
                dotsToShow.push(totalCards - 1);
                // Remove duplicates and sort
                dotsToShow = [...new Set(dotsToShow)].sort((a, b) => a - b);
            }
            
            container.innerHTML = dotsToShow.map(index => {
                const isActive = currentCardIndex === index;
                return `<div class="page-dot ${isActive ? 'active' : ''}" data-page-index="${index}"></div>`;
            }).join('');
            
            // Add click handlers to dots
            document.querySelectorAll('.page-dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetIndex = parseInt(dot.getAttribute('data-page-index'));
                    if (!isNaN(targetIndex)) {
                        jumpToCard(targetIndex);
                    }
                });
            });
        }
        
        function updateCardCounter() {
            const counter = document.getElementById('card-counter');
            if (counter) {
                counter.textContent = `${currentCardIndex + 1} / ${concepts.length}`;
            }
        }
        
        function updateActiveCardFromScroll() {
            const viewport = document.getElementById('slider-viewport');
            if (!viewport) return;
            
            const cards = document.querySelectorAll('.concept-card');
            const viewportCenter = viewport.scrollLeft + viewport.offsetWidth / 2;
            
            let closestIndex = 0;
            let closestDistance = Infinity;
            
            cards.forEach((card, index) => {
                const cardCenter = card.offsetLeft + card.offsetWidth / 2;
                const distance = Math.abs(viewportCenter - cardCenter);
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestIndex = index;
                }
            });
            
            if (closestIndex !== currentCardIndex) {
                currentCardIndex = closestIndex;
                updatePagination();
                updateCardCounter();
            }
        }
        
        function jumpToCard(index) {
            if (index < 0 || index >= concepts.length) return;
            
            const cards = document.querySelectorAll('.concept-card');
            if (!cards[index]) return;
            
            currentCardIndex = index;
            isScrollingProgrammatically = true;
            
            const viewport = document.getElementById('slider-viewport');
            const targetCard = cards[index];
            const scrollPosition = targetCard.offsetLeft - (viewport.offsetWidth / 2) + (targetCard.offsetWidth / 2);
            
            viewport.scrollTo({
                left: scrollPosition,
                behavior: 'smooth'
            });
            
            setTimeout(() => {
                isScrollingProgrammatically = false;
            }, 500);
            
            updatePagination();
            updateCardCounter();
        }
        
        function nextCard() {
            if (currentCardIndex + 1 < concepts.length) {
                jumpToCard(currentCardIndex + 1);
            }
        }
        
        function prevCard() {
            if (currentCardIndex - 1 >= 0) {
                jumpToCard(currentCardIndex - 1);
            }
        }

        // Main slide navigation (VERTICAL)
        let currentIdx = 0;
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        function goToSlide(i) { 
            if (i >= 0 && i < sections.length && !isMoving) {
                currentIdx = i; 
                updateUI(); 
            }
        }
        
        function toggleMenu() { 
            document.getElementById('app-menu-layer').classList.toggle('active'); 
        }

        // Vertical swipe for main slides (only when NOT swiping horizontally)
        let touchStartX = null;
        let touchStartY = null;
        
        window.addEventListener('touchstart', e => { 
            touchStartX = e.touches[0].clientX; 
            touchStartY = e.touches[0].clientY; 
        }, { passive: true });
        
        window.addEventListener('touchend', e => {
            if (touchStartX === null || touchStartY === null) return;
            
            const deltaX = Math.abs(touchStartX - e.changedTouches[0].clientX);
            const deltaY = Math.abs(touchStartY - e.changedTouches[0].clientY);
            
            // If horizontal movement is significant, don't trigger vertical navigation
            const isOverSlider = e.changedTouches[0].target.closest('.slider-viewport');
            
            if (!isOverSlider && deltaY > 40 && deltaY > deltaX) {
                const direction = touchStartY - e.changedTouches[0].clientY;
                navigate(direction > 0 ? 1 : -1);
            }
            
            touchStartX = null;
            touchStartY = null;
        });
        
        // Mouse wheel support
        window.addEventListener('wheel', e => { 
            const isOverSlider = e.target.closest('.slider-viewport');
            if (!isOverSlider && Math.abs(e.deltaY) > 30) {
                navigate(e.deltaY > 0 ? 1 : -1);
                e.preventDefault();
            }
        }, { passive: false });
        
        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                navigate(1);
                e.preventDefault();
            } else if (e.key === 'ArrowUp') {
                navigate(-1);
                e.preventDefault();
            }
        });
        
        // Logo click
        const logo = document.querySelector('.faz-logo');
        if (logo) {
            logo.addEventListener('click', (e) => {
                e.stopPropagation();
                goToSlide(0);
            });
        }
        
        // Arrow button handlers
        document.getElementById('prev-card')?.addEventListener('click', prevCard);
        document.getElementById('next-card')?.addEventListener('click', nextCard);
        
        // Dot clicks for main slides
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => goToSlide(i));
        });

        // Initialize everything
        window.onload = () => {
            typeEffect();
            initSlider();
            updateUI();
        };
    </script>
</body>
</html>
