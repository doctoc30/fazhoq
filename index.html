<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFFFFF;
            /* REMOVED SHADOW - only border outline remains for tiles */
            --tile-border: 3px solid #000;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 2rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* ========== HEADER: LOGO + HAMBURGER BIGGER (TASK 2) ========== */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1500;
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent;
        }
        /* Logo bigger */
        .brand-logo {
            font-size: 2rem;        /* Increased from default text-xl (~1.25rem) to 2rem */
            font-weight: 900;
            letter-spacing: -0.02em;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .brand-logo:active { transform: scale(0.97); }
        /* Hamburger button bigger */
        .menu-btn {
            font-size: 2.2rem;       /* Significantly larger */
            background: none;
            border: none;
            color: #000;
            cursor: pointer;
            transition: transform 0.1s ease;
            line-height: 1;
        }
        .menu-btn:active { transform: scale(0.92); }
        .accent { color: var(--brand-orange); }

        .huge-text {
            font-size: clamp(2.2rem, 9vmin, 4.8rem);
            font-weight: 900; line-height: 1.1; letter-spacing: -0.05em;
        }

        /* ========== SEARCH BAR: CENTERED & PUSHED UP (TASK 1) ========== */
        /* Added margin-top reduction and refined centering for all devices */
        .search-container { 
            background: #fff; 
            border-radius: 100px; 
            padding: 6px 10px 6px 6px;
            display: flex; 
            align-items: center; 
            /* Removed deep shadow, using clean border */
            box-shadow: none;
            width: 95%; 
            max-width: 500px; 
            /* Pushed up: reduced margin-top from 30px to 12px + relative shift */
            margin-top: 12px;
            border: 3px solid #000; 
            box-sizing: border-box;
            overflow: hidden;
            /* Ensure centering on all devices */
            margin-left: auto;
            margin-right: auto;
        }
        .search-container input { 
            flex: 1; 
            border: none; 
            outline: none; 
            padding: 12px 15px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            background: transparent;
            min-width: 0;
        }
        .search-icon-btn { 
            flex-shrink: 0; 
            width: 48px; 
            height: 48px; 
            background: #000; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            border: none; 
            cursor: pointer;
        }

        /* ========== CATEGORY TILES: SLIGHTLY SMALLER + BORDER ONLY (TASKS 3 & 4) ========== */
        .category-header {
            color: var(--brand-orange); font-weight: 900; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 0.05em; margin-top: 70px; /* reduced from 110px to push content up slightly */
            margin-bottom: 1.2rem;
        }

        .category-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; 
            width: 100%; max-width: 520px; margin-bottom: 100px; 
        }

        /* Tiles: Smaller padding, slightly smaller text, and NO SHADOW — only border outline */
        .category-tile {
            background: #fff; 
            border: 3px solid #000; 
            border-radius: 20px;
            padding: 1.2rem 0.8rem;   /* Reduced from 1.8rem 1rem to make tiles slightly smaller */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 0.6rem;              /* Reduced gap */
            /* NO box-shadow (task 4: shades removed, just border outline) */
            box-shadow: none;
            transition: transform 0.15s ease;
            cursor: pointer;
        }
        .category-tile:active { transform: scale(0.96); }
        
        /* Icon container slightly smaller to match tile scale */
        .tile-icon { 
            width: 48px; 
            height: 48px; 
            background: var(--brand-orange); 
            color: white; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.3rem; 
        }
        .tile-label { 
            font-weight: 900; 
            font-size: 0.85rem;   /* Slightly smaller text */
            line-height: 1.2; 
            color: #000; 
            text-align: center;
        }
        /* For the spanning tile in row layout (Retail & Creative) */
        .category-tile[style*="grid-column: span 2"] {
            flex-direction: row;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
        }
        .category-tile[style*="grid-column: span 2"] .tile-icon {
            width: 44px;
            height: 44px;
        }

        /* TASK 2: VIBZ ANIMATIONS (preserved) */
        .fa-heart-pulse { animation: heartbeat 1.5s ease-in-out infinite; }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
        .fa-hammer {
            animation: hammerHit 1.2s ease-in-out infinite;
            transform-origin: bottom center;
        }
        @keyframes hammerHit {
            0% { transform: rotate(0deg) translateY(0); }
            10% { transform: rotate(30deg) translateY(-3px); }
            20% { transform: rotate(-20deg) translateY(0); }
            30% { transform: rotate(0deg) translateY(0); }
            40% { transform: rotate(0deg) translateY(0); }
            100% { transform: rotate(0deg) translateY(0); }
        }
        .fa-briefcase { animation: bounce 2s ease infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .fa-utensils {
            animation: utensilsMove 2.5s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes utensilsMove {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.1); }
            50% { transform: rotate(15deg) scale(0.9); }
            75% { transform: rotate(-5deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .fa-bag-shopping {
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
        }
        @keyframes swing {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        /* TASK 3: SWIPE COUNTER PROGRESS (already functional) */
        .swipe-counter {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2000;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #D1D1D1;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dot.active {
            background: var(--brand-orange);
            height: 24px;
            border-radius: 10px;
        }

        /* LAYER for categories popup */
        #category-layer {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        #category-layer.active { display: flex; }
        .cat-item { 
            font-size: 1.5rem; font-weight: 900; color: #000; padding: 15px 40px; 
            background: #fff; border: 3px solid #000; border-radius: 50px; 
            margin: 8px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 0 #000; transition: 0.1s;
        }
        .cat-item:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }
        .close-layer { margin-top: 30px; width: 60px; height: 60px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }

        /* AVATAR */
        .waving-hand { width: clamp(250px, 70vw, 400px); height: auto; mix-blend-mode: multiply; animation: wave 2.5s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } }

        /* DOCK */
        .app-dock {
            position: fixed; bottom: max(1.5rem, env(safe-area-inset-bottom) + 0.5rem);
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 5rem;
            padding: 0.8rem 2.2rem; display: flex; gap: 2.5rem; align-items: center; z-index: 2500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
        }
        .dock-btn { font-size: 1.7rem; color: var(--brand-orange); }

        /* LANDSCAPE FIXES + additional adjustments for search centering */
        @media (orientation: landscape) {
            .text-wrap { 
                flex-direction: row; 
                text-align: left; 
                justify-content: center; 
                gap: 2rem; 
                max-width: 90%;
            }
            .content-group { 
                display: flex; 
                flex-direction: column; 
                align-items: flex-start; 
                text-align: left;
            }
            .category-grid { grid-template-columns: repeat(3, 1fr); max-width: 750px; margin-bottom: 50px;}
            .waving-hand { height: 55vh; width: auto; max-width: 35vw; }
            .search-container { margin-top: 12px; width: 100%; }
            /* header adjustments */
            nav { padding: 1rem 2rem; }
        }
        
        /* Additional fine-tuning for very small devices to keep search centered and pushed up */
        @media (max-height: 650px) {
            .search-container { margin-top: 8px; }
            .category-header { margin-top: 40px; }
        }
        
        /* Make sure first slide content-group spacing feels balanced: search slightly upward */
        .content-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        /* push up search relative to the typewriter line - consistent centering */
        section.active .search-container {
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <nav>
        <!-- TASK 2: Logo bigger: brand-logo class with 2rem font size -->
        <div class="brand-logo" onclick="goToSlide(0)">FAZ HOQ<span class="accent">.</span></div>
        <!-- TASK 2: Hamburger menu bigger: increased font-size & added class -->
        <button class="menu-btn" id="hamburgerBtn"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div class="swipe-counter">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="category-layer">
        <h2 id="cat-title" class="huge-text accent mb-6">Niche</h2>
        <div id="cat-list" class="flex flex-col items-center w-full"></div>
        <div class="close-layer" onclick="toggleCategories()"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <!-- Slide 1: Hero + search (centered and pushed up) -->
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2826.jpeg" alt="Faz Hoq" class="waving-hand">
                
                <div class="content-group">
                    <h1 class="huge-text">I build websites for:</h1>
                    <div class="huge-text accent" id="typewriter">&nbsp;</div>
                    <!-- TASK 1: Search bar is centered, margin adjusted to push slightly upward -->
                    <div class="search-container">
                        <input type="text" id="mainSearch" placeholder="Search industry..." onkeypress="if(event.key==='Enter') triggerSearch()">
                        <button class="search-icon-btn" onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Slide 2: Categories (tiles now smaller, no shadows, only border outline) -->
        <section>
            <div class="text-wrap">
                <div class="flex flex-col items-center w-full">
                    <h2 class="category-header">OR SELECT FROM POPULAR CATEGORIES</h2>
                    <div class="category-grid">
                        <!-- Each tile: NO shadow, only border outline (task 4) + slightly smaller dimensions (task 3) -->
                        <div class="category-tile" onclick="openNiche('Health & Wellness')">
                            <div class="tile-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                            <span class="tile-label">Health & Wellness</span>
                        </div>
                        <div class="category-tile" onclick="openNiche('Home & Trades')">
                            <div class="tile-icon"><i class="fa-solid fa-hammer"></i></div>
                            <span class="tile-label">Home & Trades</span>
                        </div>
                        <div class="category-tile" onclick="openNiche('Professional')">
                            <div class="tile-icon"><i class="fa-solid fa-briefcase"></i></div>
                            <span class="tile-label">Professional Services</span>
                        </div>

                            <div class="tile-icon"><i class="fa-solid fa-utensils"></i></div>

                            <span class="tile-label ml-2">Retail & Creative Industries</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Slide 3: Final CTA -->
        <section class="bg-dark text-white"><div class="text-wrap"><h2 class="huge-text uppercase">LET'S<br><span class="accent">BUILD.</span></h2></div></section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i></a>
    </div>

    <script>
        const nicheData = {
            "Health & Wellness": ["Barbers", "Dentists", "Gyms", "Spas", "Physios"],
            "Home & Trades": ["Plumbers", "Electricians", "Landscapers", "Cleaners"],
            "Professional": ["Lawyers", "Accountants", "Real Estate", "Tutors"],
            "Food & Drink": ["Restaurants", "Cafes", "Bakeries", "Bars"],
            "Retail & Creative": ["Boutiques", "Photographers", "Artists", "Florists"]
        };

        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            charIndex += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIndex) || "&nbsp;";
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { speed = 1800; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; speed = 400; }
            setTimeout(type, speed);
        }
        window.onload = type;

        // Toggle categories modal
        function toggleCategories() { 
            document.getElementById('category-layer').classList.toggle('active'); 
        }

        function openNiche(sector) {
            const list = document.getElementById('cat-list');
            document.getElementById('cat-title').textContent = sector;
            list.innerHTML = "";
            nicheData[sector].forEach(niche => {
                const div = document.createElement('div');
                div.className = "cat-item";
                div.textContent = niche;
                div.onclick = () => {
                    document.getElementById('mainSearch').value = niche;
                    toggleCategories();
                    triggerSearch();
                };
                list.appendChild(div);
            });
            toggleCategories();
        }

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val && val.trim() !== "") {
                window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val.trim());
            } else {
                // subtle feedback: if empty search, do nothing but maybe focus
                document.getElementById('mainSearch').focus();
            }
        }

        // Swipe navigation logic + sync dots
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            // Update progress dots (Task 3 already functional)
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; 
                currentIdx = target; 
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let sX, sY;
        window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 50 || Math.abs(dY) > 50) navigate(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 1 : -1) : (dY > 0 ? 1 : -1));
        });
        
        function goToSlide(i) { 
            if(i >= 0 && i < sections.length && !isMoving) {
                currentIdx = i; 
                updateUI();
            }
        }
        
        // hamburger menu (bigger button) triggers category modal on any slide (extra UX)
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        if(hamburgerBtn) {
            hamburgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // If we are on the categories slide (slide index 1), we can also open modal.
                // Otherwise just open categories modal to quickly select niche.
                toggleCategories();
            });
        }
        
        // Ensure search bar is centered after any orientation changes and dynamic resize
        window.addEventListener('resize', () => {
            // forces reflow to keep consistent but no extra logic needed.
        });
        
        // Additional: manually adjust first slide content vertical rhythm to push search slightly up
        // This is already handled by margin-top reduction + relative centering.
        // Also apply slight margin to the first slide heading to reduce gap.
        const firstSlideContent = document.querySelector('section.active .content-group');
        if(firstSlideContent) {
            // Fine-tune existing style for visual push upward without breaking responsiveness
            firstSlideContent.style.marginTop = '-8px';
        }
        
        // Final fix to make sure category tiles have absolutely no shadow (override any inline from previous code)
        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.style.boxShadow = 'none';
        });
        
        // Initialize UI
        updateUI();
    </script>
</body>
</html>
