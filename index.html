<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        :root {
            --brand-orange: #FF6B2C;
            --app-white: #FFF9F6; /* Slightly off-white to match the screenshot */
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Outfit', sans-serif;
            background: #fff; touch-action: none;
            -webkit-user-select: none;
        }

        .slide-container { position: relative; height: 100%; width: 100%; overflow: hidden; }

        section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 1.5rem;
            background: var(--app-white);
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        section.active { transform: translate3d(0, 0, 0); visibility: visible; z-index: 10; }
        section.prev { transform: translate3d(-100%, 0, 0); visibility: visible; z-index: 5; }

        .text-wrap { width: 100%; max-width: 600px; text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; }

        .huge-text {
            font-size: clamp(2.2rem, 9vmin, 4.8rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
        }

        .accent { color: var(--brand-orange); }
        .bg-dark { background-color: #050505; color: #fff; }

        /* CATEGORY GRID STYLES */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            width: 100%;
            margin-top: 2rem;
        }

        .category-card {
            background: #fff;
            border-radius: 28px;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            color: #000;
            transition: transform 0.2s ease;
        }

        .category-card:active { transform: scale(0.96); }

        .category-icon {
            width: 55px;
            height: 55px;
            background: var(--brand-orange);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 6px 15px rgba(255, 107, 44, 0.25);
        }

        .category-label {
            font-weight: 900;
            font-size: 0.95rem;
            line-height: 1.2;
            text-align: center;
        }

        .full-width-card {
            grid-column: span 2;
            flex-direction: row;
            padding: 1.2rem 2rem;
            justify-content: flex-start;
            gap: 1.5rem;
        }

        /* HERO ELEMENTS */
        .waving-hand {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin-top: -60px;
            margin-bottom: 10px;
            mix-blend-mode: multiply; 
        }

        .search-container { 
            background: #fff; 
            border-radius: 100px; 
            padding: 6px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); 
            width: 95%;
            margin-top: 30px;
            border: 2px solid #000; 
        }

        .search-container input { 
            flex: 1; border: none; outline: none; 
            padding: 10px 18px; font-size: 1.1rem; 
            font-weight: 700; background: transparent;
        }

        .search-icon-btn { 
            width: 45px; height: 45px; 
            background: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            color: #fff; border: none; 
        }

        /* DOCK & DOTS */
        .app-dock {
            position: fixed; bottom: max(1.2rem, env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px); border-radius: 5rem;
            padding: 0.7rem 2rem; display: flex; gap: 2rem;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .dock-btn { font-size: 1.6rem; color: var(--brand-orange); }
        .nav-dots { position: fixed; right: 1.2rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 0.8rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: 0.3s; }
        .dot.active { background: var(--brand-orange); transform: scale(2); }

        @media (orientation: landscape) {
            .category-grid { grid-template-columns: repeat(4, 1fr); }
            .full-width-card { grid-column: span 2; }
            .waving-hand { width: 180px; margin-top: 0; }
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[1500] p-6 flex justify-between items-center">

    <div class="nav-dots">

                <div class="huge-text accent" id="typewriter">&nbsp;</div>
                
                <div class="search-container">

        <section><div class="text-wrap"><h2 class="huge-text uppercase">STRATEGIC<br><span class="accent">PARTNER.</span></h2></div></section>

    </div>

    <script>
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function type() {
            const currentWord = nicheWords[wordIndex];
            if (isDeleting) charIndex--; else charIndex++;
            const str = currentWord.substring(0, charIndex);
            typewriterEl.innerHTML = str === "" ? "&nbsp;" : str;
            let typeSpeed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentWord.length) { typeSpeed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % nicheWords.length; typeSpeed = 500; }
            setTimeout(type, typeSpeed);
        }
        window.onload = type;

        function triggerSearch() {
            const val = document.getElementById('mainSearch').value.trim();
            if(val) window.location.href = "https://www.vibz.co.uk/funnel.html?niche=" + encodeURIComponent(val);
        }

        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let currentIdx = 0, isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true; currentIdx = target; updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        let startY = 0;
        window.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            const dY = startY - e.changedTouches[0].clientY;
            if (Math.abs(dY) > 50) navigate(dY > 0 ? 1 : -1);
        });
        window.addEventListener('wheel', e => { if (Math.abs(e.deltaY) > 10) navigate(e.deltaY > 0 ? 1 : -1); });
        function goToSlide(index) { currentIdx = index; updateUI(); }
    </script>

</html>
