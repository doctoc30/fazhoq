<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | SOLO DIGITAL ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --card-bg: rgba(255, 255, 255, 0.9);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-light);
            color: var(--text);
            touch-action: none; /* Prevents default browser interference with custom swipes */
        }

        .slide-container {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: transparent;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
        }

        section.active {
            transform: translate3d(0, 0, 0);
            visibility: visible;
            z-index: 10;
        }
        section.prev {
            transform: translate3d(-100%, 0, 0);
            visibility: visible;
            z-index: 5;
        }

        /* HEADER */
        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            cursor: pointer;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--text);
            background: none;
            border: none;
            cursor: pointer;
        }

        /* TEXT STYLES */
        .text-wrap {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .huge-text {
            font-size: clamp(2.5rem, 10vmin, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--primary);
        }

        .huge-text.black { color: #000; }

        .waving-hand {
            width: clamp(220px, 60vw, 320px);
            height: auto;
            margin-bottom: 20px;
            mix-blend-mode: multiply;
            transform: translateY(-20px);
        }

        /* CONSTANT CONCEPT SLIDER */
        .slider-viewport {
            width: 100vw;
            overflow: hidden;
            padding: 40px 0;
            position: relative;
        }

        .slider-track {
            display: flex;
            width: fit-content;
            animation: scroll 30s linear infinite;
        }

        /* PAUSE animation on hover for better UX, especially on desktop */
        .slider-viewport:hover .slider-track {
            animation-play-state: paused;
        }

        .concept-card {
            width: 280px;
            height: 380px;
            background: white;
            margin: 0 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 0, 0.05);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .concept-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(255, 107, 0, 0.2);
        }

        .concept-img {
            width: 100%;
            height: 70%;
            background: #eee;
            background-size: cover;
            background-position: center;
        }

        .concept-info {
            padding: 20px;
            text-align: left;
        }

        .concept-info h4 { font-weight: 900; color: var(--primary); font-size: 1.2rem; }
        .concept-info p { font-size: 0.85rem; font-weight: 700; opacity: 0.5; text-transform: uppercase; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* DOCK (EXACT RETAINED) */
        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
        }
        
        .dock-btn {
            font-size: 2rem;
            color: #FFFFFF;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }
        .dock-btn span {
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 4px;
        }

        /* SWIPE COUNTER */
        .swipe-counter {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2400;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 10px;
        }

        /* MENU */
        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .close-menu-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app-menu-layer">
        <div class="close-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
        <div class="flex flex-col items-center justify-center flex-1 gap-10">
            <a href="#" class="huge-text" onclick="goToSlide(0); toggleMenu()">HOME</a>
            <a href="#" class="huge-text" onclick="goToSlide(1); toggleMenu()">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="huge-text">HIRE ME</a>
        </div>
    </div>

    <nav class="faz-nav">
        <div class="faz-logo" onclick="goToSlide(0)">FAZ HOQ<span>.</span></div>
        <button id="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div class="swipe-counter">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>

    <div class="slide-container" id="master-wrapper">
        <section class="active">
            <div class="text-wrap">
                <img src="https://doctoc30.github.io/fazhoq/images/IMG_2973.png" alt="Faz Hoq" class="waving-hand">
                <h1 class="huge-text">I build websites for:</h1>
                <div class="huge-text black" id="typewriter">&nbsp;</div>
                <p class="mt-8 font-black uppercase tracking-[4px] text-xs opacity-40">Independent Web Developer</p>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text mb-6">VISUAL<br><span class="black">CONCEPTS.</span></h2>
                <div class="slider-viewport">
                    <div class="slider-track" id="slider-track">
                        <!-- Dynamic cards will be injected here by JavaScript -->
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="text-wrap">
                <h2 class="huge-text">READY TO<br><span class="black">COLLABORATE?</span></h2>
                <div class="mt-10 p-6 bg-white rounded-[30px] border border-orange-100 shadow-xl inline-block">
                    <p class="font-bold text-orange-600">Now taking bookings for 2026</p>
                </div>
            </div>
        </section>
    </div>

    <div class="app-dock">
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
        <div class="dock-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i><span>MENU</span></div>
    </div>

    <script>
        // --- TYPEWRITER NICHES RETAINED EXACTLY ---
        const nicheWords = ["Plumbers", "Barbers", "Lawyers", "Dentists", "Gyms", "Electricians", "Landscapers"];
        let wordIdx = 0;
        let charIdx = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function typeEffect() {
            const currentWord = nicheWords[wordIdx];
            charIdx += isDeleting ? -1 : 1;
            typewriterEl.innerHTML = currentWord.substring(0, charIdx) || "&nbsp;";

            let speed = isDeleting ? 60 : 120;

            if (!isDeleting && charIdx === currentWord.length) {
                speed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                wordIdx = (wordIdx + 1) % nicheWords.length;
                speed = 500;
            }
            setTimeout(typeEffect, speed);
        }

        // --- SLIDER CONCEPTS WITH CLICKABLE URLS ---
        // Each concept now includes a 'url' field. 
        // The "Modern Barber" card uses the specific link you provided.
        // Other cards also have relevant placeholder links (they can be customized later).
        const concepts = [
            { 
                title: "Modern Barber", 
                sub: "Branding & Identity", 
                img: "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=400",
                url: "https://doctoc30.github.io/fazhoq/concepts/barber"  // YOUR LINK IS HERE
            },
            { 
                title: "Legal Suite", 
                sub: "Interface Design", 
                img: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&w=400",
                url: "https://doctoc30.github.io/fazhoq/concepts/legal"  // Example placeholder
            },
            { 
                title: "Fitness Pro", 
                sub: "User Flow", 
                img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=400",
                url: "https://doctoc30.github.io/fazhoq/concepts/fitness" // Example placeholder
            },
            { 
                title: "Trade Flow", 
                sub: "Concept Engineering", 
                img: "https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=400",
                url: "https://doctoc30.github.io/fazhoq/concepts/trade" // Example placeholder
            }
        ];

        // Function to handle card click and open URL in new tab
        function onCardClick(url) {
            if (url) {
                window.open(url, '_blank', 'noopener,noreferrer');
            } else {
                console.warn("No URL defined for this concept.");
            }
        }

        function initSlider() {
            const track = document.getElementById('slider-track');
            // Duplicate array to create infinite loop effect
            const items = [...concepts, ...concepts]; 
            track.innerHTML = items.map((c, idx) => {
                // Generate a unique click handler for each card
                // Using data attribute to store URL, then attach event listener after creation is cleaner
                return `
                    <div class="concept-card" data-url="${c.url}" data-title="${c.title}">
                        <div class="concept-img" style="background-image: url('${c.img}')"></div>
                        <div class="concept-info">
                            <h4>${c.title}</h4>
                            <p>${c.sub}</p>
                        </div>
                    </div>
                `;
            }).join('');

            // Attach click event listeners to all concept cards
            const cards = document.querySelectorAll('.concept-card');
            cards.forEach(card => {
                const url = card.getAttribute('data-url');
                if (url) {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevent any unexpected bubbling
                        window.open(url, '_blank', 'noopener,noreferrer');
                    });
                }
            });
        }

        // --- NAVIGATION ---
        let currentIdx = 0;
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');
        let isMoving = false;

        function updateUI() {
            sections.forEach((sec, i) => {
                sec.classList.remove('active', 'prev');
                if (i === currentIdx) sec.classList.add('active');
                else if (i < currentIdx) sec.classList.add('prev');
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIdx);
            });
        }

        function navigate(dir) {
            if (isMoving) return;
            const target = currentIdx + dir;
            if (target >= 0 && target < sections.length) {
                isMoving = true;
                currentIdx = target;
                updateUI();
                setTimeout(() => { isMoving = false; }, 800);
            }
        }

        function goToSlide(i) { 
            if (i >= 0 && i < sections.length) {
                currentIdx = i; 
                updateUI(); 
            }
        }
        
        function toggleMenu() { 
            document.getElementById('app-menu-layer').classList.toggle('active'); 
        }

        // --- ENHANCED GESTURES (LEFT/RIGHT + UP/DOWN) ---
        let sX, sY;
        window.addEventListener('touchstart', e => { 
            sX = e.touches[0].clientX; 
            sY = e.touches[0].clientY; 
        });
        
        window.addEventListener('touchend', e => {
            // Only process if start positions exist
            if (sX === undefined || sY === undefined) return;
            let dX = sX - e.changedTouches[0].clientX;
            let dY = sY - e.changedTouches[0].clientY;
            
            // Horizontal swipe has priority if movement is significant
            if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 30) {
                navigate(dX > 0 ? 1 : -1);
            } else if (Math.abs(dY) > 30) {
                navigate(dY > 0 ? 1 : -1);
            }
            // Reset values
            sX = undefined;
            sY = undefined;
        });

        // Mouse wheel support for desktop
        window.addEventListener('wheel', e => { 
            if (Math.abs(e.deltaY) > 30) {
                navigate(e.deltaY > 0 ? 1 : -1);
                e.preventDefault(); // Slightly prevent aggressive scroll but keep user experience
            }
        }, { passive: false });
        
        // Also add keyboard arrow keys support for accessibility
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                navigate(1);
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                navigate(-1);
                e.preventDefault();
            } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                navigate(e.key === 'ArrowDown' ? 1 : -1);
                e.preventDefault();
            }
        });

        // Ensure that clicking on dots stops propagation so it doesn't interfere
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        });

        // Also prevent accidental navigation when clicking inside cards (but we want card clicks to work)
        // The card clicks are independent and won't trigger navigation because we stopPropagation on the card's click.
        // Additionally, we ensure that the slider container doesn't absorb the click.

        window.onload = () => {
            typeEffect();
            initSlider();
            updateUI();
        };
    </script>
</body>
</html>
