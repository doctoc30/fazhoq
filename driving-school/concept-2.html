<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tony Shiels App</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --app-blue: #0099e5;
            --app-black: #121212;
            --app-gray: #f2f2f7;
            --app-red: #ff3b30;
            --safe-area-bottom: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: white;
            color: var(--app-black);
            line-height: 1.4;
            /* Prevents bounce scrolling on mobile for app feel */
            overscroll-behavior-y: contain;
        }

        /* --- APP HEADER --- */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: var(--app-black);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .logo-text b { color: var(--app-blue); }

        /* --- HERO APP SECTION --- */
        .hero-app {
            padding-top: 70px;
            padding-bottom: 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .top-content {
            padding: 40px 20px;
        }

        .premier-title {
            font-size: 4rem;
            font-weight: 800;
            color: var(--app-blue);
            letter-spacing: -2px;
            line-height: 0.8;
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 1rem;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .car-container {
            width: 100%;
            padding: 20px 0;
            position: relative;
        }

        .car-img {
            width: 115%; /* Slightly overflow for app-style depth */
            margin-left: -7.5%;
            filter: drop-shadow(0 25px 35px rgba(0, 153, 229, 0.2));
            animation: appFloat 4s ease-in-out infinite;
        }

        @keyframes appFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* --- THE APP "SHEET" (Curved Blue Area) --- */
        .app-sheet {
            background: var(--app-blue);
            width: 100%;
            border-radius: 40px 40px 0 0;
            padding: 40px 20px 140px 20px;
            margin-top: -40px;
            z-index: 2;
            flex-grow: 1;
        }

        .app-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .app-btn {
            flex: 1;
            background: var(--app-black);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .app-btn:active {
            transform: scale(0.95);
        }

        .trust-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 100px;
            color: white;
            margin-top: 30px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }

        /* --- BOTTOM APP NAVIGATION --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-area-bottom);
            z-index: 1001;
        }

        .nav-item {
            text-align: center;
            color: #8e8e93;
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .nav-item i {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--app-blue);
        }

        .nav-item.center-btn {
            background: var(--app-blue);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-top: -45px;
            box-shadow: 0 8px 20px rgba(0, 153, 229, 0.4);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-logo">
            <div class="logo-icon">TS</div>
            <div class="logo-text">
                <strong>TONY <b>SHIELS</b></strong>
            </div>
        </div>
        <div class="app-profile">
            <i class="fa-solid fa-circle-user" style="font-size: 2rem; color: #ddd;"></i>
        </div>
    </header>

    <section class="hero-app">
        <div class="top-content">
            <h1 class="premier-title">PREMIER</h1>
            <p class="sub-title">Driving School • East London</p>
        </div>

        <div class="car-container">
            <img src="https://i.ibb.co/XfS7rYn/blue-car-placeholder.png" alt="Tony Shiels Blue Car" class="car-img">
        </div>

        <div class="app-sheet">
            <div class="app-buttons">
                <a href="tel:+447752892178" class="app-btn">
                    <i class="fa-solid fa-phone"></i> CALL US
                </a>
                <a href="#offers" class="app-btn">
                    VIEW OFFERS
                </a>
            </div>

            <div class="trust-pill">
                <span>London's Most <strong>Trusted</strong> School</span>
                <i class="fa-solid fa-star" style="margin-left: 8px; color: #ffd700;"></i>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i> Home
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-calendar-days"></i> Lessons
        </a>
        <a href="#" class="nav-item center-btn">
            <i class="fa-solid fa-bolt"></i>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-map-location-dot"></i> Areas
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i> Profile
        </a>
    </nav>

</body>
</html>
