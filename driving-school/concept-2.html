<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels Driving School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --car-blue: #0099ff;
            --car-black: #111111;
            --bg-silver: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            color: var(--car-black);
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            text-decoration: none;
            color: var(--car-black);
            line-height: 1;
        }

        .logo .brand { font-weight: 900; font-size: 1.2rem; }
        .logo .brand span { color: var(--car-blue); }

        .nav-links a {
            text-decoration: none;
            color: var(--car-black);
            font-weight: 700;
            margin-left: 20px;
            font-size: 0.9rem;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding-top: 80px; /* Space for absolute header */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, var(--bg-silver) 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* THE CAR AT THE TOP */
        .hero-image-top {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            perspective: 1000px;
            z-index: 10;
        }

        .hero-image-top img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.12));
            animation: carFloat 1.2s ease-out forwards;
        }

        @keyframes carFloat {
            from { opacity: 0; transform: translateY(-30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* TEXT CONTENT BELOW CAR */
        .hero-text-bottom {
            max-width: 800px;
            padding: 20px 5%;
            z-index: 5;
        }

        .hero-text-bottom h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-text-bottom h1 span {
            color: var(--car-blue);
        }

        .hero-text-bottom p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-blue {
            background: var(--car-blue);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 153, 255, 0.2);
        }

        .btn-dark {
            background: var(--car-black);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        /* Trust Bar Overlay */
        .trust-bar {
            margin-top: 50px;
            background: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .stars { color: #FFD700; }

        @media (max-width: 768px) {
            .hero-text-bottom h1 { letter-spacing: -1px; }
            .btn-group { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo">
            <div class="brand">TONY <span>SHIELS</span></div>
            <small>DRIVING SCHOOL</small>
        </a>
        <nav class="nav-links">
            <a href="#lessons">Lessons</a>
            <a href="tel:+447752892178">07752 892178</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-image-top">
            <img src="tony-shiels-car-blue.png" alt="Tony Shiels Blue Driving School Car">
        </div>

        <div class="hero-text-bottom">
            <h1>Expert <span>Driving</span> Tuition.</h1>
            <p>Premium manual and automatic lessons in London. Trusted by hundreds of successful students.</p>
            
            <div class="btn-group">
                <a href="#book" class="btn btn-blue">Book Your First Lesson</a>
                <a href="#prices" class="btn btn-dark">View Price List</a>
            </div>

            <div class="trust-bar">
                <span class="stars">★★★★★</span>
                <span>The highest rated driving school in your area</span>
            </div>
        </div>
    </section>

</body>
</html>
