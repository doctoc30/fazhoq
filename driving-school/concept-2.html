<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels Driving School | Premium Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --car-blue: #0099ff;      /* Electric blue from car body */
            --car-black: #111111;     /* Wheel & trim black */
            --car-silver: #f5f5f7;    /* Light silver for backgrounds */
            --text-dark: #1d1d1f;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER SECTION --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .header.scrolled {
            padding: 12px 8%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: var(--car-black);
        }

        .logo .brand-name {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .logo .brand-name span {
            color: var(--car-blue);
        }

        .logo small {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--car-blue);
        }

        .nav-cta {
            background: var(--car-black);
            color: #fff !important;
            padding: 10px 22px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .nav-cta:hover {
            background: var(--car-blue) !important;
            transform: translateY(-2px);
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 100px 8% 0;
            background: radial-gradient(circle at 70% 30%, #eef8ff 0%, #ffffff 60%);
            overflow: hidden;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 25px;
            letter-spacing: -2px;
        }

        .hero-content h1 span {
            color: var(--car-blue);
            display: block;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 35px;
            max-width: 450px;
        }

        .hero-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 18px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
            display: inline-block;
        }

        .btn-main {
            background: var(--car-blue);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 153, 255, 0.3);
        }

        .btn-main:hover {
            background: var(--car-black);
            transform: translateY(-3px);
        }

        .btn-outline {
            border: 2px solid var(--car-black);
            color: var(--car-black);
        }

        .btn-outline:hover {
            background: var(--car-black);
            color: white;
        }

        .trust-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .stars { color: #ffcc00; font-size: 1.2rem; }

        /* Hero Image - The Car */
        .hero-visual {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .car-image {
            width: 140%; /* Large for impact */
            max-width: 900px;
            filter: drop-shadow(30px 50px 60px rgba(0,0,0,0.15));
            transform: translateX(100px);
            animation: carEntry 1.5s ease-out forwards;
        }

        @keyframes carEntry {
            from { opacity: 0; transform: translateX(300px) rotate(2deg); }
            to { opacity: 1; transform: translateX(50px) rotate(0deg); }
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 1024px) {
            .hero-content h1 { font-size: 3.5rem; }
            .car-image { width: 120%; transform: translateX(50px); }
        }

        @media (max-width: 768px) {
            .header { padding: 15px 5%; }
            .nav-links { display: none; } /* Mobile Menu would go here */
            
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 140px;
            }

            .hero-content { margin-bottom: 50px; }
            .hero-content h1 { font-size: 3rem; }
            .hero-content p { margin: 0 auto 30px; }
            .hero-btns { justify-content: center; }
            .trust-indicator { justify-content: center; }

            .car-image {
                width: 100%;
                transform: translateX(0);
                animation: carEntryMobile 1.2s ease-out forwards;
            }
        }

        @keyframes carEntryMobile {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="header" id="navbar">
        <a href="#" class="logo">
            <div class="brand-name">TONY <span>SHIELS</span></div>
            <small>Driving School</small>
        </a>

        <nav class="nav-links">
            <a href="#about">About</a>
            <a href="#lessons">Lessons</a>
            <a href="#reviews">Reviews</a>
            <a href="tel:+447752892178" class="nav-cta">07752 892178</a>
        </nav>

        <div class="mobile-toggle" style="display:none;">☰</div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="trust-indicator">
                <span class="stars">★★★★★</span> 
                <span>LONDON'S PREMIER CHOICE</span>
            </div>
            <h1>Drive with <span>Confidence.</span></h1>
            <p>
                Get behind the wheel of our premium fleet. Expert manual and automatic lessons tailored to help you pass the first time.
            </p>
            <div class="hero-btns">
                <a href="#contact" class="btn btn-main">Book First Lesson</a>
                <a href="#pricing" class="btn btn-outline">Lesson Prices</a>
            </div>
        </div>

        <div class="hero-visual">
            <img src="https://i.postimg.cc/mD8P8z8P/blue-car-tony.png" alt="Tony Shiels Driving School Car" class="car-image">
        </div>
    </section>

    <script>
        // Change header style on scroll
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.pageYOffset > 50) {
                nav.classList.add("scrolled");
            } else {
                nav.classList.remove("scrolled");
            }
        };

        // Smooth scroll for links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
