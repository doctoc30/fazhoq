<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels School of Motoring | Kirton Lindsey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --electric-blue: #0099de; /* The car body color */
            --tony-navy: #1a2b56;    /* "TONY" and branding text */
            --pure-white: #ffffff;
        }

        body { 
            background-color: var(--pure-white); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 0;
        }

        /* STAGE 1: HEADER CUSTOM STYLES */
        .header-container {
            background: linear-gradient(to bottom, #f0f9ff 0%, #ffffff 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .logo-text-group {
            display: flex;
            flex-direction: column;
        }

        /* Mirroring the Rooftop Sign Typography */
        .logo-main {
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-style: italic;
        }

        .text-tony { color: var(--tony-navy); }
        .text-shiels { color: var(--electric-blue); }

        .logo-sub {
            font-size: 10px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        .logo-phone {
            font-size: 11px;
            font-weight: 700;
            color: var(--tony-navy);
            margin-top: 2px;
        }

        .menu-circle-widget {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tony-navy) 0%, var(--electric-blue) 100%);
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* STAGE 2: HERO CUSTOM STYLES */
        .hero-section {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 90px);
            text-align: center;
        }

        .hero-headline {
            color: var(--electric-blue);
            font-size: 56px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 40px;
        }

        .hero-subheadline {
            color: var(--tony-navy);
            font-weight: 700;
            font-size: 18px;
            margin-top: 4px;
        }

        .car-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .car-img {
            max-width: 90%;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
        }

        /* The Signature Blue Curve Footer Block */
        .blue-curve-block {
            background-color: var(--electric-blue);
            height: 220px;
            border-top-left-radius: 50% 20px;
            border-top-right-radius: 50% 20px;
            position: relative;
            margin-top: 20px;
        }

        .floating-cta-wrap {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            display: flex;
            gap: 12px;
        }

        .black-btn-widget {
            flex: 1;
            background: #000000;
            color: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            text-decoration: none;
        }

        .bottom-gradient-widget {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: white;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            color: var(--tony-navy);
            text-transform: uppercase;
            border: 3px solid;
            border-image: linear-gradient(to right, var(--electric-blue), var(--tony-navy)) 1;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="logo-text-group">
            <div class="logo-main italic">
                <span class="text-tony">TONY</span> 
                <span class="text-shiels">SHIELS</span>
            </div>
            <div class="logo-sub">School of Motoring</div>
            <div class="logo-phone">+44 7752 892178</div>
        </div>

        <div class="menu-circle-widget">
            <i class="fas fa-bars text-xl"></i>
        </div>
    </header>

    <main class="hero-section">
        <div>
            <h1 class="hero-headline">PREMIER</h1>
            <p class="hero-subheadline italic">Driving School in Kirton Lindsey</p>
        </div>

        <div class="car-container">
            <img src="https://i.ibb.co/VWV0p0p/blue-car-side.png" alt="Tony Shiels Car" class="car-img">
        </div>

        <div class="blue-curve-block">
            <div class="floating-cta-wrap">
                <a href="tel:+447752892178" class="black-btn-widget">
                    <i class="fas fa-phone-alt"></i>
                    <span>Call Tony</span>
                </a>
                <a href="#" class="black-btn-widget">
                    <i class="fas fa-calendar-alt"></i>
                    <span>View Offers</span>
                </a>
            </div>

            <div class="bottom-gradient-widget">
                Manual Driving Specialist
            </div>
        </div>
    </main>

</body>
</html>
