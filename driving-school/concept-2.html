<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels Driving School - Premier Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Exact color sampling from the car reference */
            --tony-blue: #0099ff; /* Electric blue body */
            --tony-silver: #f0f0f0; /* Car roof sign base / neutral bg */
            --tony-black: #111111; /* Wheels, trim, typography */
            --text-dark: #333333;
            --text-light: #ffffff;
            --font-main: 'Montserrat', sans-serif;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            color: var(--text-dark);
            background-color: var(--tony-silver);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95); /* Glassmorphism effect */
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 2px solid #eaeaea;
        }

        .logo-group {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-main {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -1px;
            color: var(--tony-black);
        }

        .logo-main span {
            color: var(--tony-blue);
        }

        .logo-sub {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: #666;
        }

        /* Inspiration: Circular button/icon */
        .header-action {
            width: 50px;
            height: 50px;
            background-color: var(--tony-blue);
            color: var(--text-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 153, 255, 0.3);
            transition: var(--transition);
        }

        .header-action:hover {
            transform: scale(1.05);
            background-color: var(--tony-black);
        }

        /* --- HERO --- */
        .hero {
            padding-top: 100px; /* Space for the header */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
        }

        .hero-top {
            max-width: 700px;
            padding: 40px 20px;
            z-index: 10;
        }

        .hero-heading {
            font-weight: 800;
            font-size: clamp(2rem, 8vw, 4.5rem); /* Responsive typography */
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 15px;
            color: var(--tony-black);
        }

        .hero-heading span {
            color: var(--tony-blue);
        }

        .hero-subheading {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #555;
            font-weight: 400;
            margin-bottom: 30px;
        }

        /* The Car: Positioned above the texts and overlap */
        .hero-image-wrap {
            margin-top: -30px; /* Pull car up slightly */
            width: 100%;
            max-width: 900px;
            z-index: 20; /* Keep on top of overlap */
            perspective: 1000px;
        }

        .hero-image-wrap img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 153, 255, 0.2));
            transform: translateX(100px); /* Entry animation */
            opacity: 0;
            animation: carSlideIn 1.5s ease-out forwards;
        }

        @keyframes carSlideIn {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Inspiration: The Red Overlap/Background Shape */
        .hero-overlap-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh; /* Takes up lower portion */
            background-color: var(--tony-blue);
            z-index: 5;
            border-top-left-radius: 60px; /* Premium curved look */
            border-top-right-radius: 60px;
        }

        /* Conversion focused CTAs against the blue background */
        .hero-ctas {
            position: absolute;
            bottom: 60px;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            z-index: 30; /* Highest z-index for interaction */
        }

        .btn {
            flex: 1;
            padding: 18px 0;
            border-radius: 5px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-call {
            background-color: var(--tony-black);
            color: var(--text-light);
            border: 2px solid transparent;
        }

        .btn-book {
            background-color: #ffffff;
            color: var(--tony-blue);
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Trust Element: The 'London's Most' text from image */
        .hero-trust-band {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--tony-black);
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 35;
        }

        /* Mobile specific adjustments (laser focused) */
        @media (max-width: 768px) {
            .hero-overlap-bg {
                height: 35vh;
            }
            .hero-heading {
                letter-spacing: -1px;
            }
            .hero-image-wrap {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-group">
            <span class="logo-main">TONY <span>SHIELS</span></span>
            <span class="logo-sub">DRIVING SCHOOL</span>
        </div>
        <a href="tel:+447752892178" class="header-action" title="Call Now">
            &#9742; </a>
    </header>

    <section class="hero">
        <div class="hero-top">
            <h1 class="hero-heading">Premier <span>Tuition</span> in London.</h1>
            <p class="hero-subheading">Professional manual & automatic lessons tailored for your success. Start your journey with Tony Shiels.</p>
        </div>

        <div class="hero-image-wrap">
            <img src="tony-car-no-bg.png" alt="Tony Shiels Blue Car">
        </div>

        <div class="hero-overlap-bg"></div>

        <div class="hero-ctas">
            <a href="tel:+447752892178" class="btn btn-call">
                📞 CALL US
            </a>
            <a href="#booking" class="btn btn-book">
                BOOK NOW
            </a>
        </div>

        <div class="hero-trust-band">
            London's Most Recommended Independent Instructor
        </div>
    </section>

</body>
</html>
