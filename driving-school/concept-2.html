<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels School of Motoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --car-blue: #0099de; /* The vibrant electric blue of the car */
            --tony-navy: #1a2b56; /* The navy blue in "TONY" */
            --tony-red: #e31e24; /* The red in "SHIELS" */
            --silver-trim: #cbd5e1; /* The silver trim from the car door */
        }

        body { background-color: #ffffff; }

        /* HEADER: Mimicking the reference layout with Tony's colors */
        .header-bg {
            background: linear-gradient(to bottom, #f0f9ff 0%, #ffffff 100%);
        }

        .menu-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tony-red) 0%, #8b0000 100%);
            border: 3px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        /* HERO: Layout centered like the reference */
        .hero-title {
            color: var(--tony-red);
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            color: var(--tony-navy);
            font-weight: 500;
        }

        /* The Blue Footer Block from the reference image */
        .brand-footer-block {
            background-color: var(--car-blue);
            height: 220px;
            border-top-left-radius: 50% 20px;
            border-top-right-radius: 50% 20px;
            position: relative;
        }

        /* Floating Widgets */
        .cta-container {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            display: flex;
            gap: 12px;
        }

        .black-widget {
            flex: 1;
            background: #000000;
            color: white;
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* The Gradient Border Bottom Widget */
        .bottom-status-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: white;
            padding: 14px;
            border-radius: 15px;
            text-align: center;
            font-weight: 700;
            color: var(--tony-navy);
            border: 4px solid;
            border-image-source: linear-gradient(90deg, var(--car-blue), var(--tony-red));
            border-image-slice: 1;
        }

        .car-display {
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
            max-height: 280px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header class="header-bg py-4 px-6 flex justify-between items-center relative z-50">
        <div class="flex flex-col">
            <h2 class="text-2xl font-black italic tracking-tighter leading-none" style="color: var(--tony-navy);">
                TONY <span style="color: var(--tony-red);">SHIELS</span>
            </h2>
            <p class="text-[9px] font-bold tracking-[.3em] uppercase text-gray-500">School of Motoring</p>
        </div>

        <button class="menu-circle flex items-center justify-center text-white">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </header>

    <section class="pt-8 overflow-hidden flex flex-col min-h-screen">
        <div class="text-center px-6 mb-4">
            <h1 class="text-5xl hero-title uppercase">PREMIER</h1>
            <p class="hero-subtitle text-lg mt-1 italic font-semibold">Driving Lessons in East London</p>
        </div>

        <div class="flex-grow flex items-center justify-center px-4">
            <img src="https://i.ibb.co/VWV0p0p/blue-car-side.png" alt="Tony Shiels Blue Car" class="car-display object-contain">
        </div>

        <div class="brand-footer-block mt-12">
            <div class="cta-container">
                <a href="tel:+447752892178" class="black-widget">
                    <i class="fas fa-phone-alt"></i>
                    CALL TONY
                </a>
                <div class="black-widget">
                    <i class="fas fa-calendar-check"></i>
                    VIEW OFFERS
                </div>
            </div>

            <div class="bottom-status-bar uppercase tracking-tight">
                East London's Highest Pass Rate
            </div>
        </div>
    </section>

</body>
</html>
