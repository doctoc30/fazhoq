<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels School of Motoring | Kirton Lindsey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --electric-blue: #0099de; /* Car Body Color */
            --tony-navy: #1a2b56;    /* Branding Text Color */
            --pure-white: #ffffff;
            --soft-gray: #f8fafc;
        }

        body { background-color: var(--pure-white); font-family: 'Inter', sans-serif; }

        /* HEADER: Clean & Professional */
        .header-bg {
            background: linear-gradient(to bottom, #e0f2fe 0%, #ffffff 100%);
        }

        .menu-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            /* Switched from red to a Navy-to-Blue gradient to match the new rules */
            background: linear-gradient(135deg, var(--tony-navy) 0%, var(--electric-blue) 100%);
            border: 2px solid var(--pure-white);
            box-shadow: 0 4px 12px rgba(26, 43, 86, 0.2);
        }

        /* HERO: Using the TS Logo Style */
        .ts-logo-text {
            color: var(--tony-navy);
            font-weight: 900;
            line-height: 0.9;
        }

        .hero-heading {
            color: var(--tony-navy);
            letter-spacing: -0.01em;
        }

        /* The Signature Blue Footer Block */
        .brand-footer-block {
            background-color: var(--electric-blue);
            height: 240px;
            border-top-left-radius: 50% 25px;
            border-top-right-radius: 50% 25px;
            position: relative;
        }

        /* Action Widgets - Solid Black as per reference */
        .cta-container {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 550px;
            display: flex;
            gap: 12px;
        }

        .action-widget {
            flex: 1;
            background: #000000;
            color: white;
            padding: 18px 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        /* Bottom Status Widget with Blue-to-Navy Gradient Border */
        .status-bar {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            background: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            color: var(--tony-navy);
            text-transform: uppercase;
            border: 3px solid;
            border-image-source: linear-gradient(90deg, var(--electric-blue), var(--tony-navy));
            border-image-slice: 1;
        }

        .car-hero-img {
            max-height: 300px;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.12));
        }
    </style>
</head>
<body>

    <header class="header-bg py-5 px-6 flex justify-between items-center relative z-50">
        <div class="flex items-center space-x-3">
            <div class="w-12 h-12 border-2 border-slate-200 rounded-full flex flex-col items-center justify-center bg-white">
                <span class="text-[8px] font-bold text-gray-400 leading-none">Driving</span>
                <span class="text-xl font-black text-[#1a2b56] leading-none">TS</span>
                <span class="text-[8px] font-bold text-gray-400 leading-none">School</span>
            </div>
            <div>
                <h2 class="ts-logo-text text-xl italic uppercase">Tony Shiels</h2>
                <p class="text-[9px] font-bold tracking-widest text-blue-500 uppercase">Kirton Lindsey & Surrounding</p>
            </div>
        </div>

        <button class="menu-circle flex items-center justify-center text-white">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <section class="flex flex-col min-h-screen">
        <div class="text-center px-6 pt-10 pb-4">
            <h1 class="hero-heading text-6xl font-black uppercase">PREMIER</h1>
            <p class="text-slate-500 font-bold text-lg mt-2 tracking-wide">Approved Driving Instructor (ADI)</p>
        </div>

        <div class="flex-grow flex items-center justify-center px-6">
            <img src="https://i.ibb.co/VWV0p0p/blue-car-side.png" alt="Tony Shiels Blue Car" class="car-hero-img object-contain">
        </div>

        <div class="brand-footer-block mt-8">
            <div class="cta-container">
                <a href="tel:+447752892178" class="action-widget">
                    <i class="fas fa-phone-alt"></i>
                    <span>Call Tony</span>
                </a>
                <button class="action-widget">
                    <i class="fas fa-envelope"></i>
                    <span>Message</span>
                </button>
            </div>

            <div class="status-bar">
                Manual Driving Lessons Kirton Lindsey
            </div>
        </div>
    </section>

</body>
</html>
