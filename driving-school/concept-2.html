<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels | Premier Driving School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0099e5; /* From your car */
            --navy-dark: #0a1128;
            --accent-red: #e63946;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--navy-dark);
            overflow-x: hidden;
        }

        /* --- STAGE 1: HEADER --- */
        .main-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 12px 5%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box {
            background: #000;
            color: #fff;
            padding: 5px 10px;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 4px;
        }

        .logo-text {
            line-height: 1;
        }

        .logo-text .brand-name {
            display: block;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .logo-text .brand-sub {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .menu-btn {
            width: 45px;
            height: 45px;
            background: var(--primary-blue); /* Theme color icon */
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 153, 229, 0.3);
            border: none;
        }

        .menu-btn span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        /* --- STAGE 2: HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 0 20px;
            background: linear-gradient(180deg, #fff 0%, #f0f8ff 100%);
            overflow: hidden;
        }

        .hero-title-area {
            z-index: 5;
            margin-bottom: -20px;
        }

        .premier-label {
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 0.9;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .sub-label {
            font-size: 1.2rem;
            color: #555;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .hero-image-container {
            position: relative;
            width: 100%;
            max-width: 750px;
            z-index: 4;
            margin: 20px 0;
        }

        .hero-car {
            width: 100%;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.15));
            animation: floatCar 5s ease-in-out infinite;
        }

        @keyframes floatCar {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        /* The Curved Graphic from Image 2 */
        .hero-curve {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: 2;
        }

        .hero-curve svg {
            width: 100%;
            height: auto;
        }

        /* --- ACTION BAR --- */
        .action-bar {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        .btn {
            flex: 1;
            padding: 18px 20px;
            border-radius: 12px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .btn-call {
            background: #000;
            color: #fff;
        }

        .btn-offers {
            background: #000;
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: var(--navy-dark);
        }

        /* Trust Widget (Bottom of Hero) */
        .trust-widget {
            position: absolute;
            bottom: -30px;
            background: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 2px solid #f0f0f0;
            z-index: 11;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trust-widget b {
            color: var(--primary-blue);
        }

        /* Mobile Specifics */
        @media (max-width: 600px) {
            .premier-label { font-size: 3.2rem; }
            .action-bar { bottom: 60px; flex-direction: row; }
            .hero { padding-top: 100px; }
            .trust-widget { width: 85%; padding: 12px 20px; font-size: 0.85rem; bottom: -25px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <div class="logo-box">TS</div>
            <div class="logo-text">
                <span class="brand-name">TONY SHIELS</span>
                <span class="brand-sub">School of Motoring</span>
            </div>
        </div>
        
        <button class="menu-btn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <section class="hero">
        <div class="hero-title-area">
            <h1 class="premier-label">PREMIER</h1>
            <p class="sub-label">Driving School in East London</p>
        </div>

        <div class="hero-image-container">
            <img src="https://i.ibb.co/XfS7rYn/blue-car-placeholder.png" alt="Tony Shiels Driving Car" class="hero-car">
        </div>

        <div class="hero-curve">
            <svg viewBox="0 0 500 150" preserveAspectRatio="none">
                <path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: var(--primary-blue);"></path>
            </svg>
        </div>

        <div class="action-bar">
            <a href="tel:+447752892178" class="btn btn-call">
                <i class="fas fa-phone-alt"></i> CALL US
            </a>
            <a href="#offers" class="btn btn-offers">
                VIEW OFFERS
            </a>
        </div>

        <div class="trust-widget">
            <span>London's most <b>Trusted</b> Driving School</span>
            <i class="fas fa-chevron-right" style="font-size: 0.7rem; color: #ccc;"></i>
        </div>
    </section>

</body>
</html>
