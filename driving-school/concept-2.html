<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Shiels Driving School | TS-387 Premium Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #1a365d; 
            --brand-red: #d31018;
            --brand-silver: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #ffffff; overflow-x: hidden; }
        
        .logo-wrap {
            display: flex;
            align-items: center;
            font-weight: 900;
            letter-spacing: 0.15em;
            color: var(--brand-navy);
            text-transform: uppercase;
            font-size: 1.5rem;
        }
        .l-plate-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #d1d5db;
            width: 30px;
            height: 34px;
            margin: 0 4px;
            transform: rotate(-6deg);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        .l-plate-icon span {
            color: var(--brand-red);
            font-family: 'Archivo Black', sans-serif;
            font-size: 26px;
            line-height: 1;
            margin-top: -2px;
        }

        /* FIXED HERO & CAR ANIMATION */
        .car-hero-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 250px; /* Fixed height to prevent layout jumps */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            margin: 0 auto;
        }
        
        #panningCar {
            max-width: 500px; /* Slightly smaller for better mobile fit */
            width: 90%;
            height: auto;
            clip-path: inset(0 0 15% 0);
            background-color: transparent;
            animation: driveForward 8s linear infinite;
            will-change: transform;
        }

        @keyframes driveForward {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(150%); }
        }

        /* MENU STYLES */
        #sideMenu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: var(--brand-navy);
            z-index: 200;
            transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #sideMenu.active { right: 0; }

        .menu-link {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            margin: 0.5rem 0;
            transition: color 0.3s;
        }

        /* SOCIAL ICON FIX */
        .social-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transition: 0.3s;
            color: white;
        }
        .social-icon:hover { background: var(--brand-red); }

        .road-indicator {
            height: 4px;
            background: var(--brand-silver);
            width: 100%;
            max-width: 300px;
            border-radius: 2px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            overflow: hidden;
        }
        .road-indicator::after {
            content: '';
            position: absolute;
            left: -50%;
            width: 50%;
            height: 100%;
            background: var(--brand-red);
            animation: dash-move 1.2s linear infinite;
        }
        @keyframes dash-move {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .btn-red { background-color: var(--brand-red); color: white; transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body class="text-slate-900">

    <div id="sideMenu">
        <button onclick="toggleMenu()" class="absolute top-8 right-8 text-white">
            <i data-lucide="x" class="w-10 h-10"></i>
        </button>
        <a href="#services" onclick="toggleMenu()" class="menu-link">Tuition</a>
        <a href="#pricing" onclick="toggleMenu()" class="menu-link">Pricing</a>
        <a href="#booking" onclick="toggleMenu()" class="menu-link">Book Now</a>
        
        <div class="mt-12 flex gap-4">
            <a href="#" class="social-icon"><i data-lucide="facebook"></i></a>
            <a href="#" class="social-icon"><i data-lucide="instagram"></i></a>
            <a href="#" class="social-icon"><i data-lucide="youtube"></i></a>
        </div>
    </div>

    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="logo-wrap">
                TONY SHIE<div class="l-plate-icon"><span>L</span></div>S
            </div>
            <button onclick="toggleMenu()" class="p-2">
                <i data-lucide="menu" class="text-[var(--brand-navy)] w-8 h-8"></i>
            </button>
        </div>
    </nav>

    <div class="ticker-wrap font-bold uppercase text-[10px] tracking-[0.2em] overflow-hidden bg-[var(--brand-navy)] text-white py-3 border-b-2 border-red-600">
        <div class="ticker space-x-16">
            <span>★ DVSA Approved</span>
            <span>★ Established 2005</span>
            <span>★ First-Time Pass Experts</span>
            <span>★ TS-387 Certified</span>
        </div>
    </div>

    <section class="relative min-h-[70vh] flex flex-col items-center justify-center bg-white px-4 py-12">
        <div class="w-full max-w-4xl text-center">
            
            <div class="car-hero-container mb-8">
                <img id="panningCar" src="https://raw.githubusercontent.com/doctoc30/fazhoq/main/images/tony.jpg" alt="Driving Car">
                <div class="road-indicator"></div>
            </div>

            <div class="animate__animated animate__fadeInUp">
                <h1 class="text-4xl md:text-7xl font-black text-[var(--brand-navy)] leading-tight mb-4 uppercase">
                    Pass with <span class="text-red-600">Precision.</span>
                </h1>
                <p class="text-slate-500 font-bold uppercase tracking-widest mb-8">South London's Premier Driving Tuition</p>
                
                <div class="flex flex-col sm:flex-row justify-center gap-4 px-6">
                    <a href="#booking" class="px-8 py-4 btn-red font-black uppercase text-xs tracking-widest">Start Driving</a>
                    <a href="tel:+447752892178" class="px-8 py-4 border-2 border-[var(--brand-navy)] text-[var(--brand-navy)] font-black uppercase text-xs tracking-widest">07752 892178</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-[var(--brand-navy)] text-white py-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="logo-wrap !text-white !justify-center mb-8">
                TONY SHIE<div class="l-plate-icon"><span>L</span></div>S
            </div>
            
            <div class="flex justify-center gap-6 mb-10">
                <a href="#" class="social-icon"><i data-lucide="facebook"></i></a>
                <a href="#" class="social-icon"><i data-lucide="instagram"></i></a>
                <a href="#" class="social-icon"><i data-lucide="youtube"></i></a>
                <a href="#" class="social-icon"><i data-lucide="linkedin"></i></a>
            </div>

            <p class="text-2xl font-black mb-2">07752 892178</p>
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.4em]">&copy; 2026 TS-387 SYSTEM</p>
        </div>
    </footer>

    <script>
        // Initial icon creation
        lucide.createIcons();

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
            
            // Re-trigger Lucide when menu opens to ensure icons are visible
            if(menu.classList.contains('active')) {
                lucide.createIcons();
            }
            
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        }

        // Intersection Observer for reveal animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active', 'animate__animated', 'animate__fadeInUp');
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
