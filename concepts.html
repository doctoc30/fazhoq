<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | Concept Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            background-color: var(--primary-light);
            color: var(--text);
            scroll-behavior: smooth;
            overflow-x: hidden;
            min-height: 100%;
        }

        /* EXACT HOMEPAGE NAV */
        .faz-nav {
            position: fixed;
            top: 0; width: 100%; z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--primary-light);
        }

        .faz-logo {
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;
            color: var(--primary); text-decoration: none;
        }
        .faz-logo span { color: #000; }

        #menu-btn { font-size: 1.8rem; color: var(--text); background: none; border: none; cursor: pointer; }

        .content-container { padding: 120px 0px 100px; min-height: 100vh; }

        .hero-section { text-align: center; margin: 20px 0 40px; padding: 0 25px; }
        .hero-section h1 {
            font-size: clamp(2.5rem, 10vmin, 3.5rem); font-weight: 900; line-height: 0.9;
            letter-spacing: -3px; color: var(--primary); text-transform: uppercase;
        }

        /* CONCEPT CARDS */
        .concepts-grid { display: flex; flex-direction: column; gap: 40px; width: 100%; }

        @media (min-width: 768px) {
            .concepts-grid { 
                display: grid; grid-template-columns: repeat(2, 1fr); 
                padding: 0 25px; gap: 25px;
            }
        }

        .concept-card {
            background: #fff; overflow: hidden;
            display: flex; flex-direction: column;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .concept-image-wrap { 
            width: 100%; 
            aspect-ratio: 4 / 5; /* Professional portrait ratio */
            background: #eee; 
            overflow: hidden; 
        }
        .concept-image-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .concept-details { padding: 25px; text-align: center; }
        
        .vibz-btn {
            width: 100%; padding: 16px; border-radius: 50px;
            background: var(--primary); color: #fff; 
            font-size: 1rem; font-weight: 900;
            cursor: pointer; border: none; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
        }

        .code-label { font-size: 0.8rem; font-weight: 900; color: #bbb; letter-spacing: 2px; margin-top: 15px; }

        /* EXACT HOMEPAGE DOCK */
        .app-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--primary); height: 80px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 2500; padding-bottom: var(--safe-bottom);
            box-shadow: 0 -10px 30px rgba(255,107,0,0.3);
        }
        
        .dock-btn {
            font-size: 1.8rem; color: #FFFFFF; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
        }
        .dock-btn span { font-size: 0.65rem; font-weight: 800; margin-top: 4px; text-transform: uppercase; }

        /* EXACT HOMEPAGE MENU LAYER */
        #app-menu-layer {
            position: fixed; inset: 0; background: var(--primary-light);
            z-index: 9500; display: flex; flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .menu-item { font-size: 3.5rem; font-weight: 900; color: var(--text); text-decoration: none; text-align: center; margin: 10px 0; }

        /* PAGINATION */
        .pagination { display: flex; flex-direction: column; align-items: center; padding: 40px 25px; gap: 15px; }
        .page-btn { background: #000; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; }
    </style>
</head>
<body>

    <nav class="faz-nav">
        <a href="index.html" class="faz-logo">FAZ HOQ<span>.</span></a>
        <button id="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div id="app-menu-layer">
        <div class="flex justify-between items-center mb-10">
            <div class="faz-logo">FAZ HOQ<span>.</span></div>
            <div onclick="toggleMenu()" class="w-12 h-12 bg-orange-500 text-white rounded-full flex items-center justify-center text-xl cursor-pointer">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
        <div class="flex flex-col flex-1 justify-center">
            <a href="index.html" class="menu-item">HOME</a>
            <a href="index.html" class="menu-item">ABOUT</a>
            <a href="https://doctoc30.github.io/fazhoq/concepts.html" class="menu-item" style="color:var(--primary)">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="menu-item">CONTACT</a>
        </div>
    </div>

    <main class="content-container">
        <section class="hero-section">
            <h1>Select Your<br>Concept<span>.</span></h1>
        </section>

        <div class="concepts-grid" id="conceptsGrid"></div>
        <div class="pagination" id="paginationControls"></div>
    </main>

    <div class="app-dock">
        <a href="index.html" class="dock-btn"><i class="fa-solid fa-house"></i><span>HOME</span></a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
    </div>

    <script>
        const concepts = Array.from({length: 50}, (_, i) => ({
            code: `DRIVE-${i+1}`,
            image: `https://picsum.photos/seed/drive${i+10}/800/1000`
        }));

        let currentPage = 1;
        const itemsPerPage = 6;

        function toggleMenu() { document.getElementById('app-menu-layer').classList.toggle('active'); }

        function renderConcepts() {
            const grid = document.getElementById('conceptsGrid');
            grid.innerHTML = "";
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = concepts.slice(start, end);

            pageItems.forEach(item => {
                grid.innerHTML += `
                    <div class="concept-card">
                        <div class="concept-image-wrap">
                            <img src="${item.image}" alt="Driving School Design" loading="lazy">
                        </div>
                        <div class="concept-details">
                            <button class="vibz-btn" onclick="window.location.href='mailto:Fazhoq1977@gmail.com?subject=I Select Concept ${item.code}'">Select This Concept</button>
                            <div class="code-label">${item.code}</div>
                        </div>
                    </div>`;
            });
            renderPagination();
        }

        function renderPagination() {
            const controls = document.getElementById('paginationControls');
            const totalPages = Math.ceil(concepts.length / itemsPerPage);
            controls.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <button class="page-btn" ${currentPage === 1 ? 'style="opacity:0.2"' : ''} onclick="changePage(${currentPage - 1})">PREV</button>
                    <button class="page-btn" ${currentPage === totalPages ? 'style="opacity:0.2"' : ''} onclick="changePage(${currentPage + 1})">NEXT</button>
                </div>
                <div style="font-weight:900; color: #888;">PAGE ${currentPage} / ${totalPages}</div>
            `;
        }

        function changePage(p) { 
            if(p < 1 || p > Math.ceil(concepts.length / itemsPerPage)) return;
            currentPage = p; 
            window.scrollTo(0,0); 
            renderConcepts(); 
        }

        window.onload = renderConcepts;
    </script>
</body>
</html>
