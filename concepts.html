<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ HOQ | Concept Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FFF5EE;
            --bg: #FFFFFF;
            --text: #121212;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            background-color: var(--primary-light);
            color: var(--text);
            overflow-x: hidden;
            width: 100%;
        }

        /* HEADER */
        .faz-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2500;
            padding: calc(var(--safe-top) + 20px) 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary-light);
        }

        .faz-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary);
            text-decoration: none;
        }
        .faz-logo span { color: #000; }

        #menu-btn {
            font-size: 1.8rem;
            color: var(--text);
            background: none;
            border: none;
            cursor: pointer;
        }

        /* MENU LAYER */
        #app-menu-layer {
            position: fixed;
            inset: 0;
            background: var(--primary-light);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 20px) 25px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }
        #app-menu-layer.active { transform: translateY(0); }
        .menu-item { font-size: 3.5rem; font-weight: 900; color: var(--text); text-decoration: none; text-align: center; margin: 10px 0; }

        /* RESPONSIVE IMAGE DISPLAY */
        .content-main {
            padding-top: 100px;
            padding-bottom: 120px;
        }

        .hero-section {
            text-align: center;
            padding: 20px 25px 30px;
        }

        .huge-text {
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .concepts-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .concept-card {
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            margin-bottom: 2px; /* Thin visual separator */
        }

        .concept-image-wrap {
            width: 100%;
            position: relative;
            /* Height is responsive based on viewport, ensuring the "Long Portrait" feel */
            height: 70vh; 
            overflow: hidden;
            background: #f0f0f0;
        }

        .concept-image-wrap img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; /* Ensures image covers area without stretching */
            object-position: top center;
        }

        .concept-footer {
            padding: 20px 25px 30px;
            text-align: center;
            background: #fff;
        }

        .select-btn {
            width: 100%;
            max-width: 500px;
            padding: 18px;
            background: var(--primary);
            color: #fff;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            border: none;
            box-shadow: 0 8px 15px rgba(255, 107, 0, 0.2);
        }

        .concept-code {
            margin-top: 10px;
            font-weight: 900;
            color: #bbb;
            letter-spacing: 2px;
            font-size: 0.7rem;
        }

        /* DOCK */
        .app-dock {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            background: var(--primary);
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2500;
            padding-bottom: var(--safe-bottom);
        }
        
        .dock-btn {
            font-size: 1.8rem;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }
        .dock-btn span {
            font-size: 0.65rem;
            font-weight: 800;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* PAGINATION */
        .pagination-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px 0;
        }

        .page-arrow {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        /* Desktop Grid Support */
        @media (min-width: 768px) {
            .concepts-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
            .concept-image-wrap {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <nav class="faz-nav">
        <a href="index.html" class="faz-logo">FAZ HOQ<span>.</span></a>
        <button id="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
    </nav>

    <div id="app-menu-layer">
        <div class="flex justify-between items-center mb-10">
            <div class="faz-logo">FAZ HOQ<span>.</span></div>
            <div onclick="toggleMenu()" class="w-12 h-12 bg-orange-500 text-white rounded-full flex items-center justify-center text-xl cursor-pointer">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
        <div class="flex flex-col flex-1 justify-center">
            <a href="index.html" class="menu-item">HOME</a>
            <a href="index.html" class="menu-item">ABOUT</a>
            <a href="concepts.html" class="menu-item" style="color: var(--primary);">CONCEPTS</a>
            <a href="mailto:Fazhoq1977@gmail.com" class="menu-item">CONTACT</a>
        </div>
    </div>

    <main class="content-main">
        <div class="hero-section">
            <h1 class="huge-text">Choose Your<br><span style="color: #000;">Design.</span></h1>
        </div>

        <div class="concepts-container" id="conceptsGrid">
            </div>

        <div class="pagination-nav">
            <button class="page-arrow" onclick="changePage(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="pageNumber" style="font-weight: 900; font-size: 1.2rem;">1</span>
            <button class="page-arrow" onclick="changePage(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </main>

    <div class="app-dock">
        <a href="index.html" class="dock-btn">
            <i class="fa-solid fa-house"></i>
            <span>HOME</span>
        </a>
        <a href="https://wa.me/447706345874" class="dock-btn"><i class="fa-brands fa-whatsapp"></i><span>WHATSAPP</span></a>
        <a href="sms:07706345874" class="dock-btn"><i class="fa-solid fa-comment"></i><span>TEXT</span></a>
        <a href="mailto:Fazhoq1977@gmail.com" class="dock-btn"><i class="fa-solid fa-paper-plane"></i><span>EMAIL</span></a>
    </div>

    <script>
        const concepts = Array.from({length: 20}, (_, i) => ({
            code: `LIB-${i + 301}`,
            image: `https://picsum.photos/seed/design${i+5}/800/1200`
        }));

        let currentPage = 1;
        const perPage = 4;

        function toggleMenu() { 
            document.getElementById('app-menu-layer').classList.toggle('active'); 
        }

        function render() {
            const grid = document.getElementById('conceptsGrid');
            const start = (currentPage - 1) * perPage;
            const items = concepts.slice(start, start + perPage);
            
            grid.innerHTML = items.map(item => `
                <div class="concept-card">
                    <div class="concept-image-wrap">
                        <img src="${item.image}" alt="Driving School Template" loading="lazy">
                    </div>
                    <div class="concept-footer">
                        <button class="select-btn" onclick="location.href='mailto:Fazhoq1977@gmail.com?subject=Selected Concept ${item.code}'">Select This Design</button>
                        <div class="concept-code">REFERENCE: ${item.code}</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('pageNumber').innerText = currentPage;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function changePage(dir) {
            const max = Math.ceil(concepts.length / perPage);
            const next = currentPage + dir;
            if(next >= 1 && next <= max) {
                currentPage = next;
                render();
            }
        }

        window.onload = render;
    </script>
</body>
</html>
